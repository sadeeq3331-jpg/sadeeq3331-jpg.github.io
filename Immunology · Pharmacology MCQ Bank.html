          exp: "Cyclosporine causes nephrotoxicity, hypertension, gingival hyperplasia, and hyperlipidemia, but not myelosuppression." },
        { q: "Tacrolimus side effects include:",
          opts: ["Neurotoxicity (tremor, headache), post‑transplant diabetes mellitus", "Hirsutism, gingival hyperplasia", "Myelosuppression", "Pulmonary fibrosis", "Cardiomyopathy"],
          correct: 0,
          exp: "Tacrolimus is neurotoxic and diabetogenic." },
        { q: "Mycophenolate mofetil adverse effects include:",
          opts: ["GI upset (nausea, diarrhea), myelosuppression, teratogenicity", "Nephrotoxicity", "Hypertension", "Hirsutism", "Gingival hyperplasia"],
          correct: 0,
          exp: "MMF commonly causes GI intolerance and bone marrow suppression." },
        { q: "Sirolimus (rapamycin) adverse effects include:",
          opts: ["Hyperlipidemia, thrombocytopenia, mouth ulcers, delayed wound healing", "Nephrotoxicity", "Diabetes", "Hirsutism", "Gingival hyperplasia"],
          correct: 0,
          exp: "Sirolimus inhibits mTOR, causing metabolic and hematologic effects." },
        { q: "The combination of sirolimus with calcineurin inhibitors may:",
          opts: ["Increase nephrotoxicity", "Decrease nephrotoxicity", "Improve outcomes", "No interaction", "Cause hypertension"],
          correct: 0,
          exp: "Calcineurin inhibitors and sirolimus both can be nephrotoxic; levels must be monitored." }
    ];
    // Add extra to reach 65
    const extra = [
        { q: "Which immunosuppressant works by inhibiting dihydroorotate dehydrogenase?",
          opts: ["Leflunomide", "Mycophenolate", "Azathioprine", "Methotrexate", "Cyclosporine"],
          correct: 0,
          exp: "Leflunomide inhibits pyrimidine synthesis; used in RA." },
        { q: "Voclosporin is a novel calcineurin inhibitor approved for lupus nephritis. Compared to cyclosporine, it:",
          opts: ["Has more predictable pharmacokinetics, no need for monitoring", "Is more nephrotoxic", "Is less effective", "Causes more hypertension", "Requires monitoring"],
          correct: 0,
          exp: "Voclosporine has a more consistent dose‑response relationship." },
        { q: "Which biologic is used to treat eosinophilic granulomatosis with polyangiitis (Churg‑Strauss)?",
          opts: ["Mepolizumab (anti‑IL‑5)", "Rituximab", "Infliximab", "Tocilizumab", "Anakinra"],
          correct: 0,
          exp: "Mepolizumab reduces eosinophils and glucocorticoid requirements in EGPA." },
        { q: "Reslizumab is another anti‑IL‑5 antibody; it is administered:",
          opts: ["Intravenously", "Subcutaneously", "Orally", "Intramuscularly", "Intranasally"],
          correct: 0,
          exp: "Reslizumab is given IV; mepolizumab and benralizumab are SC." },
        { q: "Benralizumab is an anti‑IL‑5 receptor antibody that:",
          opts: ["Induces apoptosis of eosinophils (ADCC)", "Blocks IL‑5", "Neutralizes IL‑5", "Depletes B cells", "Inhibits JAK"],
          correct: 0,
          exp: "Benralizumab binds IL‑5Rα and recruits NK cells to kill eosinophils." },
        { q: "Omalizumab's black box warning includes:",
          opts: ["Anaphylaxis", "Malignancy", "Cardiovascular events", "Infections", "Thrombocytopenia"],
          correct: 0,
          exp: "Omalizumab can cause anaphylaxis; patients should be observed after injection." },
        { q: "Dupilumab adverse effects include:",
          opts: ["Injection site reactions, conjunctivitis, eosinophilia", "Tuberculosis reactivation", "Demyelination", "Heart failure", "Lupus‑like syndrome"],
          correct: 0,
          exp: "Conjunctivitis is a known side effect of dupilumab." },
        { q: "The JAK inhibitor tofacitinib carries warnings for:",
          opts: ["Thrombosis, infections, malignancy", "Nephrotoxicity", "Hepatotoxicity", "Cardiomyopathy", "Pulmonary fibrosis"],
          correct: 0,
          exp: "JAK inhibitors increase risk of thrombosis, serious infections, and lymphoma." },
        { q: "Siponimod is an S1P receptor modulator used in MS. It requires:",
          opts: ["CYP2C9 genotype testing before use", "Liver function monitoring", "ECG monitoring", "Eye exam", "All of the above"],
          correct: 4,
          exp: "Siponimod dosing depends on CYP2C9 genotype; baseline eye exam and ECG needed." },
        { q: "Ozanimod is another S1P modulator used in MS and UC. It does NOT require genotyping because:",
          opts: ["Metabolized by multiple pathways", "No genetic variation", "Prodrug", "Short half‑life", "Topical use"],
          correct: 0,
          exp: "Ozanimod metabolism is less dependent on CYP2C9." },
        { q: "Cladribine is an immunosuppressant used in MS. It works by:",
          opts: ["Depleting lymphocytes (purine analog)", "Blocking IL‑2", "Inhibiting JAK", "Depleting B cells", "Blocking α4 integrin"],
          correct: 0,
          exp: "Cladribine causes selective lymphocyte depletion." }
    ];
    const allQuestions = questions.concat(extra); // now 65+

    // Shuffle
    let shuffled = allQuestions.sort(()=>0.5-Math.random());
    let currentIndex = 0;
    let userAnswers = new Array(shuffled.length).fill(null);
    let showExplanation = new Array(shuffled.length).fill(false);
    const letters = ['A','B','C','D','E'];

    function render() {
        const q = shuffled[currentIndex];
        document.getElementById('questionText').innerText = q.q;
        let optsHtml = '';
        q.opts.forEach((opt, idx) => {
            let cls = 'option';
            if (userAnswers[currentIndex] === idx) cls += ' selected';
            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                if (idx === q.correct) cls += ' correct';
                else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
            }
            optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
        });
        document.getElementById('optionsContainer').innerHTML = optsHtml;

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                let idx = parseInt(opt.dataset.idx);
                if (userAnswers[currentIndex] === idx) {
                    userAnswers[currentIndex] = null;
                    showExplanation[currentIndex] = false;
                } else {
                    userAnswers[currentIndex] = idx;
                    showExplanation[currentIndex] = true;
                }
                render();
            });
        });

        if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
            document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
            document.getElementById('explanation').classList.add('show');
        } else {
            document.getElementById('explanation').classList.remove('show');
        }

        document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
        let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
        document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
        document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

        // dots
        let dots = '';
        for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
            let cls = 'dot';
            if (i === currentIndex) cls += ' active';
            if (userAnswers[i] !== null) cls += ' answered';
            dots += `<div class="${cls}" data-index="${i}"></div>`;
        }
        document.getElementById('dotsContainer').innerHTML = dots;
        document.querySelectorAll('.dot').forEach(d => {
            d.addEventListener('click', () => {
                let idx = parseInt(d.dataset.index);
                if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                    currentIndex = idx;
                    render();
                }
            });
        });
    }

    document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
    render();
</script>
</body>
</html>
