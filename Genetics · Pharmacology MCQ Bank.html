          opts: ["20‑30% lower dose", "20‑30% higher dose", "No change", "50% higher dose", "Double dose"],
          correct: 0,
          exp: "Reduced CYP2C9 function decreases warfarin clearance, so lower doses needed." },
        { q: "The CPIC (Clinical Pharmacogenetics Implementation Consortium) guidelines recommend an alternative antiplatelet agent for CYP2C19 poor metabolizers taking clopidogrel. Which one?",
          opts: ["Prasugrel or ticagrelor", "Aspirin only", "Dipyridamole", "Cilostazol", "Warfarin"],
          correct: 0,
          exp: "Prasugrel and ticagrelor are not affected by CYP2C19." },
        { q: "Which drug is a substrate of CYP2D6 and also an inhibitor, leading to phenoconversion?",
          opts: ["Paroxetine (potent CYP2D6 inhibitor)", "Omeprazole", "Rifampin", "Phenytoin", "Carbamazepine"],
          correct: 0,
          exp: "Paroxetine both is metabolized by and potently inhibits CYP2D6." },
        { q: "Phenoconversion refers to:",
          opts: ["Drug‑induced alteration of predicted phenotype (e.g., inhibitor makes someone appear poor metabolizer)", "Genetic polymorphism", "Enzyme induction", "Loss of function allele", "Gene duplication"],
          correct: 0,
          exp: "Drug interactions can change metabolizer status." },
        { q: "Rifampin is a potent CYP3A4 inducer. What effect would it have on oral contraceptive efficacy?",
          opts: ["Decreased efficacy (increased metabolism)", "Increased efficacy", "No effect", "Toxicity", "None"],
          correct: 0,
          exp: "Rifampin induces CYP3A4, increasing metabolism of estrogen/progestin." },
        { q: "Which antifungal drug is a strong CYP3A4 inhibitor and can increase statin levels?",
          opts: ["Itraconazole", "Fluconazole", "Terbinafine", "Griseofulvin", "Nystatin"],
          correct: 0,
          exp: "Itraconazole and ketoconazole are strong CYP3A4 inhibitors." },
        { q: "Grapefruit juice inhibits intestinal CYP3A4, increasing bioavailability of:",
          opts: ["Felodipine, simvastatin, cyclosporine", "Paracetamol", "Amoxicillin", "Warfarin", "Digoxin"],
          correct: 0,
          exp: "Grapefruit juice inhibits CYP3A4 and P‑gp, increasing levels of many drugs." }
    ];
    // Add extra to reach 65
    const extra = [
        { q: "Which of the following is an example of a drug with HLA‑associated hypersensitivity?",
          opts: ["Allopurinol (HLA‑B*5801)", "Abacavir (HLA‑B*5701)", "Carbamazepine (HLA‑B*1502)", "All of the above", "None"],
          correct: 3,
          exp: "All three have strong HLA associations for severe cutaneous adverse reactions." },
        { q: "Flucloxacillin‑induced liver injury is associated with:",
          opts: ["HLA‑B*5701", "HLA‑B*1502", "HLA‑B*5801", "HLA‑A*3101", "HLA‑DRB1*07"],
          correct: 0,
          exp: "HLA‑B*5701 increases risk of flucloxacillin DILI." },
        { q: "Amoxicillin‑clavulanate‑induced liver injury is associated with:",
          opts: ["HLA‑DRB1*15:01", "HLA‑B*5701", "HLA‑A*3101", "HLA‑B*1502", "HLA‑B*5801"],
          correct: 0,
          exp: "HLA‑DRB1*15:01 increases risk of cholestatic hepatitis with amoxicillin‑clavulanate." },
        { q: "Lumacaftor‑ivacaftor is used for cystic fibrosis patients with which mutation?",
          opts: ["F508del (CFTR)", "G551D", "R117H", "W1282X", "All of the above"],
          correct: 0,
          exp: "Lumacaftor corrects F508del CFTR processing; ivacaftor potentiates channel function." },
        { q: "Ivacaftor is specifically indicated for CF patients with:",
          opts: ["G551D and other gating mutations", "F508del", "R117H", "All mutations", "None"],
          correct: 0,
          exp: "Ivacaftor potentiates CFTR channels with gating defects." },
        { q: "Crizotinib is effective in non‑small cell lung cancer with which genetic alteration?",
          opts: ["ALK rearrangement", "EGFR mutation", "KRAS mutation", "ROS1 rearrangement", "Both A and D"],
          correct: 4,
          exp: "Crizotinib targets ALK and ROS1 fusions." },
        { q: "Osimertinib is a third‑generation EGFR inhibitor used in NSCLC with:",
          opts: ["EGFR T790M resistance mutation", "EGFR exon 19 deletion", "L858R", "All of the above", "None"],
          correct: 0,
          exp: "Osimertinib is effective in T790M‑positive NSCLC." },
        { q: "Vemurafenib is a BRAF inhibitor used in melanoma with which mutation?",
          opts: ["BRAF V600E", "NRAS mutation", "c‑KIT mutation", "GNAQ mutation", "BRAF fusion"],
          correct: 0,
          exp: "Vemurafenib targets BRAF V600E mutant melanoma." },
        { q: "Imatinib is a tyrosine kinase inhibitor effective in:",
          opts: ["CML (BCR‑ABL), GIST (c‑KIT)", "EGFR‑mutant lung cancer", "ALK‑positive lung cancer", "BRAF‑mutant melanoma", "HER2‑positive breast cancer"],
          correct: 0,
          exp: "Imatinib targets BCR‑ABL, c‑KIT, PDGFR." },
        { q: "Trastuzumab is a monoclonal antibody used in HER2‑positive breast cancer. HER2 amplification can be detected by:",
          opts: ["IHC or FISH", "PCR", "Next‑generation sequencing", "Cytogenetics", "All of the above"],
          correct: 0,
          exp: "IHC measures protein; FISH measures gene amplification." },
        { q: "Rituximab targets which antigen on B cells?",
          opts: ["CD20", "CD19", "CD22", "CD52", "CD30"],
          correct: 0,
          exp: "Rituximab is an anti‑CD20 monoclonal antibody." }
    ];
    const allQuestions = questions.concat(extra); // now 65+

    // Shuffle
    let shuffled = allQuestions.sort(()=>0.5-Math.random());
    let currentIndex = 0;
    let userAnswers = new Array(shuffled.length).fill(null);
    let showExplanation = new Array(shuffled.length).fill(false);
    const letters = ['A','B','C','D','E'];

    function render() {
        const q = shuffled[currentIndex];
        document.getElementById('questionText').innerText = q.q;
        let optsHtml = '';
        q.opts.forEach((opt, idx) => {
            let cls = 'option';
            if (userAnswers[currentIndex] === idx) cls += ' selected';
            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                if (idx === q.correct) cls += ' correct';
                else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
            }
            optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
        });
        document.getElementById('optionsContainer').innerHTML = optsHtml;

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                let idx = parseInt(opt.dataset.idx);
                if (userAnswers[currentIndex] === idx) {
                    userAnswers[currentIndex] = null;
                    showExplanation[currentIndex] = false;
                } else {
                    userAnswers[currentIndex] = idx;
                    showExplanation[currentIndex] = true;
                }
                render();
            });
        });

        if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
            document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
            document.getElementById('explanation').classList.add('show');
        } else {
            document.getElementById('explanation').classList.remove('show');
        }

        document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
        let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
        document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
        document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

        // dots
        let dots = '';
        for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
            let cls = 'dot';
            if (i === currentIndex) cls += ' active';
            if (userAnswers[i] !== null) cls += ' answered';
            dots += `<div class="${cls}" data-index="${i}"></div>`;
        }
        document.getElementById('dotsContainer').innerHTML = dots;
        document.querySelectorAll('.dot').forEach(d => {
            d.addEventListener('click', () => {
                let idx = parseInt(d.dataset.index);
                if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                    currentIndex = idx;
                    render();
                }
            });
        });
    }

    document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
    render();
</script>
</body>
</html>
