          exp: "RA: symmetric polyarthritis, morning stiffness, positive RF/anti‑CCP." },
        { q: "A 25-year-old woman with photosensitive malar rash, oral ulcers, arthritis, and positive ANA. The most likely diagnosis is:",
          opts: ["Systemic lupus erythematosus (SLE)", "Rheumatoid arthritis", "Dermatomyositis", "Scleroderma", "Sjögren syndrome"],
          correct: 0,
          exp: "SLE: malar rash, photosensitivity, oral ulcers, arthritis, positive ANA." },
        { q: "A 65-year-old man with history of smoking presents with back pain and stiffness that is worse in the morning and improves with activity. X‑ray shows sacroiliitis. The diagnosis is:",
          opts: ["Ankylosing spondylitis", "Osteoarthritis", "Lumbar disc disease", "Fibromyalgia", "Polymyalgia rheumatica"],
          correct: 0,
          exp: "Ankylosing spondylitis: inflammatory back pain, morning stiffness, sacroiliitis, associated with HLA‑B27." },
        { q: "A 50-year-old woman presents with proximal muscle weakness, difficulty rising from a chair, and heliotrope rash on eyelids. CK is elevated. The diagnosis is:",
          opts: ["Dermatomyositis", "Polymyositis", "Rhabdomyolysis", "Muscular dystrophy", "Myasthenia gravis"],
          correct: 0,
          exp: "Dermatomyositis: proximal muscle weakness, heliotrope rash, Gottron papules, elevated muscle enzymes." },
        { q: "A 30-year-old woman with episodic weakness and fatigue that worsens with repeated activity, improving with rest. She has ptosis and diplopia. The diagnosis is:",
          opts: ["Myasthenia gravis", "Lambert‑Eaton syndrome", "Multiple sclerosis", "Guillain‑Barré syndrome", "Periodic paralysis"],
          correct: 0,
          exp: "Myasthenia gravis: fluctuating weakness, ptosis, diplopia, worsens with activity (fatigable), improves with rest." },
        { q: "A 60-year-old man with progressive weakness, autonomic dysfunction, and fasciculations. He has both upper and lower motor neuron signs. The diagnosis is:",
          opts: ["Amyotrophic lateral sclerosis (ALS)", "Multiple sclerosis", "Myasthenia gravis", "Peripheral neuropathy", "Spinal muscular atrophy"],
          correct: 0,
          exp: "ALS: combined upper (spasticity) and lower (fasciculations, atrophy) motor neuron signs." },
        { q: "A 25-year-old woman with sudden onset of painful vision loss in one eye, with pain on eye movement. She has a history of similar episodes. The most likely diagnosis is:",
          opts: ["Optic neuritis (often multiple sclerosis)", "Migraine", "Giant cell arteritis", "Central retinal artery occlusion", "Acute glaucoma"],
          correct: 0,
          exp: "Optic neuritis: painful vision loss, pain on eye movement; often associated with MS." },
        { q: "A 70-year-old man with sudden, painless vision loss in one eye. Fundoscopy shows a cherry‑red spot. The diagnosis is:",
          opts: ["Central retinal artery occlusion", "Central retinal vein occlusion", "Optic neuritis", "Retinal detachment", "Amaurosis fugax"],
          correct: 0,
          exp: "Central retinal artery occlusion: sudden, painless vision loss, cherry‑red spot (preserved choroidal circulation)." },
        { q: "A 65-year-old woman with sudden, painless vision loss in one eye, with retinal hemorrhages and dilated, tortuous veins. The diagnosis is:",
          opts: ["Central retinal vein occlusion", "Central retinal artery occlusion", "Diabetic retinopathy", "Hypertensive retinopathy", "Retinal detachment"],
          correct: 0,
          exp: "CRVO: sudden vision loss, diffuse retinal hemorrhages, 'blood and thunder' appearance." },
        { q: "A 50-year-old man with acute, painful red eye, halos around lights, and a fixed, mid‑dilated pupil. The most likely diagnosis is:",
          opts: ["Acute angle‑closure glaucoma", "Uveitis", "Conjunctivitis", "Corneal ulcer", "Scleritis"],
          correct: 0,
          exp: "Acute angle‑closure glaucoma: severe pain, redness, halos, fixed mid‑dilated pupil, nausea/vomiting." },
        { q: "A 30-year-old woman with red eye, photophobia, and small pupil. Slit lamp shows cells in anterior chamber. The diagnosis is:",
          opts: ["Anterior uveitis (iritis)", "Conjunctivitis", "Acute glaucoma", "Corneal abrasion", "Episcleritis"],
          correct: 0,
          exp: "Anterior uveitis: red eye, photophobia, small pupil, cells in anterior chamber." },
        { q: "A 60-year-old man with painless, progressive vision loss, and cataract on exam. The most likely diagnosis is:",
          opts: ["Cataract", "Glaucoma", "Macular degeneration", "Diabetic retinopathy", "Retinal detachment"],
          correct: 0,
          exp: "Cataract: painless, progressive blurring, lens opacity." },
        { q: "A 70-year-old woman with gradual loss of central vision, difficulty reading, and drusen on fundoscopy. The diagnosis is:",
          opts: ["Age‑related macular degeneration (dry type)", "Diabetic retinopathy", "Glaucoma", "Cataract", "Hypertensive retinopathy"],
          correct: 0,
          exp: "Dry AMD: gradual central vision loss, drusen, geographic atrophy." },
        { q: "A 40-year-old man with chronic, painless, watery discharge from the eye, and a swelling in the medial canthus. The most likely diagnosis is:",
          opts: ["Nasolacrimal duct obstruction", "Dacryocystitis", "Conjunctivitis", "Chalazion", "Hordeolum"],
          correct: 0,
          exp: "Nasolacrimal duct obstruction: epiphora (watering), may lead to dacryocystitis if infected." },
        { q: "A 25-year-old woman with a painful, red, swollen eyelid, localized to a single follicle. The diagnosis is:",
          opts: ["Hordeolum (stye)", "Chalazion", "Blepharitis", "Dacryocystitis", "Cellulitis"],
          correct: 0,
          exp: "Hordeolum: acute staphylococcal infection of eyelash follicle or gland." },
        { q: "A 30-year-old man with a painless, firm nodule on the eyelid. The diagnosis is:",
          opts: ["Chalazion", "Hordeolum", "Blepharitis", "Dacryocystitis", "Xanthelasma"],
          correct: 0,
          exp: "Chalazion: chronic granulomatous inflammation of meibomian gland, painless." },
        { q: "A 50-year-old man with progressive hearing loss and tinnitus. He has a history of loud noise exposure. Weber test lateralizes to the better ear. This suggests:",
          opts: ["Sensorineural hearing loss", "Conductive hearing loss", "Mixed hearing loss", "Central deafness", "Normal hearing"],
          correct: 0,
          exp: "Sensorineural loss: Weber lateralizes to better ear (good ear), Rinne is normal (air > bone in both ears)." },
        { q: "A 60-year-old man with unilateral hearing loss and a history of chronic ear infections. Weber test lateralizes to the affected ear. This suggests:",
          opts: ["Conductive hearing loss", "Sensorineural hearing loss", "Mixed hearing loss", "Central deafness", "Normal hearing"],
          correct: 0,
          exp: "Conductive loss: Weber lateralizes to affected ear, Rinne bone > air (abnormal)." },
        { q: "A 70-year-old man with progressive hearing loss, tinnitus, and a normal otoscopic exam. The most likely diagnosis is:",
          opts: ["Presbycusis (age‑related sensorineural loss)", "Otosclerosis", "Meniere disease", "Acoustic neuroma", "Cerumen impaction"],
          correct: 0,
          exp: "Presbycusis: bilateral, high‑frequency sensorineural hearing loss due to aging." },
        { q: "A 40-year-old woman with episodic vertigo, fluctuating hearing loss, tinnitus, and aural fullness. The diagnosis is:",
          opts: ["Meniere disease", "Benign paroxysmal positional vertigo (BPPV)", "Vestibular neuritis", "Labyrinthitis", "Acoustic neuroma"],
          correct: 0,
          exp: "Meniere disease: episodic vertigo, hearing loss, tinnitus, aural fullness (endolymphatic hydrops)." }
    ];
    // Add extra to reach 65
    const extra = [
        { q: "A 50-year-old woman with episodic vertigo triggered by head movement, lasting seconds. Dix‑Hallpike maneuver reproduces symptoms. The diagnosis is:",
          opts: ["Benign paroxysmal positional vertigo (BPPV)", "Meniere disease", "Vestibular neuritis", "Labyrinthitis", "Vertebrobasilar insufficiency"],
          correct: 0,
          exp: "BPPV: brief episodes of vertigo with head movement, positive Dix‑Hallpike test." },
        { q: "A 30-year-old man with acute, severe vertigo lasting days, nausea, vomiting, and nystagmus. No hearing loss. He had a viral illness 2 weeks ago. The diagnosis is:",
          opts: ["Vestibular neuritis", "Labyrinthitis", "Meniere disease", "BPPV", "Stroke"],
          correct: 0,
          exp: "Vestibular neuritis: acute, prolonged vertigo, no hearing loss; often post‑viral." },
        { q: "A 40-year-old man with fever, chills, and a painful, swollen, erythematous pinna. The most likely diagnosis is:",
          opts: ["Perichondritis", "Otitis externa", "Cellulitis", "Mastoiditis", "Chondrodermatitis"],
          correct: 0,
          exp: "Perichondritis: infection of the pinna (often Pseudomonas), pain, swelling, erythema." },
        { q: "A 60-year-old diabetic man with severe ear pain, purulent discharge, and granulation tissue in the ear canal. He has facial nerve palsy. The diagnosis is:",
          opts: ["Malignant (necrotizing) otitis externa", "Acute otitis media", "Mastoiditis", "Cholesteatoma", "Otitis externa"],
          correct: 0,
          exp: "Malignant otitis externa: invasive Pseudomonas infection in diabetics/immunocompromised, can cause cranial nerve palsies." },
        { q: "A 30-year-old man with hearing loss and tinnitus. Audiometry shows a conductive loss. On exam, the tympanic membrane is intact but there is a whitish mass behind it. The diagnosis is:",
          opts: ["Otosclerosis", "Cholesteatoma", "Otitis media with effusion", "Tympanosclerosis", "Glomus tumor"],
          correct: 0,
          exp: "Otosclerosis: abnormal bone remodeling of otic capsule, causes conductive hearing loss, often with family history." },
        { q: "A 40-year-old man with unilateral hearing loss, tinnitus, and imbalance. MRI shows a mass at the cerebellopontine angle. The diagnosis is:",
          opts: ["Acoustic neuroma (vestibular schwannoma)", "Meningioma", "Cholesteatoma", "Glomus jugulare", "Metastasis"],
          correct: 0,
          exp: "Acoustic neuroma: benign Schwann cell tumor of CN VIII, presents with sensorineural hearing loss, tinnitus, imbalance." }
    ];
    const allQuestions = questions.concat(extra); // now 65+

    // Shuffle
    let shuffled = allQuestions.sort(()=>0.5-Math.random());
    let currentIndex = 0;
    let userAnswers = new Array(shuffled.length).fill(null);
    let showExplanation = new Array(shuffled.length).fill(false);
    const letters = ['A','B','C','D','E'];

    function render() {
        const q = shuffled[currentIndex];
        document.getElementById('questionText').innerText = q.q;
        let optsHtml = '';
        q.opts.forEach((opt, idx) => {
            let cls = 'option';
            if (userAnswers[currentIndex] === idx) cls += ' selected';
            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                if (idx === q.correct) cls += ' correct';
                else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
            }
            optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
        });
        document.getElementById('optionsContainer').innerHTML = optsHtml;

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                let idx = parseInt(opt.dataset.idx);
                if (userAnswers[currentIndex] === idx) {
                    userAnswers[currentIndex] = null;
                    showExplanation[currentIndex] = false;
                } else {
                    userAnswers[currentIndex] = idx;
                    showExplanation[currentIndex] = true;
                }
                render();
            });
        });

        if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
            document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
            document.getElementById('explanation').classList.add('show');
        } else {
            document.getElementById('explanation').classList.remove('show');
        }

        document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
        let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
        document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
        document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

        // dots
        let dots = '';
        for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
            let cls = 'dot';
            if (i === currentIndex) cls += ' active';
            if (userAnswers[i] !== null) cls += ' answered';
            dots += `<div class="${cls}" data-index="${i}"></div>`;
        }
        document.getElementById('dotsContainer').innerHTML = dots;
        document.querySelectorAll('.dot').forEach(d => {
            d.addEventListener('click', () => {
                let idx = parseInt(d.dataset.index);
                if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                    currentIndex = idx;
                    render();
                }
            });
        });
    }

    document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
    render();
</script>
</body>
</html>
