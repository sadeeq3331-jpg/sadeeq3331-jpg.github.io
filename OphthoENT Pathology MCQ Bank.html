          opts: ["Chlamydia trachomatis", "Neisseria gonorrhoeae", "Haemophilus aegyptius", "Adenovirus", "Moraxella"],
          correct: 0,
          exp: "Trachoma is chronic keratoconjunctivitis from repeated Chlamydia infection, leading to scarring and blindness." },
        { q: "Ophthalmia neonatorum is often due to:",
          opts: ["Neisseria gonorrhoeae or Chlamydia trachomatis acquired during birth", "Staphylococcus aureus", "HSV", "Pseudomonas", "Chemical irritation"],
          correct: 0,
          exp: "Chemical conjunctivitis (silver nitrate) also occurs but infectious causes require treatment." },
        { q: "Retinopathy of prematurity is caused by:",
          opts: ["Oxygen toxicity leading to abnormal retinal vessel development", "Genetic mutation", "Infection", "Trauma", "Nutritional deficiency"],
          correct: 0,
          exp: "High oxygen in preterm infants suppresses VEGF, then relative hypoxia causes neovascularization." },
        { q: "Coats' disease is:",
          opts: ["Retinal telangiectasia with exudation, often unilateral in young males", "Retinoblastoma", "Retinal detachment", "Diabetic retinopathy", "Macular degeneration"],
          correct: 0,
          exp: "Coats' disease presents with leukocoria due to exudative retinal detachment." },
        { q: "Malignant otitis externa is a severe infection, usually in diabetics, caused by:",
          opts: ["Pseudomonas aeruginosa", "Staphylococcus aureus", "Aspergillus", "Candida", "Proteus"],
          correct: 0,
          exp: "Malignant otitis externa spreads to skull base; requires IV antibiotics and often ENT consult." },
        { q: "Fungal sinusitis (e.g., Aspergillus) can cause:",
          opts: ["Allergic fungal sinusitis, fungus ball, or invasive disease in immunocompromised", "Acute bacterial sinusitis", "Nasal polyps only", "Orbital cellulitis", "Cavernous sinus thrombosis"],
          correct: 0,
          exp: "Aspergillus can cause non‑invasive or invasive sinus disease depending on immune status." },
        { q: "Cavernous sinus thrombosis can complicate facial infections due to spread via:",
          opts: ["Facial vein (valveless) to cavernous sinus", "Lymphatics", "Arterial supply", "Direct extension", "Nerve sheaths"],
          correct: 0,
          exp: "Facial infections (e.g., from nose, upper lip) can spread through angular vein to cavernous sinus." },
        { q: "Ludwig's angina is:",
          opts: ["Bilateral cellulitis of submandibular space, often from dental infection", "Peritonsillar abscess", "Retropharyngeal abscess", "Epiglottitis", "Parotitis"],
          correct: 0,
          exp: "Ludwig's angina is rapidly progressive, can cause airway compromise." },
        { q: "Retropharyngeal abscess is most common in:",
          opts: ["Young children (suppuration of retropharyngeal nodes)", "Elderly", "Immunocompromised", "Diabetics", "Adults with dental infections"],
          correct: 0,
          exp: "Retropharyngeal nodes atrophy by age 5, so abscess is rare in older children/adults." },
        { q: "Lemierre's syndrome is caused by:",
          opts: ["Fusobacterium necrophorum pharyngitis leading to septic thrombophlebitis of internal jugular vein", "Group A Strep", "Staph aureus", "Anaerobes", "EBV"],
          correct: 0,
          exp: "Lemierre's: oropharynx infection → septic emboli to lungs, etc." }
    ];
    const allQuestions = questions.concat(extra); // now 65

    // Shuffle
    let shuffled = allQuestions.sort(()=>0.5-Math.random());
    let currentIndex = 0;
    let userAnswers = new Array(shuffled.length).fill(null);
    let showExplanation = new Array(shuffled.length).fill(false);
    const letters = ['A','B','C','D','E'];

    function render() {
        const q = shuffled[currentIndex];
        document.getElementById('questionText').innerText = q.q;
        let optsHtml = '';
        q.opts.forEach((opt, idx) => {
            let cls = 'option';
            if (userAnswers[currentIndex] === idx) cls += ' selected';
            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                if (idx === q.correct) cls += ' correct';
                else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
            }
            optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
        });
        document.getElementById('optionsContainer').innerHTML = optsHtml;

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                let idx = parseInt(opt.dataset.idx);
                if (userAnswers[currentIndex] === idx) {
                    userAnswers[currentIndex] = null;
                    showExplanation[currentIndex] = false;
                } else {
                    userAnswers[currentIndex] = idx;
                    showExplanation[currentIndex] = true;
                }
                render();
            });
        });

        if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
            document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
            document.getElementById('explanation').classList.add('show');
        } else {
            document.getElementById('explanation').classList.remove('show');
        }

        document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
        let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
        document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
        document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

        // dots
        let dots = '';
        for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
            let cls = 'dot';
            if (i === currentIndex) cls += ' active';
            if (userAnswers[i] !== null) cls += ' answered';
            dots += `<div class="${cls}" data-index="${i}"></div>`;
        }
        document.getElementById('dotsContainer').innerHTML = dots;
        document.querySelectorAll('.dot').forEach(d => {
            d.addEventListener('click', () => {
                let idx = parseInt(d.dataset.index);
                if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                    currentIndex = idx;
                    render();
                }
            });
        });
    }

    document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
    render();
</script>
</body>
</html>
