            // Basic reactions
            { q: "Which of the following is the characteristic histologic finding in neurons after acute global ischemia?",
              opts: ["Central chromatolysis", "Red neuron (eosinophilic change)", "Neurofibrillary tangle", "Lewy body", "Granulovacuolar degeneration"],

            { q: "Progressive multifocal leukoencephalopathy (PML) is caused by which virus?",

            { q: "Parkinson disease is characterized by degeneration of which neuronal population?",

            { q: "The characteristic intraneuronal inclusion in Parkinson disease is:",

            { q: "Which of the following is the most common primary brain tumor in adults?",

            { q: "Glioblastoma multiforme (WHO grade 4) is characterized histologically by:",

            { q: "Failure of the neural tube to close results in:",

        const extraQuestions = [
            { q: "Which of the following is a feature of chronic traumatic encephalopathy (CTE)?",

              exp: "**NF2** is characterized by **bilateral vestibular schwannomas** (acoustic neuromas), meningiomas, and ependymomas." },
            { q: "In tuberous sclerosis, subependymal nodules can evolve into which tumor?",
              opts: ["Subependymal giant cell astrocytoma", "Ependymoma", "Choroid plexus papilloma", "Central neurocytoma", "Pilocytic astrocytoma"],
              correct: 0,
              exp: "Subependymal nodules in tuberous sclerosis can grow into **subependymal giant cell astrocytoma** (SEGA)." },
            { q: "Which of the following is a characteristic of amyotrophic lateral sclerosis?",
              opts: ["Dementia precedes motor symptoms", "Sensory loss is common", "Extraocular muscles are spared", "Autonomic dysfunction is prominent", "Onset is always asymmetric"],
              correct: 2,
              exp: "In ALS, **extraocular muscles** and sphincters are typically spared until very late." },
            { q: "The pathologic hallmark of Alzheimer disease in the entorhinal cortex is:",
              opts: ["Lewy bodies", "Pick bodies", "Neurofibrillary tangles", "Granulovacuolar degeneration", "Hirano bodies"],
              correct: 2,
              exp: "**Neurofibrillary tangles** first appear in the transentorhinal region and spread hierarchically (Braak stages)." },
            { q: "Which of the following is a risk factor for cerebral amyloid angiopathy?",
              opts: ["Hypertension", "Diabetes", "APOE ε4 allele", "Smoking", "Male sex"],
              correct: 2,
              exp: "**APOE ε4** increases risk for cerebral amyloid angiopathy, which causes lobar hemorrhages in the elderly." },
            { q: "A patient with progressive weakness and fasciculations is found to have frontotemporal dementia. Which genetic mutation is most likely?",
              opts: ["SOD1", "C9orf72", "TARDBP", "FUS", "VCP"],
              correct: 1,
              exp: "**C9orf72** hexanucleotide repeat expansion is the most common genetic cause of ALS and frontotemporal dementia." }
        ];

        const allQuestions = [...questions, ...extraQuestions];
        // shuffle for variety
        let shuffled = allQuestions.sort(()=>0.5-Math.random());
        let currentIndex = 0;
        let userAnswers = new Array(shuffled.length).fill(null);
        let showExplanation = new Array(shuffled.length).fill(false);
        const letters = ['A','B','C','D','E'];

        function render() {
            const q = shuffled[currentIndex];
            document.getElementById('questionText').innerText = q.q;
            let optsHtml = '';
            q.opts.forEach((opt, idx) => {
                let cls = 'option';
                if (userAnswers[currentIndex] === idx) cls += ' selected';
                if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                    if (idx === q.correct) cls += ' correct';
                    else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
                }
                optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
            });
            document.getElementById('optionsContainer').innerHTML = optsHtml;

            document.querySelectorAll('.option').forEach(opt => {
                opt.addEventListener('click', () => {
                    let idx = parseInt(opt.dataset.idx);
                    if (userAnswers[currentIndex] === idx) {
                        userAnswers[currentIndex] = null;
                        showExplanation[currentIndex] = false;
                    } else {
                        userAnswers[currentIndex] = idx;
                        showExplanation[currentIndex] = true;
                    }
                    render();
                });
            });

            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
                document.getElementById('explanation').classList.add('show');
            } else {
                document.getElementById('explanation').classList.remove('show');
            }

            document.getElementById('qCounter').innerText = `Question ${currentIndex+1}/${shuffled.length}`;
            let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
            document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}/${shuffled.length}`;
            document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

            // dots
            let dots = '';
            for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
                let cls = 'dot';
                if (i === currentIndex) cls += ' active';
                if (userAnswers[i] !== null) cls += ' answered';
                dots += `<div class="${cls}" data-index="${i}"></div>`;
            }
            document.getElementById('dotsContainer').innerHTML = dots;
            document.querySelectorAll('.dot').forEach(d => {
                d.addEventListener('click', () => {
                    let idx = parseInt(d.dataset.index);
                    if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                        currentIndex = idx;
                        render();
                    }
                });
            });
        }

        document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
        document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
        render();
    </script>
</body>
</html>
