          opts: ["Prokaryotic mRNA (ribosome binding site)", "Eukaryotic mRNA", "tRNA", "rRNA", "DNA promoters"],
          correct: 0,
          exp: "Shine‑Dalgarno (AGGAGG) pairs with 16S rRNA in prokaryotes." },
        { q: "The Kozak consensus sequence is important for:",
          opts: ["Initiation of translation in eukaryotes", "Splicing", "Transcription termination", "Polyadenylation", "RNA stability"],
          correct: 0,
          exp: "Kozak sequence (GCC(A/G)CCAUGG) surrounds start codon in eukaryotes." },
        { q: "Northern blotting is used to detect:",
          opts: ["RNA", "DNA", "Protein", "Lipids", "Carbohydrates"],
          correct: 0,
          exp: "Northern: RNA; Southern: DNA; Western: protein." },
        { q: "Western blotting uses antibodies to detect:",
          opts: ["Proteins", "DNA", "RNA", "Lipids", "Glycogen"],
          correct: 0,
          exp: "Western blot: protein detection with specific antibodies." },
        { q: "Polymerase chain reaction (PCR) requires all EXCEPT:",
          opts: ["RNA polymerase", "Taq polymerase", "Primers", "dNTPs", "DNA template"],
          correct: 0,
          exp: "PCR uses DNA polymerase (Taq), not RNA polymerase." }
    ];
    // Add extra to reach 65
    const extra = [
        { q: "The enzyme responsible for removing RNA primers and replacing with DNA in prokaryotes is:",
          opts: ["DNA polymerase I", "DNA polymerase III", "DNA polymerase α", "RNase H", "Primase"],
          correct: 0,
          exp: "DNA polymerase I has 5'→3' exonuclease activity to remove primers and fill gaps." },
        { q: "Topoisomerase II (DNA gyrase) in bacteria is inhibited by:",
          opts: ["Quinolones (e.g., ciprofloxacin)", "Actinomycin D", "Rifampin", "Tetracycline", "Erythromycin"],
          correct: 0,
          exp: "Quinolones inhibit DNA gyrase (topoisomerase II) in bacteria." },
        { q: "Rifampin inhibits bacterial RNA synthesis by binding to:",
          opts: ["RNA polymerase β subunit", "DNA gyrase", "Ribosome", "DNA template", "RNA polymerase α subunit"],
          correct: 0,
          exp: "Rifampin inhibits prokaryotic RNA polymerase." },
        { q: "Cycloheximide inhibits protein synthesis in:",
          opts: ["Eukaryotes (60S ribosomal subunit)", "Prokaryotes (50S)", "Both", "Mitochondria", "Chloroplasts"],
          correct: 0,
          exp: "Cycloheximide blocks peptidyl transferase in eukaryotes." },
        { q: "Puromycin causes premature chain release because it:",
          opts: ["Resembles aminoacyl‑tRNA, enters A site", "Blocks peptidyl transferase", "Inhibits translocation", "Binds EF‑G", "Binds 30S subunit"],
          correct: 0,
          exp: "Puromycin structure mimics tyrosine‑tRNA, causing premature termination." },
        { q: "A restriction enzyme that recognizes a 6‑bp palindrome on average cuts every:",
          opts: ["4096 bp", "256 bp", "1024 bp", "65536 bp", "64 bp"],
          correct: 0,
          exp: "Probability of a specific 6‑bp sequence is (1/4)⁶ = 1/4096." },
        { q: "A plasmid vector must contain which element for selection in bacteria?",
          opts: ["Antibiotic resistance gene", "Origin of replication", "Multiple cloning site", "Promoter", "Ribosome binding site"],
          correct: 0,
          exp: "Selectable marker (e.g., ampicillin resistance) allows only transformed bacteria to grow." },
        { q: "cDNA is synthesized from mRNA using the enzyme:",
          opts: ["Reverse transcriptase", "RNA polymerase", "DNA polymerase", "Primase", "Ligase"],
          correct: 0,
          exp: "Reverse transcriptase makes complementary DNA (cDNA) from mRNA." },
        { q: "The CRISPR‑Cas system provides bacteria with:",
          opts: ["Adaptive immunity against phages", "Resistance to antibiotics", "Metabolic regulation", "DNA repair", "Competence"],
          correct: 0,
          exp: "CRISPR stores DNA fragments of invaders; Cas proteins cleave foreign DNA." },
        { q: "In the lac operon, allolactose acts as an inducer by:",
          opts: ["Binding to Lac repressor, preventing DNA binding", "Activating RNA polymerase", "Blocking CAP binding", "Increasing cAMP", "Degrading lactose"],
          correct: 0,
          exp: "Allolactose (or IPTG) binds repressor, inactivating it." }
    ];
    const allQuestions = questions.concat(extra); // now 65+

    // Shuffle
    let shuffled = allQuestions.sort(()=>0.5-Math.random());
    let currentIndex = 0;
    let userAnswers = new Array(shuffled.length).fill(null);
    let showExplanation = new Array(shuffled.length).fill(false);
    const letters = ['A','B','C','D','E'];

    function render() {
        const q = shuffled[currentIndex];
        document.getElementById('questionText').innerText = q.q;
        let optsHtml = '';
        q.opts.forEach((opt, idx) => {
            let cls = 'option';
            if (userAnswers[currentIndex] === idx) cls += ' selected';
            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                if (idx === q.correct) cls += ' correct';
                else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
            }
            optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
        });
        document.getElementById('optionsContainer').innerHTML = optsHtml;

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                let idx = parseInt(opt.dataset.idx);
                if (userAnswers[currentIndex] === idx) {
                    userAnswers[currentIndex] = null;
                    showExplanation[currentIndex] = false;
                } else {
                    userAnswers[currentIndex] = idx;
                    showExplanation[currentIndex] = true;
                }
                render();
            });
        });

        if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
            document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
            document.getElementById('explanation').classList.add('show');
        } else {
            document.getElementById('explanation').classList.remove('show');
        }

        document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
        let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
        document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
        document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

        // dots
        let dots = '';
        for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
            let cls = 'dot';
            if (i === currentIndex) cls += ' active';
            if (userAnswers[i] !== null) cls += ' answered';
            dots += `<div class="${cls}" data-index="${i}"></div>`;
        }
        document.getElementById('dotsContainer').innerHTML = dots;
        document.querySelectorAll('.dot').forEach(d => {
            d.addEventListener('click', () => {
                let idx = parseInt(d.dataset.index);
                if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                    currentIndex = idx;
                    render();
                }
            });
        });
    }

    document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
    render();
</script>
</body>
</html>
