        { q: "Korsakoff syndrome (anterograde amnesia, confabulation) results from:",
          opts: ["Chronic thiamine deficiency, often after Wernicke", "B12 deficiency", "Alcohol intoxication", "Head trauma", "Infection"],
          correct: 0,
          exp: "Wernicke‑Korsakoff syndrome: untreated Wernicke leads to Korsakoff." },
        { q: "A patient with repeated episodes of binge eating, then vomiting, and has dental erosion and parotid swelling likely has:",
          opts: ["Bulimia nervosa", "Anorexia nervosa", "Binge‑eating disorder", "GERD", "Rumination disorder"],
          correct: 0,
          exp: "Bulimia: purging can cause electrolyte imbalances, dental erosion, parotitis." },
        { q: "A patient with delusions of infidelity (partner cheating) without other psychotic symptoms likely has:",
          opts: ["Delusional disorder, jealous type", "Schizophrenia", "OCD", "Borderline personality", "Substance‑induced psychosis"],
          correct: 0,
          exp: "Delusional disorder: non‑bizarre delusions for ≥1 month, functioning not markedly impaired." },
        { q: "A patient with a fixed belief that a famous person is in love with them, but no other symptoms, has:",
          opts: ["Erotomanic delusion (de Clérambault syndrome)", "Grandiose delusion", "Persecutory delusion", "Somatic delusion", "Mixed delusion"],
          correct: 0,
          exp: "Erotomania: belief another (often higher status) is in love with the patient." },
        { q: "Cotard delusion is the belief that:",
          opts: ["One is dead or does not exist", "One's body is rotting", "One is being controlled", "Thoughts are being inserted", "A famous person is in love with them"],
          correct: 0,
          exp: "Cotard syndrome: nihilistic delusions." },
        { q: "Capgras delusion is the belief that:",
          opts: ["A familiar person has been replaced by an imposter", "One's thoughts are being broadcast", "One is being followed", "Events have personal significance", "One has superpowers"],
          correct: 0,
          exp: "Capgras: misidentification delusion, often in neurodegenerative disease or psychosis." },
        { q: "Fregoli delusion is the belief that:",
          opts: ["Different people are actually a single person in disguise", "One is being impersonated", "One's body is changing", "Aliens are controlling one", "One is famous"],
          correct: 0,
          exp: "Fregoli: hyperidentification, seeing familiar person in others." },
        { q: "Intermetamorphosis is the belief that:",
          opts: ["People swap identities", "One is dead", "One is being followed", "Thoughts are inserted", "Partner is unfaithful"],
          correct: 0,
          exp: "Rare delusion: people change into others physically and psychologically." }
    ];
    const allQuestions = questions.concat(extra); // now 65

    // Shuffle
    let shuffled = allQuestions.sort(()=>0.5-Math.random());
    let currentIndex = 0;
    let userAnswers = new Array(shuffled.length).fill(null);
    let showExplanation = new Array(shuffled.length).fill(false);
    const letters = ['A','B','C','D','E'];

    function render() {
        const q = shuffled[currentIndex];
        document.getElementById('questionText').innerText = q.q;
        let optsHtml = '';
        q.opts.forEach((opt, idx) => {
            let cls = 'option';
            if (userAnswers[currentIndex] === idx) cls += ' selected';
            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                if (idx === q.correct) cls += ' correct';
                else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
            }
            optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
        });
        document.getElementById('optionsContainer').innerHTML = optsHtml;

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                let idx = parseInt(opt.dataset.idx);
                if (userAnswers[currentIndex] === idx) {
                    userAnswers[currentIndex] = null;
                    showExplanation[currentIndex] = false;
                } else {
                    userAnswers[currentIndex] = idx;
                    showExplanation[currentIndex] = true;
                }
                render();
            });
        });

        if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
            document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
            document.getElementById('explanation').classList.add('show');
        } else {
            document.getElementById('explanation').classList.remove('show');
        }

        document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
        let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
        document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
        document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

        // dots
        let dots = '';
        for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
            let cls = 'dot';
            if (i === currentIndex) cls += ' active';
            if (userAnswers[i] !== null) cls += ' answered';
            dots += `<div class="${cls}" data-index="${i}"></div>`;
        }
        document.getElementById('dotsContainer').innerHTML = dots;
        document.querySelectorAll('.dot').forEach(d => {
            d.addEventListener('click', () => {
                let idx = parseInt(d.dataset.index);
                if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                    currentIndex = idx;
                    render();
                }
            });
        });
    }

    document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
    render();
</script>
</body>
</html>
