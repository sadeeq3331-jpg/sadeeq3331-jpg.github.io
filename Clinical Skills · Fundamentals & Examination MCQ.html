          exp: "Rinne test: air conduction should be greater than bone conduction (positive Rinne)." },
        { q: "Weber test lateralizes to the affected ear in:",
          opts: ["Conductive hearing loss", "Sensorineural hearing loss", "Both", "Neither", "Central deafness"],
          correct: 0,
          exp: "In conductive loss, sound lateralizes to affected ear; in sensorineural, to normal ear." },
        { q: "A positive Rinne (AC > BC) but Weber lateralizes to the opposite ear suggests:",
          opts: ["Sensorineural loss in opposite ear", "Conductive loss in same ear", "Normal hearing", "Central lesion", "Cochlear damage"],
          correct: 0,
          exp: "If Rinne is normal, but Weber lateralizes, there may be sensorineural loss in the opposite ear." },
        { q: "The whisper test is used to screen for:",
          opts: ["Hearing loss", "Visual acuity", "Speech discrimination", "Central auditory processing", "Tinnitus"],
          correct: 0,
          exp: "Whisper test: examiner whispers 2 feet behind patient; inability to repeat indicates hearing loss." },
        { q: "Inspect the tympanic membrane; the cone of light is located at the:",
          opts: ["5 o'clock (right ear) and 7 o'clock (left ear)", "12 o'clock", "3 o'clock", "9 o'clock", "Posterior superior quadrant"],
          correct: 0,
          exp: "The light reflex is at 5 o'clock in right ear, 7 o'clock in left ear." },
        { q: "Mallampati classification assesses:",
          opts: ["Oropharyngeal view (predicts difficult intubation)", "Tonsil size", "Pharyngeal erythema", "Uvula size", "Dental occlusion"],
          correct: 0,
          exp: "Mallampati score (I‑IV) grades visibility of faucial pillars, soft palate, and uvula." },
        { q: "The Broca area is located in the:",
          opts: ["Left frontal lobe (speech production)", "Left temporal lobe", "Parietal lobe", "Occipital lobe", "Cerebellum"],
          correct: 0,
          exp: "Broca area (posterior inferior frontal gyrus) is responsible for speech production." },
        { q: "Wernicke area is responsible for:",
          opts: ["Speech comprehension", "Speech production", "Reading", "Writing", "Articulation"],
          correct: 0,
          exp: "Wernicke area (superior temporal gyrus) is involved in language comprehension." },
        { q: "Glasgow Coma Scale (GCS) assesses:",
          opts: ["Eye opening, verbal response, motor response", "Pupillary response, motor, sensory", "Orientation, memory, attention", "Level of consciousness only", "Motor strength only"],
          correct: 0,
          exp: "GCS scores range 3‑15; 15 = fully alert." },
        { q: "The mini‑mental state examination (MMSE) evaluates:",
          opts: ["Cognition (orientation, memory, attention, language)", "Mood", "Psychosis", "Intelligence", "Personality"],
          correct: 0,
          exp: "MMSE screens for dementia by testing cognitive domains." },
        { q: "Cushing's triad (hypertension, bradycardia, irregular respiration) indicates:",
          opts: ["Increased intracranial pressure", "Hypovolemic shock", "Septic shock", "Cardiac tamponade", "Aortic dissection"],
          correct: 0,
          exp: "Cushing's triad is a late sign of brain herniation from elevated ICP." }
    ];
    // Add extra to reach 65
    const extra = [
        { q: "The 'gold standard' for diagnosing carpal tunnel syndrome is:",
          opts: ["Nerve conduction studies", "Tinel sign", "Phalen maneuver", "MRI", "Ultrasound"],
          correct: 0,
          exp: "Nerve conduction studies confirm median nerve slowing across the wrist." },
        { q: "The Lachman test is performed with the knee at what angle?",
          opts: ["20‑30° flexion", "Full extension", "90° flexion", "45° flexion", "0° extension"],
          correct: 0,
          exp: "Lachman test is done with knee in slight flexion (20‑30°) to assess ACL." },
        { q: "Anterior drawer test of the knee assesses which ligament?",
          opts: ["Anterior cruciate ligament (ACL)", "Posterior cruciate ligament (PCL)", "Medial collateral ligament (MCL)", "Lateral collateral ligament (LCL)", "Meniscus"],
          correct: 0,
          exp: "Anterior drawer test: tibia pulls forward abnormally with ACL injury." },
        { q: "Posterior drawer test assesses which ligament?",
          opts: ["Posterior cruciate ligament (PCL)", "ACL", "MCL", "LCL", "Meniscus"],
          correct: 0,
          exp: "PCL injury allows posterior translation of tibia." },
        { q: "Valgus stress test at 30° flexion assesses:",
          opts: ["Medial collateral ligament (MCL)", "Lateral collateral ligament (LCL)", "ACL", "PCL", "Meniscus"],
          correct: 0,
          exp: "Valgus stress (applied to lateral knee) tests MCL; varus tests LCL." },
        { q: "The Jobe test (empty can test) is used to assess:",
          opts: ["Supraspinatus tendon", "Infraspinatus", "Subscapularis", "Biceps tendon", "Labrum"],
          correct: 0,
          exp: "Jobe test: resisted elevation in scapular plane; weakness indicates supraspinatus pathology." },
        { q: "The Hawkins test is used to assess:",
          opts: ["Impingement syndrome (supraspinatus)", "Rotator cuff tear", "Labral tear", "AC joint arthritis", "Frozen shoulder"],
          correct: 0,
          exp: "Hawkins test: forced internal rotation of abducted arm reproduces impingement pain." },
        { q: "The Neer test is also for:",
          opts: ["Shoulder impingement", "Rotator cuff tear", "Labral tear", "AC joint injury", "Adhesive capsulitis"],
          correct: 0,
          exp: "Neer test: forced forward flexion of arm causes pain in impingement." },
        { q: "Speed test is used to assess:",
          opts: ["Biceps tendinopathy (long head)", "Supraspinatus", "Infraspinatus", "Subscapularis", "Rotator cuff"],
          correct: 0,
          exp: "Speed test: resisted forward flexion with elbow extended; pain in bicipital groove suggests biceps tendinitis." },
        { q: "The Yergason test is also for:",
          opts: ["Biceps tendinopathy", "Supraspinatus impingement", "Rotator cuff tear", "Labral tear", "AC joint arthritis"],
          correct: 0,
          exp: "Yergason test: resisted supination with elbow flexed; pain indicates biceps tendinopathy." },
        { q: "The Phalen test (wrist flexion) is positive in:",
          opts: ["Carpal tunnel syndrome", "Ulnar neuropathy", "Radial tunnel syndrome", "De Quervain tenosynovitis", "Trigger finger"],
          correct: 0,
          exp: "Phalen test: holding wrists in full flexion for 60 seconds reproduces median nerve symptoms." }
    ];
    const allQuestions = questions.concat(extra); // now 65+

    // Shuffle
    let shuffled = allQuestions.sort(()=>0.5-Math.random());
    let currentIndex = 0;
    let userAnswers = new Array(shuffled.length).fill(null);
    let showExplanation = new Array(shuffled.length).fill(false);
    const letters = ['A','B','C','D','E'];

    function render() {
        const q = shuffled[currentIndex];
        document.getElementById('questionText').innerText = q.q;
        let optsHtml = '';
        q.opts.forEach((opt, idx) => {
            let cls = 'option';
            if (userAnswers[currentIndex] === idx) cls += ' selected';
            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                if (idx === q.correct) cls += ' correct';
                else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
            }
            optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
        });
        document.getElementById('optionsContainer').innerHTML = optsHtml;

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                let idx = parseInt(opt.dataset.idx);
                if (userAnswers[currentIndex] === idx) {
                    userAnswers[currentIndex] = null;
                    showExplanation[currentIndex] = false;
                } else {
                    userAnswers[currentIndex] = idx;
                    showExplanation[currentIndex] = true;
                }
                render();
            });
        });

        if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
            document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
            document.getElementById('explanation').classList.add('show');
        } else {
            document.getElementById('explanation').classList.remove('show');
        }

        document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
        let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
        document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
        document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

        // dots
        let dots = '';
        for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
            let cls = 'dot';
            if (i === currentIndex) cls += ' active';
            if (userAnswers[i] !== null) cls += ' answered';
            dots += `<div class="${cls}" data-index="${i}"></div>`;
        }
        document.getElementById('dotsContainer').innerHTML = dots;
        document.querySelectorAll('.dot').forEach(d => {
            d.addEventListener('click', () => {
                let idx = parseInt(d.dataset.index);
                if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                    currentIndex = idx;
                    render();
                }
            });
        });
    }

    document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
    render();
</script>
</body>
</html>
