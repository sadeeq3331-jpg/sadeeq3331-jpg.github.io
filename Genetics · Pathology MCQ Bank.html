          exp: "BRAF V600E activates MAPK pathway; target of vemurafenib." },
        { q: "ALK rearrangements (e.g., EML4‑ALK) are found in:",
          opts: ["Non‑small cell lung cancer", "Breast cancer", "Colon cancer", "Melanoma", "Leukemia"],
          correct: 0,
          exp: "ALK fusions are targetable with crizotinib, alectinib." },
        { q: "RB1 gene mutations are classically associated with:",
          opts: ["Retinoblastoma, osteosarcoma", "Breast cancer", "Colon cancer", "Lung cancer", "Leukemia"],
          correct: 0,
          exp: "RB1 is the first tumor suppressor discovered." },
        { q: "VHL gene mutations are associated with which renal tumor?",
          opts: ["Clear cell renal cell carcinoma", "Papillary renal cell carcinoma", "Chromophobe renal carcinoma", "Oncocytoma", "Wilms tumor"],
          correct: 0,
          exp: "VHL inactivation leads to HIF accumulation, promoting angiogenesis and clear cell RCC." }
    ];
    // Add extra to reach 65
    const extra = [
        { q: "Which of the following is a feature of Li‑Fraumeni syndrome?",
          opts: ["Early‑onset sarcomas, breast cancer, brain tumors", "Colon polyps", "Renal cell carcinoma", "Pancreatic neuroendocrine tumors", "Pheochromocytoma"],
          correct: 0,
          exp: "Li‑Fraumeni (TP53 mutation) includes sarcomas, breast cancer, brain tumors, adrenocortical carcinoma." },
        { q: "Cowden syndrome (PTEN mutation) is associated with:",
          opts: ["Breast cancer, thyroid cancer, hamartomas", "Colon cancer", "Renal cancer", "Melanoma", "Leukemia"],
          correct: 0,
          exp: "PTEN is a tumor suppressor; Cowden syndrome includes hamartomas, breast, thyroid cancer." },
        { q: "Peutz‑Jeghers syndrome (STK11 mutation) is characterized by:",
          opts: ["Hamartomatous polyps, mucocutaneous pigmentation, cancer risk", "Adenomatous polyps", "Colorectal cancer", "Breast cancer", "Pancreatic cancer"],
          correct: 0,
          exp: "STK11 (LKB1) is tumor suppressor; patients have freckles and GI polyps." },
        { q: "Neurofibromatosis type 2 (NF2) is associated with:",
          opts: ["Bilateral vestibular schwannomas (acoustic neuromas)", "Neurofibromas", "Café‑au‑lait spots", "Lisch nodules", "Optic glioma"],
          correct: 0,
          exp: "NF2 (chromosome 22) presents with schwannomas, meningiomas, ependymomas." },
        { q: "Tuberous sclerosis (TSC1/TSC2) is characterized by:",
          opts: ["Hamartomas in multiple organs (skin, brain, kidney, heart)", "Neurofibromas", "Schwannomas", "Retinal hemangioblastomas", "Pancreatic tumors"],
          correct: 0,
          exp: "TSC: cortical tubers, renal angiomyolipomas, cardiac rhabdomyomas, seizures." },
        { q: "Incontinentia pigmenti is an X‑linked dominant disorder that is usually:",
          opts: ["Lethal in males", "Lethal in females", "Asymptomatic in males", "More severe in females", "Equal severity"],
          correct: 0,
          exp: "X‑linked dominant disorders are often lethal in males (e.g., incontinentia pigmenti, Rett syndrome)." },
        { q: "Rett syndrome (MECP2 mutation) affects predominantly:",
          opts: ["Females (lethal in males)", "Males", "Both equally", "Only females after puberty", "Only infants"],
          correct: 0,
          exp: "Rett: X‑linked dominant, lethal in males; females develop normally then regress." },
        { q: "Which of the following is a trinucleotide repeat disorder that shows anticipation and is caused by a CAG repeat?",
          opts: ["Huntington disease", "Fragile X", "Myotonic dystrophy", "Friedreich ataxia", "Spinocerebellar ataxia type 1"],
          correct: 0,
          exp: "Huntington (CAG), spinocerebellar ataxias (CAG) show anticipation; fragile X (CGG), myotonic dystrophy (CTG), Friedreich (GAA)." },
        { q: "Charcot‑Marie‑Tooth disease type 1A is most commonly caused by:",
          opts: ["Duplication of PMP22 gene", "Deletion of PMP22", "Point mutation in MPZ", "Mutation in GJB1 (Cx32)", "Mutation in MFN2"],
          correct: 0,
          exp: "CMT1A: duplication of PMP22 leads to demyelinating neuropathy." },
        { q: "Hereditary neuropathy with liability to pressure palsies (HNPP) is caused by:",
          opts: ["Deletion of PMP22", "Duplication of PMP22", "Point mutation in PMP22", "Mutation in MPZ", "Mutation in GJB1"],
          correct: 0,
          exp: "HNPP: deletion of PMP22 causes focal pressure neuropathies." },
        { q: "Alpha‑1 antitrypsin deficiency is an autosomal recessive disorder that predisposes to:",
          opts: ["Emphysema (panacinar) and cirrhosis", "Bronchiectasis", "Asthma", "Interstitial lung disease", "Lung cancer"],
          correct: 0,
          exp: "α1‑AT deficiency: PiZZ genotype; loss of inhibition of neutrophil elastase." }
    ];
    const allQuestions = questions.concat(extra); // now 65+

    // Shuffle
    let shuffled = allQuestions.sort(()=>0.5-Math.random());
    let currentIndex = 0;
    let userAnswers = new Array(shuffled.length).fill(null);
    let showExplanation = new Array(shuffled.length).fill(false);
    const letters = ['A','B','C','D','E'];

    function render() {
        const q = shuffled[currentIndex];
        document.getElementById('questionText').innerText = q.q;
        let optsHtml = '';
        q.opts.forEach((opt, idx) => {
            let cls = 'option';
            if (userAnswers[currentIndex] === idx) cls += ' selected';
            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                if (idx === q.correct) cls += ' correct';
                else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
            }
            optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
        });
        document.getElementById('optionsContainer').innerHTML = optsHtml;

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                let idx = parseInt(opt.dataset.idx);
                if (userAnswers[currentIndex] === idx) {
                    userAnswers[currentIndex] = null;
                    showExplanation[currentIndex] = false;
                } else {
                    userAnswers[currentIndex] = idx;
                    showExplanation[currentIndex] = true;
                }
                render();
            });
        });

        if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
            document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
            document.getElementById('explanation').classList.add('show');
        } else {
            document.getElementById('explanation').classList.remove('show');
        }

        document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
        let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
        document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
        document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

        // dots
        let dots = '';
        for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
            let cls = 'dot';
            if (i === currentIndex) cls += ' active';
            if (userAnswers[i] !== null) cls += ' answered';
            dots += `<div class="${cls}" data-index="${i}"></div>`;
        }
        document.getElementById('dotsContainer').innerHTML = dots;
        document.querySelectorAll('.dot').forEach(d => {
            d.addEventListener('click', () => {
                let idx = parseInt(d.dataset.index);
                if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                    currentIndex = idx;
                    render();
                }
            });
        });
    }

    document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
    render();
</script>
</body>
</html>
