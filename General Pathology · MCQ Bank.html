          exp: "Methotrexate inhibits DHFR and also increases adenosine, which has anti‑inflammatory effects." },
        { q: "Cyclosporine inhibits T‑cell activation by binding to:",
          opts: ["Cyclophilin and inhibiting calcineurin", "FKBP12 and inhibiting mTOR", "NF‑κB", "IL‑2 receptor", "CD28"],
          correct: 0,
          exp: "Cyclosporine binds cyclophilin, inhibiting calcineurin and IL‑2 transcription." },
        { q: "Which antibiotic inhibits bacterial cell wall synthesis?",
          opts: ["Penicillin", "Tetracycline", "Erythromycin", "Ciprofloxacin", "Sulfamethoxazole"],
          correct: 0,
          exp: "Penicillins and cephalosporins inhibit cell wall synthesis." },
        { q: "The mechanism of action of statins is:",
          opts: ["Inhibition of HMG‑CoA reductase", "Inhibition of cholesterol absorption", "Increase LDL receptor expression", "Activation of PPAR‑α", "Inhibition of PCSK9"],
          correct: 0,
          exp: "Statins competitively inhibit HMG‑CoA reductase." }
    ];
    // Add extra to reach 65
    const extra = [
        { q: "Which of the following is a common side effect of glucocorticoids?",
          opts: ["Osteoporosis", "Hypoglycemia", "Hypotension", "Weight loss", "Diarrhea"],
          correct: 0,
          exp: "Glucocorticoids cause osteoporosis, hyperglycemia, weight gain, and immunosuppression." },
        { q: "Warfarin exerts its anticoagulant effect by:",
          opts: ["Inhibiting vitamin K‑dependent synthesis of factors II, VII, IX, X", "Activating antithrombin III", "Inhibiting factor Xa", "Inhibiting thrombin", "Blocking platelet aggregation"],
          correct: 0,
          exp: "Warfarin inhibits vitamin K epoxide reductase, reducing carboxylation of clotting factors." },
        { q: "The antidote for heparin is:",
          opts: ["Protamine sulfate", "Vitamin K", "Fresh frozen plasma", "Tranexamic acid", "Aminocaproic acid"],
          correct: 0,
          exp: "Protamine binds and neutralizes heparin." },
        { q: "Methotrexate toxicity can be reversed by:",
          opts: ["Leucovorin (folinic acid)", "Folic acid", "Vitamin B12", "N‑acetylcysteine", "Methylene blue"],
          correct: 0,
          exp: "Leucovorin bypasses DHFR inhibition, rescuing normal cells." },
        { q: "Imatinib is a tyrosine kinase inhibitor used for:",
          opts: ["CML (BCR‑ABL positive)", "Breast cancer", "Lung cancer", "Melanoma", "Colon cancer"],
          correct: 0,
          exp: "Imatinib targets BCR‑ABL in CML, also c‑KIT in GIST." },
        { q: "Which of the following is a prodrug that requires activation by CYP2D6?",
          opts: ["Codeine", "Morphine", "Fentanyl", "Methadone", "Naloxone"],
          correct: 0,
          exp: "Codeine is converted to morphine by CYP2D6." }
    ];
    const allQuestions = questions.concat(extra); // now 65+

    // Shuffle
    let shuffled = allQuestions.sort(()=>0.5-Math.random());
    let currentIndex = 0;
    let userAnswers = new Array(shuffled.length).fill(null);
    let showExplanation = new Array(shuffled.length).fill(false);
    const letters = ['A','B','C','D','E'];

    function render() {
        const q = shuffled[currentIndex];
        document.getElementById('questionText').innerText = q.q;
        let optsHtml = '';
        q.opts.forEach((opt, idx) => {
            let cls = 'option';
            if (userAnswers[currentIndex] === idx) cls += ' selected';
            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                if (idx === q.correct) cls += ' correct';
                else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
            }
            optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
        });
        document.getElementById('optionsContainer').innerHTML = optsHtml;

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                let idx = parseInt(opt.dataset.idx);
                if (userAnswers[currentIndex] === idx) {
                    userAnswers[currentIndex] = null;
                    showExplanation[currentIndex] = false;
                } else {
                    userAnswers[currentIndex] = idx;
                    showExplanation[currentIndex] = true;
                }
                render();
            });
        });

        if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
            document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
            document.getElementById('explanation').classList.add('show');
        } else {
            document.getElementById('explanation').classList.remove('show');
        }

        document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
        let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
        document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
        document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

        // dots
        let dots = '';
        for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
            let cls = 'dot';
            if (i === currentIndex) cls += ' active';
            if (userAnswers[i] !== null) cls += ' answered';
            dots += `<div class="${cls}" data-index="${i}"></div>`;
        }
        document.getElementById('dotsContainer').innerHTML = dots;
        document.querySelectorAll('.dot').forEach(d => {
            d.addEventListener('click', () => {
                let idx = parseInt(d.dataset.index);
                if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                    currentIndex = idx;
                    render();
                }
            });
        });
    }

    document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
    render();
</script>
</body>
</html>
