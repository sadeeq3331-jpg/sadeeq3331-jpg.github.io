          correct: 0,
          exp: "Iron‑deferoxamine complex colors urine pinkish (vin rosé)." },
        { q: "Dimercaprol (BAL) is used as an antidote for poisoning with:",
          opts: ["Arsenic, mercury, lead (with EDTA)", "Cyanide", "Organophosphates", "Carbon monoxide", "Acetaminophen"],
          correct: 0,
          exp: "Dimercaprol chelates heavy metals like arsenic, mercury, and lead (often combined with EDTA)." },
        { q: "EDTA (calcium disodium edetate) is used in lead poisoning. It can cause:",
          opts: ["Nephrotoxicity", "Hepatotoxicity", "Neurotoxicity", "Cardiotoxicity", "Bone marrow suppression"],
          correct: 0,
          exp: "EDTA can cause renal tubular necrosis; hydration is important." },
        { q: "Succimer (DMSA) is an oral chelating agent used for:",
          opts: ["Lead, mercury, arsenic poisoning", "Iron poisoning", "Copper poisoning (Wilson's)", "Cyanide poisoning", "Organophosphates"],
          correct: 0,
          exp: "Succimer is less toxic than dimercaprol and can be given orally for mild‑moderate lead poisoning." },
        { q: "Penicillamine is used in Wilson's disease (copper chelation) and also in:",
          opts: ["Cystinuria (prevents cystine stones)", "Lead poisoning", "Arsenic poisoning", "Rheumatoid arthritis (DMARD)", "Both A and D"],
          correct: 4,
          exp: "Penicillamine chelates copper and also reduces cystine excretion; used in RA but less now." },
        { q: "Sodium thiosulfate is used with sodium nitrite in cyanide poisoning. The nitrite induces methemoglobinemia, which:",
          opts: ["Binds cyanide, forming cyanomethemoglobin", "Reduces cyanide toxicity", "Increases cyanide excretion", "Blocks cytochrome oxidase", "None"],
          correct: 0,
          exp: "Nitrite forms methemoglobin, which binds cyanide; thiosulfate converts cyanide to thiocyanate." },
        { q: "Hydroxocobalamin (vitamin B12a) is an alternative antidote for cyanide poisoning. It works by:",
          opts: ["Binding cyanide to form cyanocobalamin", "Inducing methemoglobin", "Chelating cyanide", "Blocking cytochrome oxidase", "Increasing excretion"],
          correct: 0,
          exp: "Hydroxocobalamin directly binds cyanide to form non‑toxic cyanocobalamin (vitamin B12)." },
        { q: "Methylene blue is used to treat methemoglobinemia. It acts by:",
          opts: ["Reducing methemoglobin via NADPH methemoglobin reductase", "Oxidizing hemoglobin", "Chelating iron", "Inducing CYP450", "Blocking oxidative stress"],
          correct: 0,
          exp: "Methylene blue (IV) accelerates NADPH‑dependent reduction of methemoglobin to hemoglobin." },
        { q: "Methylene blue is contraindicated in G6PD deficiency because:",
          opts: ["It can cause hemolysis (due to oxidative stress)", "It is ineffective", "It causes methemoglobinemia", "It causes hypotension", "It causes seizures"],
          correct: 0,
          exp: "In G6PD deficiency, methylene blue can worsen oxidative stress and precipitate hemolysis." }
    ];
    // Add extra to reach 65
    const extra = [
        { q: "Amifostine is a cytoprotective agent used to reduce cisplatin‑induced nephrotoxicity. It also protects against:",
          opts: ["Radiation‑induced xerostomia", "Doxorubicin cardiotoxicity", "Cyclophosphamide cystitis", "Methotrexate hepatotoxicity", "5‑FU mucositis"],
          correct: 0,
          exp: "Amifostine (WR‑2721) is a free radical scavenger; approved for radiation‑induced xerostomia and cisplatin nephrotoxicity." },
        { q: "Palifermin (recombinant human keratinocyte growth factor) is used to reduce mucositis in patients receiving:",
          opts: ["Chemoradiotherapy for hematologic cancers", "Cisplatin", "Doxorubicin", "Taxanes", "5‑FU"],
          correct: 0,
          exp: "Palifermin stimulates epithelial cell growth, reducing oral mucositis." },
        { q: "Rasburicase (recombinant urate oxidase) is used in tumor lysis syndrome. It is contraindicated in G6PD deficiency because:",
          opts: ["It produces hydrogen peroxide (oxidant stress)", "It causes hemolysis", "It is ineffective", "It causes methemoglobinemia", "Both A and B"],
          correct: 4,
          exp: "Urate oxidase converts uric acid to allantoin and H₂O₂; G6PD deficiency increases oxidative damage." },
        { q: "Levocarnitine (L‑carnitine) is used in primary and secondary carnitine deficiency. It is also used in:",
          opts: ["Valproic acid overdose (to reduce hyperammonemia)", "Statins for myopathy", "Dialysis", "Inborn errors of metabolism", "All of the above"],
          correct: 4,
          exp: "Carnitine binds valproate metabolites and restores mitochondrial function." },
        { q: "Sapropterin (Kuvan) is a synthetic form of tetrahydrobiopterin (BH4) used to treat:",
          opts: ["Phenylketonuria (BH4‑responsive patients)", "Tyrosinemia", "Homocystinuria", "Maple syrup urine disease", "Alkaptonuria"],
          correct: 0,
          exp: "Sapropterin enhances residual phenylalanine hydroxylase activity in some PKU patients." },
        { q: "Nitisinone (NTBC) is used in tyrosinemia type I. It inhibits:",
          opts: ["4‑hydroxyphenylpyruvate dioxygenase (HPPD)", "Fumarylacetoacetate hydrolase", "Tyrosine aminotransferase", "Homogentisate oxidase", "Phenylalanine hydroxylase"],
          correct: 0,
          exp: "Nitisinone prevents accumulation of toxic metabolites upstream of fumarylacetoacetate." },
        { q: "Cysteamine (mercaptamine) is used in nephropathic cystinosis. It works by:",
          opts: ["Depleting cystine by converting to cysteine and mixed disulfide", "Chelating cystine", "Increasing cystine excretion", "Inhibiting cystine synthesis", "Replacing cysteine"],
          correct: 0,
          exp: "Cysteamine reacts with cystine to form cysteine‑cysteamine mixed disulfide, which exits lysosomes." },
        { q: "Betaine is used in homocystinuria to:",
          opts: ["Lower homocysteine by converting it to methionine (betaine:homocysteine methyltransferase)", "Increase cystathionine", "Inhibit homocysteine synthesis", "Provide methyl groups", "Chelate homocysteine"],
          correct: 0,
          exp: "Betaine donates a methyl group to homocysteine, forming methionine." },
        { q: "Miglitol and acarbose are α‑glucosidase inhibitors. Miglitol differs from acarbose in that:",
          opts: ["It is a monosaccharide derivative and absorbed", "It is more potent", "It has fewer GI side effects", "It also inhibits pancreatic amylase", "It is longer acting"],
          correct: 0,
          exp: "Miglitol is a monosaccharide analog that is absorbed, while acarbose is a tetrasaccharide that acts locally." },
        { q: "Pramlintide is an amylin analog used in diabetes. It works by:",
          opts: ["Slowing gastric emptying, suppressing glucagon", "Increasing insulin secretion", "Blocking SGLT2", "Activating GLP‑1 receptors", "Inhibiting DPP‑4"],
          correct: 0,
          exp: "Pramlintide (amylin mimetic) is given with insulin to improve glycemic control." },
        { q: "Exenatide is a GLP‑1 receptor agonist derived from Gila monster saliva. Its half‑life is short; a once‑weekly formulation uses:",
          opts: ["Microspheres (exenatide extended‑release)", "PEGylation", "Albumin fusion", "Liposomes", "Prodrug"],
          correct: 0,
          exp: "Exenatide once‑weekly (Bydureon) uses microsphere technology for sustained release." }
    ];
    const allQuestions = questions.concat(extra); // now 65+

    // Shuffle
    let shuffled = allQuestions.sort(()=>0.5-Math.random());
    let currentIndex = 0;
    let userAnswers = new Array(shuffled.length).fill(null);
    let showExplanation = new Array(shuffled.length).fill(false);
    const letters = ['A','B','C','D','E'];

    function render() {
        const q = shuffled[currentIndex];
        document.getElementById('questionText').innerText = q.q;
        let optsHtml = '';
        q.opts.forEach((opt, idx) => {
            let cls = 'option';
            if (userAnswers[currentIndex] === idx) cls += ' selected';
            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                if (idx === q.correct) cls += ' correct';
                else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
            }
            optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
        });
        document.getElementById('optionsContainer').innerHTML = optsHtml;

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                let idx = parseInt(opt.dataset.idx);
                if (userAnswers[currentIndex] === idx) {
                    userAnswers[currentIndex] = null;
                    showExplanation[currentIndex] = false;
                } else {
                    userAnswers[currentIndex] = idx;
                    showExplanation[currentIndex] = true;
                }
                render();
            });
        });

        if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
            document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
            document.getElementById('explanation').classList.add('show');
        } else {
            document.getElementById('explanation').classList.remove('show');
        }

        document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
        let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
        document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
        document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

        // dots
        let dots = '';
        for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
            let cls = 'dot';
            if (i === currentIndex) cls += ' active';
            if (userAnswers[i] !== null) cls += ' answered';
            dots += `<div class="${cls}" data-index="${i}"></div>`;
        }
        document.getElementById('dotsContainer').innerHTML = dots;
        document.querySelectorAll('.dot').forEach(d => {
            d.addEventListener('click', () => {
                let idx = parseInt(d.dataset.index);
                if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                    currentIndex = idx;
                    render();
                }
            });
        });
    }

    document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
    render();
</script>
</body>
</html>
