<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renal Pharmacology · MCQ Bank</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(145deg, #eef2f7, #d9e2ec);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,20,40,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 95vh;
            max-height: 900px;
        }
        .header {
            background: linear-gradient(135deg, #0b2f4e, #1a4d7a);
            color: white;
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-bottom: 4px solid #ffc107;
        }
        .header i { font-size: 2.2rem; color: #ffc107; }
        .header h1 {
            font-weight: 600;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }
        .header .credit {
            margin-left: auto;
            background: rgba(255,255,255,0.15);
            padding: 0.4rem 1.5rem;
            border-radius: 40px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header .credit i { font-size: 1.2rem; color: #ffc107; }
        .progress-area {
            padding: 1rem 2rem;
            background: #f8fafd;
            border-bottom: 1px solid #dde5ed;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .progress-bar {
            flex: 2;
            height: 10px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0b2f4e, #2c7cb0);
            width: 0%;
            transition: width 0.3s;
        }
        .stats {
            display: flex;
            gap: 1.5rem;
            font-weight: 600;
            color: #1e4b6e;
        }
        .stats span {
            background: white;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .question-container {
            flex: 1;
            padding: 2rem 2rem 1rem;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #b0c4de #f1f5f9;
        }
        .question-container::-webkit-scrollbar { width: 8px; }
        .question-container::-webkit-scrollbar-track { background: #f1f5f9; }
        .question-container::-webkit-scrollbar-thumb { background: #b0c4de; border-radius: 10px; }
        .question-text {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0a2942;
            line-height: 1.5;
            margin-bottom: 1.8rem;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .option {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            padding: 1rem 1.8rem;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px -8px rgba(0,0,0,0.1);
        }
        .option:hover {
            border-color: #2c7cb0;
            background: #f0f7ff;
            transform: translateX(6px);
        }
        .option.selected {
            border-color: #0b2f4e;
            background: #e5eff9;
        }
        .option.correct {
            border-color: #28a745;
            background: #e1f7e7;
        }
        .option.wrong {
            border-color: #dc3545;
            background: #ffe6e8;
        }
        .option-letter {
            width: 40px;
            height: 40px;
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #0a2942;
            font-size: 1.2rem;
        }
        .option.selected .option-letter { background: #0b2f4e; color: white; }
        .explanation {
            background: #f0f9ff;
            border-left: 6px solid #2c7cb0;
            border-radius: 20px;
            padding: 1.5rem;
            margin-top: 2rem;
            display: none;
        }
        .explanation.show { display: block; }
        .nav-buttons {
            padding: 1.5rem 2rem;
            background: #f8fafd;
            border-top: 1px solid #dde5ed;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        .btn {
            background: white;
            border: 2px solid #1a4d7a;
            color: #1a4d7a;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
        }
        .btn:hover:not(:disabled) { background: #1a4d7a; color: white; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; border-color: #b0c4de; }
        .btn-primary { background: #1a4d7a; color: white; }
        .dots {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .dot {
            width: 30px;
            height: 6px;
            border-radius: 6px;
            background: #d0e0f0;
            transition: 0.2s;
            cursor: pointer;
        }
        .dot.active { background: #1a4d7a; width: 45px; }
        .dot.answered { background: #28a745; }
        @media (max-width: 700px) {
            .header { flex-wrap: wrap; }
            .progress-area { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <i class="fas fa-kidney"></i>
            <h1>Renal Pharmacology · MCQ Bank</h1>
            <div class="credit"><i class="fas fa-user-md"></i> Abubakar Sadeeq</div>
        </div>
        <div class="progress-area">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="stats">
                <span id="qCounter">0/60</span>
                <span id="scoreDisplay">Score: 0</span>
            </div>
        </div>
        <div class="question-container" id="questionContainer">
            <div class="question-text" id="questionText">Loading...</div>
            <div class="options" id="optionsContainer"></div>
            <div class="explanation" id="explanation"></div>
        </div>
        <div class="nav-buttons">
            <button class="btn" id="prevBtn" disabled><i class="fas fa-arrow-left"></i> Previous</button>
            <div class="dots" id="dotsContainer"></div>
            <button class="btn btn-primary" id="nextBtn">Next <i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <script>
        // 60+ UNIQUE RENAL PHARMACOLOGY QUESTIONS
        const questions = [
            { q: "Loop diuretics inhibit which transporter?",
              opts: ["NKCC2", "NCC", "ENaC", "Na⁺/K⁺ ATPase", "Carbonic anhydrase"],
              correct: 0,
              exp: "Loop diuretics block NKCC2 in thick ascending limb." },
            { q: "Which diuretic is most effective in a patient with GFR <30 mL/min?",
              opts: ["Hydrochlorothiazide", "Furosemide", "Spironolactone", "Amiloride", "Triamterene"],
              correct: 1,
              exp: "Loop diuretics remain effective in CKD; thiazides lose efficacy." },
            { q: "Furosemide can cause ototoxicity when given:",
              opts: ["Orally", "Intravenously rapidly", "With food", "At bedtime", "With potassium"],
              correct: 1,
              exp: "Rapid IV administration of loop diuretics can cause ototoxicity." },
            { q: "A common electrolyte disturbance caused by loop diuretics is:",
              opts: ["Hyperkalemia", "Hypokalemia", "Hypercalcemia", "Hypermagnesemia", "Hypernatremia"],
              correct: 1,
              exp: "Loop diuretics cause hypokalemia, hypomagnesemia." },
            { q: "Thiazide diuretics act on the:",
              opts: ["Proximal tubule", "Thick ascending limb", "Distal convoluted tubule", "Collecting duct", "Glomerulus"],
              correct: 2,
              exp: "Thiazides inhibit NCC in DCT." },
            { q: "Hydrochlorothiazide can cause all of the following EXCEPT:",
              opts: ["Hypokalemia", "Hyperglycemia", "Hyperuricemia", "Hypercalcemia", "Hypercalciuria"],
              correct: 4,
              exp: "Thiazides decrease calcium excretion (cause hypercalcemia, not hypercalciuria)." },
            { q: "A patient on hydrochlorothiazide develops hyponatremia. This is due to:",
              opts: ["Excess sodium loss", "Impaired water excretion", "Increased thirst", "SIADH", "Adrenal insufficiency"],
              correct: 1,
              exp: "Thiazides impair urinary dilution, predisposing to hyponatremia." },
            { q: "Spironolactone is a competitive antagonist of:",
              opts: ["Aldosterone", "ADH", "Angiotensin II", "Atrial natriuretic peptide", "Renin"],
              correct: 0,
              exp: "Spironolactone blocks aldosterone receptors." },
            { q: "Gynecomastia is a side effect of:",
              opts: ["Spironolactone", "Eplerenone", "Amiloride", "Triamterene", "Furosemide"],
              correct: 0,
              exp: "Spironolactone causes anti‑androgenic effects (gynecomastia)." },
            { q: "Eplerenone is more selective for which receptor?",
              opts: ["Mineralocorticoid", "Glucocorticoid", "Androgen", "Progesterone", "Estrogen"],
              correct: 0,
              exp: "Eplerenone selectively blocks aldosterone receptors with fewer endocrine effects." },
            { q: "Amiloride blocks which channel in the collecting duct?",
              opts: ["ENaC", "ROMK", "Na‑K‑2Cl", "Na‑Cl", "H⁺‑ATPase"],
              correct: 0,
              exp: "Amiloride inhibits ENaC, reducing Na⁺ reabsorption and K⁺ secretion." },
            { q: "Triamterene is a potassium‑sparing diuretic that can cause:",
              opts: ["Hypokalemia", "Hyperkalemia", "Metabolic acidosis", "Nephrolithiasis", "Both B and C"],
              correct: 4,
              exp: "Triamterene can cause hyperkalemia and metabolic acidosis; also triamterene stones." },
            { q: "Acetazolamide inhibits carbonic anhydrase, leading to:",
              opts: ["Metabolic alkalosis", "Metabolic acidosis", "Respiratory acidosis", "Respiratory alkalosis", "No acid‑base change"],
              correct: 1,
              exp: "Acetazolamide causes bicarbonaturia and metabolic acidosis." },
            { q: "Mannitol is used for:",
              opts: ["Reducing intracranial pressure", "Heart failure", "Hypertension", "Edema", "Cirrhosis"],
              correct: 0,
              exp: "Mannitol is osmotic diuretic used to reduce cerebral edema." },
            { q: "Mannitol is contraindicated in:",
              opts: ["Anuria", "Pulmonary edema", "Intracranial hemorrhage", "Both A and B", "All"],
              correct: 3,
              exp: "Mannitol contraindicated in anuria and pulmonary edema." },
            { q: "ACE inhibitors (e.g., lisinopril) lower blood pressure by:",
              opts: ["Blocking angiotensin II formation", "Blocking AT₁ receptors", "Inhibiting renin", "Increasing bradykinin", "Both A and D"],
              correct: 4,
              exp: "ACE inhibitors reduce angiotensin II and increase bradykinin." },
            { q: "A common side effect of ACE inhibitors is:",
              opts: ["Cough", "Hyperkalemia", "Angioedema", "All of the above", "None"],
              correct: 3,
              exp: "ACE inhibitors cause cough (due to bradykinin), hyperkalemia, and risk of angioedema." },
            { q: "ARBs (e.g., losartan) differ from ACE inhibitors because they:",
              opts: ["Do not cause cough", "Do not cause angioedema", "Do not increase bradykinin", "All of the above", "None"],
              correct: 3,
              exp: "ARBs block AT₁ receptors; they do not affect bradykinin, so no cough." },
            { q: "Aliskiren is a direct renin inhibitor. It is contraindicated with:",
              opts: ["ACE inhibitors in diabetes", "ARBs", "Diuretics", "Beta‑blockers", "Calcium channel blockers"],
              correct: 0,
              exp: "Aliskiren with ACE inhibitors or ARBs in diabetes increases adverse events." },
            { q: "Potassium phosphate binders (e.g., sevelamer) are used to treat:",
              opts: ["Hypophosphatemia", "Hyperphosphatemia", "Hypocalcemia", "Hypercalcemia", "Metabolic acidosis"],
              correct: 1,
              exp: "Phosphate binders lower phosphate in CKD." },
            { q: "Calcium acetate is a phosphate binder; it can cause:",
              opts: ["Hypercalcemia", "Hypocalcemia", "Hypophosphatemia", "Metabolic alkalosis", "None"],
              correct: 0,
              exp: "Calcium‑based binders can cause hypercalcemia." },
            { q: "Erythropoiesis‑stimulating agents (ESAs) are used for anemia of CKD. A potential side effect is:",
              opts: ["Hypertension", "Thrombosis", "Pure red cell aplasia", "All of the above", "None"],
              correct: 3,
              exp: "ESAs can cause hypertension, thrombosis, and rarely pure red cell aplasia." },
            { q: "Paricalcitol is a vitamin D analog used for:",
              opts: ["Hypercalcemia", "Secondary hyperparathyroidism in CKD", "Osteoporosis", "Rickets", "Hypoparathyroidism"],
              correct: 1,
              exp: "Vitamin D analogs suppress PTH in CKD." },
            { q: "Cinacalcet is a calcimimetic that:",
              opts: ["Increases PTH secretion", "Decreases PTH secretion", "Increases calcium", "Decreases phosphate", "Increases calcitriol"],
              correct: 1,
              exp: "Cinacalcet activates calcium‑sensing receptor, lowering PTH." },
            { q: "Allopurinol is used to prevent uric acid stones. Its mechanism is:",
              opts: ["Xanthine oxidase inhibition", "Uricosuric", "Alkalinizing urine", "Binding uric acid", "Inhibiting urate transporter"],
              correct: 0,
              exp: "Allopurinol inhibits xanthine oxidase, reducing uric acid production." },
            { q: "Potassium citrate is used to prevent:",
              opts: ["Calcium oxalate stones", "Uric acid stones", "Cystine stones", "All of the above", "None"],
              correct: 3,
              exp: "Alkaline urine prevents calcium oxalate, uric acid, and cystine stones." },
            { q: "Tiopronin is used for:",
              opts: ["Cystine stones", "Uric acid stones", "Calcium stones", "Struvite stones", "All"],
              correct: 0,
              exp: "Tiopronin binds cysteine, preventing cystine stones." },
            { q: "Acetohydroxamic acid (AHA) is a urease inhibitor used for:",
              opts: ["Struvite stones", "Calcium stones", "Cystine stones", "Uric acid stones", "None"],
              correct: 0,
              exp: "AHA reduces ammonia production and struvite stone formation." },
            { q: "Hydrochlorothiazide is effective in nephrogenic diabetes insipidus because:",
              opts: ["It increases water reabsorption", "It causes paradoxical antidiuresis by volume contraction", "It stimulates ADH release", "It increases thirst", "It acts on collecting duct"],
              correct: 1,
              exp: "Thiazides cause mild volume depletion, increasing proximal water reabsorption, reducing polyuria." },
            { q: "The most common cause of hospital‑acquired acute kidney injury (AKI) is:",
              opts: ["Contrast", "Aminoglycosides", "Ischemia", "NSAIDs", "ACE inhibitors"],
              correct: 2,
              exp: "Ischemic ATN is the most common cause of AKI in hospital." },
            { q: "Aminoglycosides cause nephrotoxicity by:",
              opts: ["Tubular necrosis (proximal tubule)", "Interstitial nephritis", "Glomerulonephritis", "Vasculitis", "Obstructive nephropathy"],
              correct: 0,
              exp: "Aminoglycosides accumulate in proximal tubules, causing ATN." },
            { q: "Contrast‑induced nephropathy is best prevented by:",
              opts: ["IV fluids (normal saline)", "N‑acetylcysteine", "Bicarbonate", "Furosemide", "Mannitol"],
              correct: 0,
              exp: "IV hydration with isotonic saline is the most effective prevention." },
            { q: "Which drug can cause crystal nephropathy (intratubular crystal deposition)?",
              opts: ["Acyclovir", "Indinavir", "Sulfadiazine", "All of the above", "None"],
              correct: 3,
              exp: "Acyclovir, indinavir, sulfadiazine can crystallize in tubules." },
            { q: "Methotrexate is excreted renally and can cause:",
              opts: ["Tubular obstruction", "Interstitial nephritis", "Crystal nephropathy", "All", "None"],
              correct: 2,
              exp: "High‑dose MTX can precipitate in tubules." },
            { q: "Lithium toxicity can cause:",
              opts: ["Nephrogenic DI", "Chronic tubulointerstitial nephritis", "Hypercalcemia", "All of the above", "None"],
              correct: 3,
              exp: "Lithium causes DI, chronic interstitial nephritis, and hypercalcemia." },
            { q: "Calcineurin inhibitors (cyclosporine, tacrolimus) can cause:",
              opts: ["Afferent arteriolar vasoconstriction", "Hypertension", "Hyperkalemia", "All of the above", "None"],
              correct: 3,
              exp: "CNIs cause renal vasoconstriction, hypertension, hyperkalemia, and chronic nephrotoxicity." },
            { q: "NSAIDs can cause acute kidney injury by:",
              opts: ["Inhibiting prostaglandin synthesis", "Afferent arteriolar vasoconstriction", "Acute interstitial nephritis", "All of the above", "None"],
              correct: 3,
              exp: "NSAIDs reduce PGs (afferent dilation), can cause AIN, and rarely minimal change." },
            { q: "The best initial treatment for hyperkalemia in a patient on spironolactone is:",
              opts: ["Calcium gluconate", "Insulin + glucose", "Sodium bicarbonate", "Albuterol", "Furosemide"],
              correct: 0,
              exp: "Calcium stabilizes cardiac membrane; other agents lower K⁺ but calcium is immediate." },
            { q: "Sodium polystyrene sulfonate (Kayexalate) works by:",
              opts: ["Exchanging Na⁺ for K⁺ in gut", "Binding K⁺ in colon", "Increasing renal K⁺ excretion", "Alkalemia", "None"],
              correct: 0,
              exp: "It exchanges sodium for potassium in the colon." }
        ];

        // Add more to reach 60+
        const extra = [
            { q: "Which diuretic is useful in hypercalcemia?",
              opts: ["Furosemide", "Hydrochlorothiazide", "Spironolactone", "Amiloride", "Acetazolamide"],
              correct: 0,
              exp: "Loop diuretics increase calcium excretion." },
            { q: "Which diuretic can cause hypocalcemia?",
              opts: ["Furosemide", "Hydrochlorothiazide", "Spironolactone", "Amiloride", "Triamterene"],
              correct: 0,
              exp: "Loop diuretics increase calcium excretion, thiazides decrease." },
            { q: "Which of the following drugs can cause metabolic alkalosis?",
              opts: ["Loop diuretics", "Thiazides", "Mineralocorticoids", "All of the above", "None"],
              correct: 3,
              exp: "Diuretics (except acetazolamide) and mineralocorticoids cause contraction alkalosis." },
            { q: "Ethacrynic acid is a loop diuretic that is unique because it:",
              opts: ["Is not a sulfonamide", "Can be used in sulfa allergy", "Has higher ototoxicity risk", "All of the above", "None"],
              correct: 3,
              exp: "Ethacrynic acid is non‑sulfonamide but has high ototoxicity." },
            { q: "Indapamide is a thiazide‑like diuretic that also:",
              opts: ["Has vasodilator properties", "Increases HDL", "Causes less hypokalemia", "All", "None"],
              correct: 0,
              exp: "Indapamide has vasodilator effects." },
            { q: "Amiloride can be used in combination with thiazides to:",
              opts: ["Prevent hypokalemia", "Enhance diuresis", "Reduce hypercalcemia", "Prevent hyponatremia", "All"],
              correct: 0,
              exp: "Amiloride offsets potassium loss from thiazides." },
            { q: "The antidote for heparin overdose is:",
              opts: ["Protamine sulfate", "Vitamin K", "Fresh frozen plasma", "Tranexamic acid", "Aminocaproic acid"],
              correct: 0,
              exp: "Protamine neutralizes heparin." },
            { q: "Warfarin is metabolized by CYP450 and is contraindicated in:",
              opts: ["Pregnancy", "Liver disease", "Thrombocytopenia", "Peptic ulcer", "All"],
              correct: 0,
              exp: "Warfarin is teratogenic and contraindicated in pregnancy." },
            { q: "DOACs (apixaban, rivaroxaban) are contraindicated in:",
              opts: ["Mechanical heart valves", "Atrial fibrillation", "DVT", "PE", "None"],
              correct: 0,
              exp: "DOACs are not approved for mechanical valves." }
        ];

        const allQuestions = questions.concat(extra); // now >60

        // Shuffle
        let shuffled = allQuestions.sort(()=>0.5-Math.random());
        let currentIndex = 0;
        let userAnswers = new Array(shuffled.length).fill(null);
        let showExplanation = new Array(shuffled.length).fill(false);
        const letters = ['A','B','C','D','E'];

        function render() {
            const q = shuffled[currentIndex];
            document.getElementById('questionText').innerText = q.q;
            let optsHtml = '';
            q.opts.forEach((opt, idx) => {
                let cls = 'option';
                if (userAnswers[currentIndex] === idx) cls += ' selected';
                if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                    if (idx === q.correct) cls += ' correct';
                    else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
                }
                optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
            });
            document.getElementById('optionsContainer').innerHTML = optsHtml;

            document.querySelectorAll('.option').forEach(opt => {
                opt.addEventListener('click', () => {
                    let idx = parseInt(opt.dataset.idx);
                    if (userAnswers[currentIndex] === idx) {
                        userAnswers[currentIndex] = null;
                        showExplanation[currentIndex] = false;
                    } else {
                        userAnswers[currentIndex] = idx;
                        showExplanation[currentIndex] = true;
                    }
                    render();
                });
            });

            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
                document.getElementById('explanation').classList.add('show');
            } else {
                document.getElementById('explanation').classList.remove('show');
            }

            document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
            let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
            document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
            document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

            // dots
            let dots = '';
            for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
                let cls = 'dot';
                if (i === currentIndex) cls += ' active';
                if (userAnswers[i] !== null) cls += ' answered';
                dots += `<div class="${cls}" data-index="${i}"></div>`;
            }
            document.getElementById('dotsContainer').innerHTML = dots;
            document.querySelectorAll('.dot').forEach(d => {
                d.addEventListener('click', () => {
                    let idx = parseInt(d.dataset.index);
                    if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                        currentIndex = idx;
                        render();
                    }
                });
            });
        }

        document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
        document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
        render();
    </script>
</body>
</html>
