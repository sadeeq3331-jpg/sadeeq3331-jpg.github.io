<script type="module">
    // ==================== FIREBASE INIT ====================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, runTransaction } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCCFB41XAQZ6S0IbBDLI-FjjjE_NlTBS14",
        authDomain: "midlib-e3187.firebaseapp.com",
        projectId: "midlib-e3187",
        storageBucket: "midlib-e3187.firebasestorage.app",
        messagingSenderId: "382363535690",
        appId: "1:382363535690:web:eedfb3639a62faa9a519b3"
    };

    let db;
    try {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        console.log('Firebase initialized');
    } catch (e) {
        console.warn('Firebase init failed:', e);
        db = null;
    }

    // ==================== BOOKS DATABASE ====================
    const books = [ /* ... your books array ... */ ];

    // ==================== FIRESTORE HELPERS ====================
    async function getReaderCount(bookId) {
        if (!db) return 0;
        try {
            const docRef = doc(db, 'books', String(bookId));
            const docSnap = await getDoc(docRef);
            if (!docSnap.exists()) {
                await setDoc(docRef, { count: 0 });
                return 0;
            }
            return docSnap.data().count || 0;
        } catch (e) {
            console.warn('Firestore error (get)', e);
            return 0;
        }
    }

    async function incrementReaderCount(bookId) {
        if (!db) return 0;
        try {
            const docRef = doc(db, 'books', String(bookId));
            return await runTransaction(db, async (transaction) => {
                const docSnap = await transaction.get(docRef);
                if (!docSnap.exists()) {
                    transaction.set(docRef, { count: 1 });
                    return 1;
                } else {
                    const newCount = (docSnap.data().count || 0) + 1;
                    transaction.update(docRef, { count: newCount });
                    return newCount;
                }
            });
        } catch (e) {
            console.warn('Firestore error (increment)', e);
            return 0;
        }
    }

    // ==================== UI FUNCTIONS (make them global) ====================
    window.filterCategory = function(catName) {
        const results = books.filter(b => b.category === catName);
        displayBooks(results, catName + ' Textbooks');
    };

    window.showAllBooks = function() {
        displayBooks(books, 'All Textbooks');
    };

    window.searchBooks = function() {
        const input = document.getElementById('searchInput');
        if (!input) return;
        const term = input.value.toLowerCase().trim();
        if (!term) { showNotification('Please enter a search term.'); return; }
        const results = books.filter(b => 
            b.title.toLowerCase().includes(term) ||
            b.author.toLowerCase().includes(term) ||
            b.category.toLowerCase().includes(term) ||
            (b.subcat && b.subcat.toLowerCase().includes(term))
        );
        if (results.length === 0) {
            showNotification('No books found.');
        } else {
            displayBooks(results, `Search Results for "${term}"`);
        }
    };

    window.openBook = async function(filename, bookId) {
        const viewer = document.getElementById('bookViewer');
        const frame = document.getElementById('bookFrame');
        if (!viewer || !frame) return;
        frame.src = filename;
        viewer.style.display = 'block';
        document.body.style.overflow = 'hidden';
        await incrementReaderCount(bookId);
    };

    window.closeViewer = function() {
        const viewer = document.getElementById('bookViewer');
        const frame = document.getElementById('bookFrame');
        if (viewer) viewer.style.display = 'none';
        if (frame) frame.src = '';
        document.body.style.overflow = 'auto';
    };

    function showNotification(msg) {
        const notif = document.getElementById('notification');
        const msgSpan = document.getElementById('notificationMessage');
        if (notif && msgSpan) {
            msgSpan.innerText = msg;
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 3000);
        }
    }

    async function displayBooks(bookList, title) {
        const main = document.getElementById('mainContent');
        if (!main) return;
        let html = `<div class="section-title"><h2><i class="fas fa-book-open"></i> ${title}</h2><span class="view-all" onclick="location.reload()">Back to Home</span></div>`;
        html += '<div class="book-grid">';
        const cards = await Promise.all(bookList.map(async book => {
            const count = await getReaderCount(book.id);
            return createBookCard(book, count);
        }));
        html += cards.join('');
        html += '</div>';
        main.innerHTML = html;
    }

    function createBookCard(book, count) {
        // Escape filename to prevent HTML injection – but it's safe as it's just a string.
        return `
            <div class="book-card" onclick="openBook('${book.filename}', ${book.id})">
                <div class="book-cover">
                    <i class="fas fa-book"></i>
                    <span class="book-category">${book.category}</span>
                </div>
                <div class="book-info">
                    <div class="book-title">${book.title}</div>
                    <div class="book-author">by ${book.author}</div>
                    <div class="book-stats">
                        <span><i class="fas fa-file-alt"></i> ${book.pages} pages</span>
                        <span><i class="fas fa-users"></i> ${count} readers</span>
                    </div>
                    <button class="read-btn" onclick="event.stopPropagation(); openBook('${book.filename}', ${book.id})">
                        <i class="fas fa-book-open"></i> Read Now
                    </button>
                </div>
            </div>
        `;
    }

    function getCategoryIcon(cat) {
        const icons = {
            'Biochemistry':'fa-flask','Genetics':'fa-dna','Immunology':'fa-shield-alt',
            'Microbiology':'fa-bacteria','General Pathology':'fa-microscope','General Pharmacology':'fa-pills',
            'Research':'fa-chart-bar','Respiratory':'fa-lungs','Cardiology':'fa-heart','Neurology':'fa-brain',
            'Gastroenterology':'fa-stomach','Endocrinology':'fa-hormone','Renal':'fa-kidney','Reproductive':'fa-venus-mars',
            'Musculoskeletal':'fa-bone','Hematology':'fa-blood','Dermatology':'fa-hand','Psychiatry':'fa-brain',
            'Ophthalmology':'fa-eye','Pediatrics':'fa-child','Emergency':'fa-ambulance','Toxicology':'fa-skull-crossbones',
            'Clinical Skills':'fa-stethoscope','Nutrition':'fa-apple-alt'
        };
        return icons[cat] || 'fa-book';
    }

    // ==================== INITIAL PAGE LOAD ====================
    window.addEventListener('load', async () => {
        const main = document.getElementById('mainContent');
        if (!main) return;

        try {
            const featured = books.slice(0,12);
            let html = `<div class="section-title"><h2><i class="fas fa-star" style="color:#ffd966;"></i> Featured Titles</h2><span class="view-all" onclick="showAllBooks()">View All</span></div>`;
            html += '<div class="book-grid">';
            const cards = await Promise.all(featured.map(async book => {
                const count = await getReaderCount(book.id);
                return createBookCard(book, count);
            }));
            html += cards.join('');
            html += '</div>';

            const uniqueCategories = [...new Set(books.map(b => b.category))].filter(c => c !== 'Question Bank');
            html += `<div class="section-title" style="margin-top:3rem;"><h2><i class="fas fa-tags"></i> Browse by Subject</h2></div>`;
            html += '<div class="categories">';
            uniqueCategories.forEach(cat => {
                const icon = getCategoryIcon(cat);
                const count = books.filter(b => b.category === cat).length;
                html += `<div class="category-card" onclick="filterCategory('${cat}')"><i class="fas ${icon}"></i><h3>${cat}</h3><p>${count} books</p></div>`;
            });
            html += '</div>';

            main.innerHTML = html;
        } catch (e) {
            console.error('Error loading page:', e);
            main.innerHTML = '<div style="text-align:center; padding:3rem;">An error occurred loading the library. Please refresh.</div>';
        }
    });

    // Sidebar toggle
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const mainPanel = document.getElementById('mainPanel');
    if (menuToggle && sidebar && mainPanel) {
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            mainPanel.classList.toggle('shifted');
        });
    }
</script>
