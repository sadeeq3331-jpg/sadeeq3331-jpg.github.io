          exp: "RB1 gene (13q14); hereditary form is bilateral, early onset, with osteosarcoma risk." },
        { q: "Rhabdomyosarcoma, the most common soft tissue sarcoma in children, often presents with:",
          opts: ["Head/neck mass, GU mass (botryoid), extremity mass", "Painless abdominal mass", "Lymphadenopathy", "Bone pain", "Proptosis"],
          correct: 0,
          exp: "Rhabdomyosarcoma arises in head/neck, genitourinary tract (bladder, prostate), and extremities." },
        { q: "Leukemia is the most common childhood malignancy. Which type predominates?",
          opts: ["Acute lymphoblastic leukemia (ALL)", "Acute myeloid leukemia (AML)", "Chronic lymphocytic leukemia (CLL)", "Chronic myeloid leukemia (CML)", "Juvenile myelomonocytic leukemia"],
          correct: 0,
          exp: "ALL accounts for 80% of childhood leukemias." },
        { q: "Hodgkin lymphoma in children shows which histologic finding?",
          opts: ["Reed‑Sternberg cells (CD15+, CD30+)", "Small cleaved cells", "Lymphoblasts", "Burkitt cells", "Plasmacytoid lymphocytes"],
          correct: 0,
          exp: "Reed‑Sternberg cells (owl‑eye appearance) are diagnostic of Hodgkin lymphoma." },
        { q: "Burkitt lymphoma is associated with translocation:",
          opts: ["t(8;14) involving c‑myc", "t(14;18) involving bcl‑2", "t(9;22) BCR‑ABL", "t(11;14) cyclin D1", "t(2;5) ALK"],
          correct: 0,
          exp: "t(8;14) places c‑myc next to Ig heavy chain enhancer, causing overexpression." },
        { q: "Kawasaki disease is an acute vasculitis that can cause:",
          opts: ["Coronary artery aneurysms", "Renal artery stenosis", "Pulmonary hemorrhage", "Cerebral vasculitis", "Aortic dissection"],
          correct: 0,
          exp: "Kawasaki disease involves medium vessels, especially coronary arteries, leading to aneurysms." },
        { q: "The most common cause of acquired heart disease in children in developed countries is:",
          opts: ["Kawasaki disease", "Rheumatic fever", "Viral myocarditis", "Cardiomyopathy", "Infective endocarditis"],
          correct: 0,
          exp: "Kawasaki is the leading cause of acquired pediatric heart disease in developed nations." },
        { q: "Rheumatic fever follows infection with:",
          opts: ["Group A Streptococcus", "Staphylococcus aureus", "Streptococcus pneumoniae", "Mycoplasma pneumoniae", "Epstein‑Barr virus"],
          correct: 0,
          exp: "Rheumatic fever occurs 2‑4 weeks after GAS pharyngitis; cross‑reactivity attacks heart, joints, brain." },
        { q: "Jones criteria for rheumatic fever include major criteria:",
          opts: ["Carditis, arthritis, chorea, erythema marginatum, subcutaneous nodules", "Fever, arthralgia, elevated ESR, prolonged PR interval", "Polyarthritis, rash, hepatosplenomegaly", "Endocarditis, myocarditis, pericarditis", "None"],
          correct: 0,
          exp: "Major Jones criteria: carditis, polyarthritis, chorea, erythema marginatum, subcutaneous nodules." },
        { q: "Juvenile idiopathic arthritis (JIA) is defined by arthritis lasting:",
          opts: ["At least 6 weeks", "At least 3 months", "At least 6 months", "At least 1 year", "At least 2 weeks"],
          correct: 0,
          exp: "JIA: arthritis for ≥6 weeks in a child <16 years after excluding other causes." },
        { q: "Systemic JIA (Still disease) presents with:",
          opts: ["Daily high fevers, evanescent rash, hepatosplenomegaly, serositis", "Asymmetric oligoarthritis, ANA positive", "RF‑positive polyarthritis", "Enthesitis, sacroiliitis", "Psoriatic rash, nail pitting"],
          correct: 0,
          exp: "Systemic JIA: quotidian fevers, salmon‑pink rash, organomegaly; can develop macrophage activation syndrome." }
    ];
    // Add extra to reach 65+
    const extra = [
        { q: "Acute post‑streptococcal glomerulonephritis typically presents with:",
          opts: ["Hematuria, hypertension, edema, oliguria", "Nephrotic syndrome", "Rapidly progressive glomerulonephritis", "Asymptomatic hematuria", "Chronic kidney disease"],
          correct: 0,
          exp: "PSGN presents with acute nephritic syndrome 1‑3 weeks after GAS infection (pharyngitis or impetigo)." },
        { q: "Minimal change disease (nil disease) is the most common cause of nephrotic syndrome in children. Its pathology shows:",
          opts: ["Foot process effacement (fusion) on EM, normal light microscopy", "Membranous thickening", "Focal segmental glomerulosclerosis", "Mesangial proliferation", "Crescents"],
          correct: 0,
          exp: "Minimal change: normal light, IgM negative; EM shows podocyte effacement." },
        { q: "Hemolytic uremic syndrome (HUS) classically presents with triad of:",
          opts: ["Microangiopathic hemolytic anemia, thrombocytopenia, acute renal failure", "Hematuria, proteinuria, edema", "Nephrotic syndrome, hypertension, renal failure", "Fever, rash, arthritis", "Jaundice, hepatosplenomegaly, anemia"],
          correct: 0,
          exp: "Typical HUS (Shiga toxin‑producing E. coli) causes MAHA, thrombocytopenia, renal failure." },
        { q: "Which infection is the most common trigger of typical HUS?",
          opts: ["E. coli O157:H7", "Shigella dysenteriae", "Streptococcus pneumoniae", "HIV", "Campylobacter"],
          correct: 0,
          exp: "STEC (E. coli O157) produces Shiga toxin, damaging endothelial cells." },
        { q: "Henoch‑Schönlein purpura (IgA vasculitis) presents with:",
          opts: ["Palpable purpura, arthritis, abdominal pain, hematuria", "Petechiae, epistaxis, hemarthrosis", "Malar rash, oral ulcers, nephritis", "Erythema nodosum, hilar adenopathy", "Vesicles, crusts, itching"],
          correct: 0,
          exp: "HSP: non‑thrombocytopenic purpura (buttocks, legs), arthralgia, GI pain, IgA nephropathy." },
        { q: "Osteogenesis imperfecta is caused by defect in:",
          opts: ["Type I collagen", "Fibrillin", "Dystrophin", "Collagen III", "Elastin"],
          correct: 0,
          exp: "OI: mutations in COL1A1/COL1A2 → brittle bones, blue sclerae, hearing loss." },
        { q: "Which condition presents with "cherry‑red spot" on fundoscopy?",
          opts: ["Tay‑Sachs", "Niemann‑Pick type A", "Central retinal artery occlusion", "All of the above", "None"],
          correct: 3,
          exp: "Cherry‑red spot occurs in Tay‑Sachs, Niemann‑Pick, Sandhoff, and central retinal artery occlusion." },
        { q: "Rickets results from deficiency of:",
          opts: ["Vitamin D", "Vitamin A", "Vitamin C", "Vitamin K", "Vitamin E"],
          correct: 0,
          exp: "Vitamin D deficiency causes defective bone mineralization, leading to bowed legs, rachitic rosary." },
        { q: "Scurvy is caused by deficiency of:",
          opts: ["Vitamin C", "Vitamin B1", "Vitamin B3", "Vitamin B12", "Vitamin A"],
          correct: 0,
          exp: "Vitamin C deficiency impairs collagen synthesis, causing bleeding gums, perifollicular hemorrhages." },
        { q: "Kwashiorkor is characterized by:",
          opts: ["Edema, fatty liver, dermatosis, hypoalbuminemia", "Wasting, no edema, normal albumin", "Obesity, hepatomegaly", "Rickets, bowed legs", "Bleeding gums, poor wound healing"],
          correct: 0,
          exp: "Kwashiorkor (protein deficiency with adequate calories) causes edema, skin lesions, fatty liver." },
        { q: "Marasmus is due to deficiency of:",
          opts: ["Total calories (protein and energy)", "Protein only", "Iron only", "Vitamin D only", "Multiple vitamins"],
          correct: 0,
          exp: "Marasmus is severe wasting (calorie deficiency) with loss of muscle and fat." }
    ];
    const allQuestions = questions.concat(extra); // now 65+

    // Shuffle
    let shuffled = allQuestions.sort(()=>0.5-Math.random());
    let currentIndex = 0;
    let userAnswers = new Array(shuffled.length).fill(null);
    let showExplanation = new Array(shuffled.length).fill(false);
    const letters = ['A','B','C','D','E'];

    function render() {
        const q = shuffled[currentIndex];
        document.getElementById('questionText').innerText = q.q;
        let optsHtml = '';
        q.opts.forEach((opt, idx) => {
            let cls = 'option';
            if (userAnswers[currentIndex] === idx) cls += ' selected';
            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                if (idx === q.correct) cls += ' correct';
                else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
            }
            optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
        });
        document.getElementById('optionsContainer').innerHTML = optsHtml;

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                let idx = parseInt(opt.dataset.idx);
                if (userAnswers[currentIndex] === idx) {
                    userAnswers[currentIndex] = null;
                    showExplanation[currentIndex] = false;
                } else {
                    userAnswers[currentIndex] = idx;
                    showExplanation[currentIndex] = true;
                }
                render();
            });
        });

        if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
            document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
            document.getElementById('explanation').classList.add('show');
        } else {
            document.getElementById('explanation').classList.remove('show');
        }

        document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
        let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
        document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
        document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

        // dots
        let dots = '';
        for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
            let cls = 'dot';
            if (i === currentIndex) cls += ' active';
            if (userAnswers[i] !== null) cls += ' answered';
            dots += `<div class="${cls}" data-index="${i}"></div>`;
        }
        document.getElementById('dotsContainer').innerHTML = dots;
        document.querySelectorAll('.dot').forEach(d => {
            d.addEventListener('click', () => {
                let idx = parseInt(d.dataset.index);
                if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                    currentIndex = idx;
                    render();
                }
            });
        });
    }

    document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
    render();
</script>
</body>
</html>
