        }

            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .option {
            background: white;

            transition: all 0.2s;
            box-shadow: 0 4px 10px -8px rgba(0,0,0,0.1);

        .option:hover {
            border-color: #2c7cb0;
            background: #f0f7ff;
            transform: translateX(6px);
        }
        .option.selected {
            border-color: #0b2f4e;

        }
        .option.correct {
            border-color: #28a745;
            background: #e1f7e7;
        }
        .option.wrong {
            border-color: #dc3545;
            background: #ffe6e8;
        }
        .option-letter {
            width: 40px;
            height: 40px;
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #0a2942;
            font-size: 1.2rem;
        }
        .option.selected .option-letter { background: #0b2f4e; color: white; }
        .explanation {
            background: #f0f9ff;
            border-left: 6px solid #2c7cb0;
            border-radius: 20px;
            padding: 1.5rem;
            margin-top: 2rem;

        .nav-buttons {
            padding: 1.5rem 2rem;

        }
        .btn {

        }
        .btn:hover:not(:disabled) { background: #1a4d7a; color: white; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; border-color: #b0c4de; }
        .btn-primary { background: #1a4d7a; color: white; }

            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .dot {
            width: 30px;
            height: 6px;

        @media (max-width: 700px) {
            .header { flex-wrap: wrap; }
            .progress-area { flex-direction: column; align-items: stretch; }
        }

<body>

    <script>
        // 60+ GIT Physiology Questions
        const questions = [
            { q: "Which of the following is a function of saliva?",
              opts: ["Lubrication", "Starch digestion", "Antibacterial activity", "All of the above", "None"],
              correct: 3,
              exp: "Saliva lubricates (mucus), begins starch digestion (α‑amylase), and contains lysozyme and IgA (antibacterial)." },
            { q: "Salivary secretion is primarily regulated by:",
              opts: ["Hormonal (gastrin)", "Parasympathetic nervous system", "Sympathetic nervous system", "Local reflexes", "Enteric nervous system"],
              correct: 1,
              exp: "Salivation is mainly under neural control – parasympathetic (ACh) stimulates copious watery saliva; sympathetic causes thick mucus." },
            { q: "The pH of saliva is approximately:",
              opts: ["2.0", "4.5", "6.0‑7.0", "7.5‑8.0", "8.5‑9.0"],
              correct: 2,
              exp: "Saliva is slightly acidic to neutral (pH 6.0‑7.0), due to bicarbonate and phosphate buffers." },
            { q: "Parietal cells secrete:",
              opts: ["Pepsinogen", "Gastrin", "Intrinsic factor and HCl", "Mucus", "Somatostatin"],
              correct: 2,
              exp: "Parietal cells produce HCl and intrinsic factor (needed for B12 absorption)." },
            { q: "Which of the following directly stimulates gastric acid secretion?",
              opts: ["Somatostatin", "Secretin", "Gastrin", "GIP", "Glucagon"],
              correct: 2,
              exp: "Gastrin (from G cells) directly stimulates parietal cells and also releases histamine from ECL cells, both increasing acid." },
            { q: "The cephalic phase of gastric secretion is mediated by:",
              opts: ["Vagus nerve (parasympathetic)", "Gastrin", "Distension", "Secretin", "CCK"],
              correct: 0,
              exp: "Cephalic phase (sight, smell, thought) → vagus stimulates parietal cells and G cells." },
            { q: "Secretin is released from duodenal S cells in response to:",
              opts: ["Fatty acids", "Low pH (acid)", "Amino acids", "Carbohydrates", "Distension"],
              correct: 1,
              exp: "Secretin is released when acidic chyme enters duodenum; it stimulates pancreatic bicarbonate secretion to neutralize acid." },
            { q: "CCK stimulates which of the following?",
              opts: ["Pancreatic enzyme secretion", "Gallbladder contraction", "Sphincter of Oddi relaxation", "All of the above", "None"],
              correct: 3,
              exp: "CCK causes pancreatic enzyme secretion, gallbladder contraction, and relaxation of sphincter of Oddi, facilitating fat digestion." },
            { q: "Which enzyme is responsible for activating trypsinogen to trypsin?",
              opts: ["Enterokinase (enteropeptidase)", "Pepsin", "Chymotrypsin", "Carboxypeptidase", "Lipase"],
              correct: 0,
              exp: "Enterokinase on the duodenal brush border converts trypsinogen to trypsin, which then activates other pancreatic zymogens." },
            { q: "Bile salts facilitate fat digestion by:",
              opts: ["Emulsifying fats", "Enzymatic hydrolysis", "Increasing pH", "Coating fat droplets", "Binding fatty acids"],
              correct: 0,
              exp: "Bile salts are amphipathic and emulsify large fat droplets into smaller micelles, increasing surface area for lipase." },
            { q: "The enterohepatic circulation refers to:",
              opts: ["Circulation of bile salts between liver and intestine", "Blood flow from gut to liver", "Lymphatic drainage of gut", "Neural reflex between gut and liver", "Hepatic artery flow"],
              correct: 0,
              exp: "Bile salts are reabsorbed in terminal ileum and returned to liver via portal blood – this is enterohepatic circulation." },
            { q: "Peristalsis is characterized by:",
              opts: ["Contraction behind and relaxation ahead of bolus", "Simultaneous contraction of all segments", "Random mixing movements", "Sustained tonic contraction", "Retrograde movement"],
              correct: 0,
              exp: "Peristalsis involves a wave of contraction behind the bolus and relaxation ahead, propelling contents forward." },
            { q: "The migrating motor complex (MMC) occurs:",
              opts: ["After a meal", "During fasting", "Only in colon", "In response to gastrin", "During vomiting"],
              correct: 1,
              exp: "MMC is a cyclic, fasting motility pattern that sweeps residual contents from stomach to colon, preventing bacterial overgrowth." },
            { q: "Glucose and galactose are absorbed via:",
              opts: ["Facilitated diffusion (GLUT5)", "Secondary active transport with Na⁺ (SGLT1)", "Simple diffusion", "Endocytosis", "Paracellular route"],
              correct: 1,
              exp: "SGLT1 (Na⁺‑glucose cotransporter) on apical membrane of enterocytes absorbs glucose and galactose against concentration gradient." },
            { q: "Vitamin B12 absorption requires:",
              opts: ["Pepsin", "Intrinsic factor", "Bile salts", "CCK", "Secretin"],
              correct: 1,
              exp: "Intrinsic factor (from parietal cells) binds B12; the complex is absorbed in terminal ileum." },
            { q: "Which of the following is absorbed into lacteals (lymphatics)?",
              opts: ["Amino acids", "Monosaccharides", "Short‑chain fatty acids", "Long‑chain fatty acids (as chylomicrons)", "Water"],
              correct: 3,
              exp: "Long‑chain fatty acids and monoglycerides are re‑esterified to triglycerides, packaged into chylomicrons, and enter lymphatics." },
            { q: "The liver's primary role in carbohydrate metabolism is:",
              opts: ["Glycogenolysis and gluconeogenesis", "Insulin secretion", "Digestion of starch", "Absorption of glucose", "Secretion of amylase"],
              correct: 0,
              exp: "Liver maintains blood glucose by glycogen breakdown and gluconeogenesis." },
            { q: "Which vitamin is stored in large amounts in the liver?",
              opts: ["Vitamin C", "Vitamin B12", "Vitamin A", "Vitamin D", "Vitamin K"],
              correct: 2,
              exp: "Liver stores significant amounts of vitamin A (retinol) and other fat‑soluble vitamins." },
            { q: "Gastrin is produced by:",
              opts: ["Parietal cells", "Chief cells", "G cells (antrum)", "D cells", "Enterochromaffin‑like cells"],
              correct: 2,
              exp: "G cells in the gastric antrum secrete gastrin in response to peptides and vagal stimulation." },
            { q: "Which hormone inhibits gastric emptying?",
              opts: ["Gastrin", "CCK", "Secretin", "GIP", "Motilin"],
              correct: 1,
              exp: "CCK (cholecystokinin) slows gastric emptying to allow time for fat digestion in duodenum." },
            { q: "The major buffer in pancreatic juice is:",
              opts: ["Phosphate", "Bicarbonate", "Proteins", "Chloride", "Sulfate"],
              correct: 1,
              exp: "Pancreatic ductal cells secrete bicarbonate, neutralizing acidic chyme." },
            { q: "Which enzyme is responsible for protein digestion in the stomach?",
              opts: ["Trypsin", "Chymotrypsin", "Pepsin", "Carboxypeptidase", "Elastase"],
              correct: 2,
              exp: "Pepsin (from chief cells) begins protein digestion in acid environment." },
            { q: "The hormone that stimulates gastric acid secretion most potently is:",
              opts: ["Histamine", "Gastrin", "ACh", "CCK", "Secretin"],
              correct: 0,
              exp: "Histamine (from ECL cells) acts on H₂ receptors on parietal cells; together with gastrin and ACh, it powerfully stimulates acid." },
            { q: "Which of the following is NOT a function of the liver?",
              opts: ["Detoxification of drugs", "Synthesis of albumin", "Secretion of bile", "Digestion of proteins", "Storage of glycogen"],
              correct: 3,
              exp: "Liver synthesizes albumin, detoxifies drugs, secretes bile, stores glycogen – but protein digestion is by pancreatic enzymes." },
            { q: "The normal volume of saliva produced per day is:",
              opts: ["100‑200 mL", "500‑800 mL", "1‑1.5 L", "2‑3 L", ">3 L"],
              correct: 2,
              exp: "Salivary glands produce about 1‑1.5 L daily." },
            { q: "Which cell type secretes somatostatin in the stomach?",
              opts: ["G cells", "D cells", "Parietal cells", "Chief cells", "ECL cells"],
              correct: 1,
              exp: "D cells (in gastric and duodenal mucosa) secrete somatostatin, which inhibits gastrin, acid, and other GI hormones." },
            { q: "The major site of water and electrolyte absorption is:",
              opts: ["Stomach", "Duodenum", "Jejunum", "Ileum", "Colon"],
              correct: 4,
              exp: "While small intestine absorbs much water, the colon is the major site of final water and electrolyte absorption." },
            { q: "Which of the following increases appetite?",
              opts: ["Leptin", "Ghrelin", "CCK", "Peptide YY", "Insulin"],
              correct: 1,
              exp: "Ghrelin (from stomach) stimulates hunger; leptin, CCK, PYY suppress appetite." },
            { q: "The sphincter of Oddi controls flow of:",
              opts: ["Saliva", "Gastric juice", "Bile and pancreatic juice", "Chyme", "Lymph"],
              correct: 2,
              exp: "Sphincter of Oddi (hepatopancreatic sphincter) regulates entry of bile and pancreatic juice into duodenum." },
            { q: "In the gastric gland, chief cells secrete:",
              opts: ["HCl", "Pepsinogen", "Gastrin", "Mucus", "Intrinsic factor"],
              correct: 1,
              exp: "Chief cells secrete pepsinogen, which is converted to pepsin by acid." },
            { q: "Which hormone stimulates bile secretion from hepatocytes?",
              opts: ["CCK", "Secretin", "Gastrin", "GIP", "Motilin"],
              correct: 0,
              exp: "CCK stimulates gallbladder contraction, but also has a minor effect on bile secretion; secretin stimulates bile ductular secretion." },
            { q: "Lactose intolerance results from deficiency of:",
              opts: ["Lactase", "Maltase", "Sucrase", "Isomaltase", "Amylase"],
              correct: 0,
              exp: "Lactase (brush border) splits lactose; deficiency causes osmotic diarrhea, bloating after milk." },
            { q: "Which vitamin requires intrinsic factor for absorption?",
              opts: ["Folate", "Vitamin C", "Vitamin B12", "Vitamin D", "Vitamin K"],
              correct: 2,
              exp: "B12 bound to intrinsic factor is absorbed in terminal ileum." },
            { q: "What is the primary function of the large intestine?",
              opts: ["Digestion of proteins", "Absorption of water and electrolytes", "Secretion of enzymes", "Production of bile", "Absorption of monosaccharides"],
              correct: 1,
              exp: "The colon absorbs water and electrolytes, forming solid stool." },
            { q: "Which of the following is a component of the enteric nervous system?",
              opts: ["Myenteric plexus", "Vagus nerve", "Sympathetic chain", "Celiac ganglion", "Sacral parasympathetic"],
              correct: 0,
              exp: "The enteric nervous system consists of myenteric (Auerbach) and submucosal (Meissner) plexuses." },
            { q: "The hormone that stimulates gallbladder contraction most potently is:",
              opts: ["Secretin", "Gastrin", "CCK", "GIP", "Motilin"],
              correct: 2,
              exp: "CCK is the major stimulus for gallbladder contraction." },
            { q: "Which of the following enzymes is secreted in an active form?",
              opts: ["Trypsinogen", "Chymotrypsinogen", "Pepsinogen", "Salivary amylase", "Procarboxypeptidase"],
              correct: 3,
              exp: "Salivary amylase is secreted in active form; pancreatic proteases are secreted as zymogens." },
            { q: "The hepatic portal vein carries blood from:",
              opts: ["Liver to heart", "Gut to liver", "Liver to gut", "Kidney to liver", "Spleen to kidney"],
              correct: 1,
              exp: "Portal vein carries nutrient‑rich blood from GI tract, spleen, pancreas to liver." },
            { q: "Kupffer cells in the liver are specialized:",
              opts: ["Hepatocytes", "Macrophages", "Endothelial cells", "Stellate cells", "Bile duct cells"],
              correct: 1,
              exp: "Kupffer cells are resident macrophages lining liver sinusoids." },
            { q: "Which of the following stimulates pancreatic bicarbonate secretion?",
              opts: ["CCK", "Gastrin", "Secretin", "VIP", "GIP"],
              correct: 2,
              exp: "Secretin (from S cells in response to acid) stimulates ductal cells to secrete bicarbonate." },
            { q: "The migrating motor complex is initiated by:",
              opts: ["Gastrin", "Motilin", "CCK", "Secretin", "Ghrelin"],
              correct: 1,
              exp: "Motilin is the key hormone initiating MMC during fasting." },
            { q: "Intrinsic factor is produced by:",
              opts: ["Chief cells", "Parietal cells", "G cells", "D cells", "Mucous neck cells"],
              correct: 1,
              exp: "Parietal cells (same as acid‑secreting) produce intrinsic factor." },
            { q: "Which of the following nutrients is absorbed primarily in the ileum?",
              opts: ["Glucose", "Iron", "Vitamin B12", "Fructose", "Calcium"],
              correct: 2,
              exp: "Vitamin B12‑IF complex is absorbed in terminal ileum." },
            { q: "The hormone that stimulates gastric motility and emptying is:",
              opts: ["Gastrin", "CCK", "Secretin", "GIP", "Glucagon"],
              correct: 0,
              exp: "Gastrin stimulates gastric motility and emptying, in addition to acid secretion." },
            { q: "Which of the following is a function of the gallbladder?",
              opts: ["Bile production", "Bile concentration", "Bile salt synthesis", "Secretion of enzymes", "Absorption of fats"],
              correct: 1,
              exp: "Gallbladder concentrates bile by absorbing water and electrolytes." },
            { q: "The acidic environment of the stomach is maintained by:",
              opts: ["H⁺/K⁺ ATPase on parietal cells", "Na⁺/K⁺ ATPase", "H⁺/Cl⁻ exchanger", "Carbonic anhydrase in chief cells", "Pepsin"],
              correct: 0,
              exp: "Parietal cells secrete H⁺ via H⁺/K⁺ ATPase." },
            { q: "Which enzyme begins fat digestion?",
              opts: ["Pancreatic lipase", "Gastric lipase", "Lingual lipase", "Both B and C", "None"],
              correct: 3,
              exp: "Lingual and gastric lipases initiate fat digestion in stomach; pancreatic lipase does most work." },
            { q: "The hormone that inhibits gastrin release is:",
              opts: ["Secretin", "CCK", "GIP", "Somatostatin", "All of the above"],
              correct: 4,
              exp: "Somatostatin directly inhibits gastrin; secretin, CCK, GIP also inhibit gastrin indirectly." },
            { q: "Which segment of the small intestine is the longest?",
              opts: ["Duodenum", "Jejunum", "Ileum", "Equal", "Colon"],
              correct: 2,
              exp: "Ileum is the longest segment of small intestine." },
            { q: "Fructose is absorbed via:",
              opts: ["SGLT1", "GLUT5", "GLUT2", "Both A and C", "Passive diffusion"],
              correct: 1,
              exp: "Fructose is absorbed by facilitated diffusion through GLUT5 on apical membrane." },
            { q: "Which vitamin is absorbed in the stomach?",
              opts: ["Vitamin A", "Vitamin B12", "Folate", "Vitamin C", "None"],
              correct: 4,
              exp: "No vitamins are significantly absorbed in stomach; B12 absorption requires IF and ileum." },
            { q: "The hormone that stimulates pancreatic enzyme secretion most potently is:",
              opts: ["Secretin", "Gastrin", "CCK", "Insulin", "Glucagon"],
              correct: 2,
              exp: "CCK is the major stimulus for pancreatic enzyme secretion." },
            { q: "Which of the following is an endocrine function of the pancreas?",
              opts: ["Secretion of amylase", "Secretion of lipase", "Secretion of insulin", "Secretion of bicarbonate", "Secretion of trypsinogen"],
              correct: 2,
              exp: "Endocrine pancreas (islets) secretes insulin, glucagon, somatostatin." },
            { q: "The function of the lower esophageal sphincter is to:",
              opts: ["Prevent reflux of gastric contents", "Control passage of food into stomach", "Initiate peristalsis", "Secrete mucus", "Absorb water"],
              correct: 0,
              exp: "LES prevents acid reflux; it relaxes during swallowing." },
            { q: "Which of the following increases gastric acid secretion?",
              opts: ["Gastrin", "Histamine", "ACh", "All of the above", "None"],
              correct: 3,
              exp: "Gastrin, histamine (via H₂), and ACh (vagal) all stimulate acid." },
            { q: "The major site of nutrient absorption is:",
              opts: ["Stomach", "Duodenum", "Jejunum", "Ileum", "Colon"],
              correct: 2,
              exp: "Jejunum is the primary site for absorption of most nutrients." },
            { q: "Which of the following is a function of bile?",
              opts: ["Emulsify fats", "Digest proteins", "Digest carbohydrates", "Absorb amino acids", "Store vitamins"],
              correct: 0,
              exp: "Bile salts emulsify fats, aiding digestion and absorption." }
        ];

        // Ensure 60+ by adding a few more if needed (we already have 58; add 2 more)
        const extraPhysio = [
            { q: "Which cell type in the stomach secretes histamine?",
              opts: ["Parietal cells", "Chief cells", "Enterochromaffin‑like (ECL) cells", "G cells", "D cells"],
              correct: 2,
              exp: "ECL cells secrete histamine, which stimulates acid secretion." },
            { q: "The presence of chyme in the duodenum stimulates release of which hormone?",
              opts: ["Gastrin", "Secretin", "CCK", "Both B and C", "Motilin"],
              correct: 3,
              exp: "Acid stimulates secretin; fats and amino acids stimulate CCK." }
        ];

        const allQuestions = questions.concat(extraPhysio); // now 60

        // Shuffle
        let shuffled = allQuestions.sort(()=>0.5-Math.random());
        let currentIndex = 0;
        let userAnswers = new Array(shuffled.length).fill(null);
        let showExplanation = new Array(shuffled.length).fill(false);
        const letters = ['A','B','C','D','E'];

        function render() {
            const q = shuffled[currentIndex];
            document.getElementById('questionText').innerText = q.q;
            let optsHtml = '';
            q.opts.forEach((opt, idx) => {
                let cls = 'option';
                if (userAnswers[currentIndex] === idx) cls += ' selected';
                if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                    if (idx === q.correct) cls += ' correct';
                    else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
                }
                optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
            });
            document.getElementById('optionsContainer').innerHTML = optsHtml;

            document.querySelectorAll('.option').forEach(opt => {
                opt.addEventListener('click', () => {
                    let idx = parseInt(opt.dataset.idx);
                    if (userAnswers[currentIndex] === idx) {
                        userAnswers[currentIndex] = null;
                        showExplanation[currentIndex] = false;
                    } else {
                        userAnswers[currentIndex] = idx;
                        showExplanation[currentIndex] = true;
                    }
                    render();
                });
            });

            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
                document.getElementById('explanation').classList.add('show');
            } else {
                document.getElementById('explanation').classList.remove('show');
            }

            document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
            let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
            document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
            document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

            // dots
            let dots = '';
            for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
                let cls = 'dot';
                if (i === currentIndex) cls += ' active';
                if (userAnswers[i] !== null) cls += ' answered';
                dots += `<div class="${cls}" data-index="${i}"></div>`;
            }
            document.getElementById('dotsContainer').innerHTML = dots;
            document.querySelectorAll('.dot').forEach(d => {
                d.addEventListener('click', () => {
                    let idx = parseInt(d.dataset.index);
                    if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                        currentIndex = idx;
                        render();
                    }
                });
            });
        }

        document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
        document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
        render();
    </script>
</body>
</html>
