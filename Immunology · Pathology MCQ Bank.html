          exp: "Acute cellular rejection shows lymphocytic infiltration with tubulitis." },
        { q: "The histologic finding in antibody‑mediated rejection is:",
          opts: ["C4d deposition in peritubular capillaries, glomerulitis, capillaritis", "Tubulitis", "Granulomas", "Eosinophilic infiltrate", "Fibrosis"],
          correct: 0,
          exp: "C4d is a marker of complement activation by antibodies." },
        { q: "Graft‑versus‑host disease (GVHD) prophylaxis typically includes:",
          opts: ["Calcineurin inhibitors (cyclosporine, tacrolimus) and methotrexate", "Corticosteroids", "Antithymocyte globulin", "Rituximab", "Mycophenolate"],
          correct: 0,
          exp: "Combination of calcineurin inhibitor and methotrexate is standard." },
        { q: "Post‑transplant lymphoproliferative disorder (PTLD) is most commonly associated with:",
          opts: ["Epstein‑Barr virus (EBV)", "CMV", "HHV‑8", "HPV", "HIV"],
          correct: 0,
          exp: "EBV drives B‑cell proliferation in immunosuppressed transplant recipients." },
        { q: "Which of the following is a feature of chronic granulomatous disease (CGD)?",
          opts: ["Granuloma formation, recurrent catalase‑positive infections", "Autoimmunity", "Eczema, thrombocytopenia", "Ataxia, telangiectasias", "Giant lysosomal granules"],
          correct: 0,
          exp: "Inability to kill catalase‑positive organisms leads to granuloma formation." },
        { q: "Job syndrome (hyper‑IgE) is often caused by mutations in:",
          opts: ["STAT3", "DOCK8", "TYK2", "IL6ST", "All of the above (different forms)"],
          correct: 4,
          exp: "Autosomal dominant STAT3 mutation causes classic hyper‑IgE syndrome; autosomal recessive forms (DOCK8) also exist." }
    ];
    // Add extra to reach 65
    const extra = [
        { q: "What is the characteristic laboratory finding in X‑linked agammaglobulinemia?",
          opts: ["Absence of B cells (CD19+), very low immunoglobulins", "Absent T cells", "Normal immunoglobulins", "Elevated IgE", "Low C3"],
          correct: 0,
          exp: "BTK mutation blocks B‑cell development → absent B cells." },
        { q: "Which infection is most typical in patients with T‑cell deficiency (e.g., DiGeorge)?",
          opts: ["Opportunistic infections (PJP, CMV, fungal)", "Encapsulated bacteria", "Pyogenic infections", "Staphylococcal abscesses", "Giardia"],
          correct: 0,
          exp: "T‑cell deficiency predisposes to viral, fungal, and opportunistic pathogens." },
        { q: "Which infection is characteristic of complement deficiency (C5‑C9)?",
          opts: ["Recurrent Neisseria meningitis/disseminated gonococcal infection", "Recurrent staphylococcal abscesses", "Recurrent pneumococcal pneumonia", "Recurrent fungal infections", "Recurrent viral infections"],
          correct: 0,
          exp: "MAC deficiency impairs serum bactericidal activity against Neisseria." },
        { q: "The diagnosis of common variable immunodeficiency (CVID) requires:",
          opts: ["Low IgG, IgA, and/or IgM; poor vaccine response; exclusion of other causes", "Absent B cells", "Hyper‑IgM", "Low T cells", "Positive ANA"],
          correct: 0,
          exp: "CVID is a diagnosis of exclusion with hypogammaglobulinemia and impaired antibody response." },
        { q: "In hereditary angioedema (C1‑INH deficiency), which mediator causes symptoms?",
          opts: ["Bradykinin", "Histamine", "Leukotrienes", "Prostaglandins", "Tryptase"],
          correct: 0,
          exp: "C1‑INH deficiency leads to uncontrolled kallikrein activation, increasing bradykinin." },
        { q: "Sézary syndrome (cutaneous T‑cell lymphoma) presents with:",
          opts: ["Exfoliative erythroderma, lymphadenopathy, circulating Sézary cells (cerebriform nuclei)", "B‑cell lymphoma", "Hodgkin lymphoma", "Mycosis fungoides only", "Leukemia"],
          correct: 0,
          exp: "Sézary syndrome is the leukemic phase of mycosis fungoides." },
        { q: "Mycosis fungoides is a lymphoma of:",
          opts: ["CD4+ T cells (skin‑homing)", "CD8+ T cells", "B cells", "NK cells", "Histiocytes"],
          correct: 0,
          exp: "MF presents as patches/plaques; histology shows Pautrier microabscesses." },
        { q: "Which of the following is an example of a type II hypersensitivity reaction that causes disease by stimulating receptor?",
          opts: ["Graves disease (TSH receptor)", "Myasthenia gravis", "Pernicious anemia", "Autoimmune hemolytic anemia", "Goodpasture syndrome"],
          correct: 0,
          exp: "Graves is stimulatory; others are destructive." },
        { q: "Membranous nephropathy is often associated with autoantibodies to:",
          opts: ["Phospholipase A2 receptor (PLA2R)", "GBM", "DNA", "C3 convertase", "Factor H"],
          correct: 0,
          exp: "PLA2R antibodies are found in 70% of primary membranous nephropathy." },
        { q: "Anti‑GBM disease (Goodpasture) involves antibodies against:",
          opts: ["Type IV collagen α3 chain", "Type IV collagen α5 chain", "Laminin", "Entactin", "Proteoglycans"],
          correct: 0,
          exp: "Target is the non‑collagenous domain of α3(IV) in basement membrane." },
        { q: "The mechanism of hemolysis in cold agglutinin disease is:",
          opts: ["Complement‑mediated intravascular hemolysis (IgM binds RBC at low temperature)", "Extravascular hemolysis (IgG)", "Mechanical fragmentation", "Oxidative damage", "Autoantibody‑induced spherocytosis"],
          correct: 0,
          exp: "IgM binds RBCs in acral areas, activates complement, causing hemolysis." }
    ];
    const allQuestions = questions.concat(extra); // now 65+

    // Shuffle
    let shuffled = allQuestions.sort(()=>0.5-Math.random());
    let currentIndex = 0;
    let userAnswers = new Array(shuffled.length).fill(null);
    let showExplanation = new Array(shuffled.length).fill(false);
    const letters = ['A','B','C','D','E'];

    function render() {
        const q = shuffled[currentIndex];
        document.getElementById('questionText').innerText = q.q;
        let optsHtml = '';
        q.opts.forEach((opt, idx) => {
            let cls = 'option';
            if (userAnswers[currentIndex] === idx) cls += ' selected';
            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                if (idx === q.correct) cls += ' correct';
                else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
            }
            optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
        });
        document.getElementById('optionsContainer').innerHTML = optsHtml;

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                let idx = parseInt(opt.dataset.idx);
                if (userAnswers[currentIndex] === idx) {
                    userAnswers[currentIndex] = null;
                    showExplanation[currentIndex] = false;
                } else {
                    userAnswers[currentIndex] = idx;
                    showExplanation[currentIndex] = true;
                }
                render();
            });
        });

        if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
            document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
            document.getElementById('explanation').classList.add('show');
        } else {
            document.getElementById('explanation').classList.remove('show');
        }

        document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
        let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
        document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
        document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

        // dots
        let dots = '';
        for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
            let cls = 'dot';
            if (i === currentIndex) cls += ' active';
            if (userAnswers[i] !== null) cls += ' answered';
            dots += `<div class="${cls}" data-index="${i}"></div>`;
        }
        document.getElementById('dotsContainer').innerHTML = dots;
        document.querySelectorAll('.dot').forEach(d => {
            d.addEventListener('click', () => {
                let idx = parseInt(d.dataset.index);
                if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                    currentIndex = idx;
                    render();
                }
            });
        });
    }

    document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
    render();
</script>
</body>
</html>
