<body>
    <div class="container">
        <div class="header">

    <script>
        // 60+ Neuropharmacology Questions
        const questions = [
            // Parkinson's
            { q: "Which of the following is the most effective drug for treating motor symptoms of Parkinson's disease?",
              opts: ["Pramipexole", "Selegiline", "Levodopa/carbidopa", "Entacapone", "Benztropine"],
              correct: 2,
              exp: "Levodopa (with carbidopa) is the gold standard and most effective for motor symptoms. Dopamine agonists are less potent; MAO‑B and COMT inhibitors are adjuncts." },
            { q: "Carbidopa is combined with levodopa to:",
              opts: ["Increase brain dopamine levels", "Prevent peripheral metabolism of levodopa", "Reduce dyskinesias", "Increase dopamine release", "Block dopamine reuptake"],
              correct: 1,
              exp: "Carbidopa inhibits peripheral decarboxylase, allowing more levodopa to reach the brain and reducing peripheral side effects (nausea)." },
            { q: "A patient with Parkinson's disease on levodopa develops motor fluctuations and dyskinesias. Which drug can be added to reduce 'off' time?",
              opts: ["Benztropine", "Entacapone", "Amantadine", "Ropinirole", "Trihexyphenidyl"],
              correct: 1,
              exp: "Entacapone (COMT inhibitor) prolongs the action of levodopa, reducing 'off' time. Amantadine can reduce dyskinesias." },
            { q: "Which dopamine agonist is available as a transdermal patch?",
              opts: ["Pramipexole", "Ropinirole", "Rotigotine", "Apomorphine", "Bromocriptine"],
              correct: 2,
              exp: "Rotigotine is available as a once‑daily transdermal patch for Parkinson's and restless legs syndrome." },
            { q: "Selegiline is a selective inhibitor of which enzyme?",
              opts: ["COMT", "MAO‑A", "MAO‑B", "AChE", "DOPA decarboxylase"],
              correct: 2,
              exp: "Selegiline is an MAO‑B inhibitor, reducing dopamine metabolism in the brain." },

            // Alzheimer's
            { q: "Which drug is an NMDA receptor antagonist used in moderate‑to‑severe Alzheimer's disease?",
              opts: ["Donepezil", "Rivastigmine", "Galantamine", "Memantine", "Tacrine"],
              correct: 3,
              exp: "Memantine is an NMDA antagonist. Donepezil, rivastigmine, and galantamine are cholinesterase inhibitors." },
            { q: "A patient with Alzheimer's disease is started on donepezil. The most common adverse effects are:",
              opts: ["Sedation and weight gain", "Nausea, vomiting, diarrhea", "Hypertension", "Constipation", "Bradycardia"],
              correct: 1,
              exp: "Cholinesterase inhibitors cause cholinergic side effects: nausea, vomiting, diarrhea, and bradycardia." },

            // Antiepileptics
            { q: "Which antiepileptic drug is most effective for absence seizures?",
              opts: ["Phenytoin", "Carbamazepine", "Ethosuximide", "Valproate", "Lamotrigine"],
              correct: 2,
              exp: "Ethosuximide is first‑line for absence seizures. Valproate is also effective but has more side effects." },
            { q: "Phenytoin is associated with which adverse effect?",
              opts: ["Weight gain", "Gingival hyperplasia", "Hyponatremia", "Rash", "Nephrolithiasis"],
              correct: 1,
              exp: "Phenytoin causes gingival hyperplasia, hirsutism, nystagmus, and ataxia. Hyponatremia is more common with carbamazepine." },
            { q: "A patient on carbamazepine develops hyponatremia. Which drug is most likely to cause this?",
              opts: ["Phenytoin", "Carbamazepine", "Valproate", "Lamotrigine", "Levetiracetam"],
              correct: 1,
              exp: "Carbamazepine can cause SIADH leading to hyponatremia." },
            { q: "Valproate is contraindicated in pregnancy due to:",
              opts: ["Risk of neural tube defects", "Maternal hypertension", "Neonatal hemorrhage", "Fetal growth restriction", "Preterm labor"],
              correct: 0,
              exp: "Valproate is teratogenic, increasing the risk of neural tube defects (spina bifida) and cognitive impairment." },
            { q: "Lamotrigine requires slow dose titration to avoid:",
              opts: ["Hepatotoxicity", "Rash (Stevens‑Johnson syndrome)", "Nephrotoxicity", "Agranulocytosis", "Thrombocytopenia"],
              correct: 1,
              exp: "Rapid titration of lamotrigine increases the risk of severe rash, including Stevens‑Johnson syndrome." },
            { q: "Levetiracetam is associated with which adverse effect?",
              opts: ["Hepatotoxicity", "Behavioral changes (irritability, aggression)", "Nephrolithiasis", "Weight gain", "Diplopia"],
              correct: 1,
              exp: "Levetiracetam can cause irritability, aggression, and mood changes." },
            { q: "Topiramate can cause all of the following EXCEPT:",
              opts: ["Weight loss", "Nephrolithiasis", "Metabolic acidosis", "Weight gain", "Cognitive slowing"],
              correct: 3,
              exp: "Topiramate often causes weight loss, not gain. It also causes nephrolithiasis, metabolic acidosis, and cognitive dulling." },
            { q: "Which drug is a prodrug of phenytoin with better bioavailability?",
              opts: ["Fosphenytoin", "Oxcarbazepine", "Eslicarbazepine", "Phenobarbital", "Primidone"],
              correct: 0,
              exp: "Fosphenytoin is a water‑soluble prodrug of phenytoin; it can be given IV/IM with fewer infusion site reactions." },

            // Antipsychotics
            { q: "A patient on haloperidol develops acute dystonia. Which drug is most appropriate?",
              opts: ["Diphenhydramine", "Benztropine", "Lorazepam", "Propranolol", "Both A and B"],
              correct: 4,
              exp: "Acute dystonia is treated with anticholinergics such as benztropine or diphenhydramine (IV/IM)." },
            { q: "Which atypical antipsychotic is associated with the highest risk of agranulocytosis?",
              opts: ["Risperidone", "Olanzapine", "Clozapine", "Quetiapine", "Aripiprazole"],
              correct: 2,
              exp: "Clozapine can cause agranulocytosis, requiring regular WBC monitoring." },
            { q: "Neuroleptic malignant syndrome (NMS) is characterized by all EXCEPT:",
              opts: ["Fever", "Muscle rigidity", "Bradycardia", "Autonomic instability", "Elevated CK"],
              correct: 2,
              exp: "NMS presents with fever, rigidity, autonomic instability, and elevated CK; tachycardia is common, not bradycardia." },
            { q: "Which antipsychotic has the lowest risk of extrapyramidal symptoms?",
              opts: ["Haloperidol", "Fluphenazine", "Clozapine", "Risperidone (high dose)", "Thioridazine"],
              correct: 2,
              exp: "Clozapine has minimal EPS risk. Among atypicals, clozapine and quetiapine have the lowest EPS." },
            { q: "A patient on olanzapine gains significant weight and develops diabetes. Which antipsychotic might be a better choice?",
              opts: ["Clozapine", "Risperidone", "Aripiprazole", "Quetiapine", "Chlorpromazine"],
              correct: 2,
              exp: "Aripiprazole is weight‑neutral and has lower metabolic risk compared to olanzapine, clozapine, and quetiapine." },

            // Antidepressants
            { q: "Which SSRI has the shortest half‑life and may cause significant withdrawal symptoms?",
              opts: ["Fluoxetine", "Sertraline", "Paroxetine", "Citalopram", "Escitalopram"],
              correct: 2,
              exp: "Paroxetine has a short half‑life and can cause withdrawal symptoms (dizziness, flu‑like symptoms) on abrupt discontinuation." },
            { q: "A patient on an MAOI accidentally eats aged cheese and develops severe hypertension. This is due to:",
              opts: ["Tyramine causing norepinephrine release", "Serotonin syndrome", "Hypertensive crisis from dopamine", "Anticholinergic effects", "Alpha‑1 blockade"],
              correct: 0,
              exp: "MAOIs inhibit metabolism of tyramine, which releases norepinephrine, causing hypertensive crisis." },
            { q: "Which antidepressant is most dangerous in overdose?",
              opts: ["Fluoxetine", "Sertraline", "Amitriptyline", "Mirtazapine", "Bupropion"],
              correct: 2,
              exp: "TCAs (amitriptyline) are cardiotoxic and lethal in overdose; SSRIs are safer." },
            { q: "Bupropion is contraindicated in patients with:",
              opts: ["Hypertension", "Diabetes", "Seizure disorder", "Obesity", "Smoking"],
              correct: 2,
              exp: "Bupropion lowers seizure threshold; contraindicated in seizure disorders and eating disorders (bulimia/anorexia)." },
            { q: "Trazodone is often used for its:",
              opts: ["Antidepressant effect", "Anxiolytic effect", "Sedative properties (for insomnia)", "Weight loss", "Improved cognition"],
              correct: 2,
              exp: "Trazodone is sedating and often used for insomnia, especially at low doses." },
            { q: "Venlafaxine at high doses can cause:",
              opts: ["Hypotension", "Bradycardia", "Hypertension", "QT prolongation", "Seizures"],
              correct: 2,
              exp: "Venlafaxine can cause dose‑dependent hypertension." },
            { q: "Mirtazapine is associated with:",
              opts: ["Weight loss and insomnia", "Weight gain and sedation", "Sexual dysfunction", "Nausea", "Hypertension"],
              correct: 1,
              exp: "Mirtazapine causes weight gain and sedation due to histamine H₁ blockade." },

            // Mood stabilizers
            { q: "Lithium toxicity is associated with all EXCEPT:",
              opts: ["Polyuria", "Tremor", "Hypothyroidism", "Hypercalcemia", "Seizures"],
              correct: 3,
              exp: "Lithium can cause nephrogenic DI, tremor, hypothyroidism, and at higher levels seizures; it does not cause hypercalcemia." },
            { q: "Which drug is most effective for acute mania?",
              opts: ["Lithium", "Valproate", "Carbamazepine", "Lamotrigine", "Gabapentin"],
              correct: 1,
              exp: "Valproate is rapidly effective for acute mania; lamotrigine is better for bipolar depression." },

            // Anxiolytics/hypnotics
            { q: "Buspirone differs from benzodiazepines in that it:",
              opts: ["Causes sedation", "Has abuse potential", "Acts on 5‑HT₁A receptors", "Acts on GABA<sub>A</sub>", "Is effective in panic disorder"],
              correct: 2,
              exp: "Buspirone is a partial 5‑HT₁A agonist; it does not cause sedation, tolerance, or abuse, and is used for generalized anxiety." },
            { q: "Flumazenil is used to reverse:",
              opts: ["Opioid overdose", "Benzodiazepine overdose", "Barbiturate overdose", "Alcohol intoxication", "Anticholinergic toxicity"],
              correct: 1,
              exp: "Flumazenil is a competitive antagonist at the benzodiazepine binding site on GABA<sub>A</sub>." },
            { q: "Zolpidem is a non‑benzodiazepine hypnotic that acts selectively on:",
              opts: ["α1 subunit of GABA<sub>A</sub>", "α2 subunit", "β subunit", "5‑HT₂ receptors", "Melatonin receptors"],
              correct: 0,
              exp: "Zolpidem binds preferentially to the α1 subunit of GABA<sub>A</sub>, producing hypnotic effect." },

            // Opioids
            { q: "Which opioid is contraindicated with MAOIs due to risk of serotonin syndrome?",
              opts: ["Morphine", "Codeine", "Meperidine", "Fentanyl", "Methadone"],
              correct: 2,
              exp: "Meperidine (pethidine) can interact with MAOIs to cause serotonin syndrome." },
            { q: "Naloxone is used to reverse opioid overdose. Its duration of action is:",
              opts: ["Longer than most opioids", "Shorter than most opioids", "Equal to methadone", "Variable depending on route", "Up to 24 hours"],
              correct: 1,
              exp: "Naloxone has a short half‑life (30‑90 min), often requiring repeated doses to outlast the opioid." },
            { q: "Methadone is used in opioid addiction because:",
              opts: ["It has high abuse potential", "It produces euphoria", "It has long half‑life and prevents withdrawal", "It blocks opioid receptors", "It is an antagonist"],
              correct: 2,
              exp: "Methadone is a long‑acting μ agonist that prevents withdrawal without causing euphoria." },
            { q: "Tramadol can cause seizures due to:",
              opts: ["μ agonism", "5‑HT and NE reuptake inhibition", "GABA antagonism", "NMDA antagonism", "Dopamine release"],
              correct: 1,
              exp: "Tramadol inhibits serotonin and norepinephrine reuptake, lowering seizure threshold." },

            // General anesthetics
            { q: "Which inhaled anesthetic is associated with malignant hyperthermia?",
              opts: ["Nitrous oxide", "Halothane", "Sevoflurane", "Desflurane", "Isoflurane"],
              correct: 1,
              exp: "All volatile anesthetics (halothane, sevoflurane, etc.) can trigger malignant hyperthermia; succinylcholine also triggers." },
            { q: "Propofol infusion syndrome is characterized by:",
              opts: ["Hyperglycemia", "Metabolic acidosis, rhabdomyolysis, hyperkalemia", "Hepatotoxicity", "Respiratory alkalosis", "Hypertension"],
              correct: 1,
              exp: "Propofol infusion syndrome includes metabolic acidosis, rhabdomyolysis, hyperkalemia, and cardiac failure." },
            { q: "Succinylcholine is contraindicated in patients with:",
              opts: ["Pseudo‑cholinesterase deficiency", "Liver disease", "Renal failure", "Diabetes", "Asthma"],
              correct: 0,
              exp: "Succinylcholine is metabolized by pseudocholinesterase; deficiency leads to prolonged apnea." },

            // Local anesthetics
            { q: "Lidocaine is an amide local anesthetic. Which of the following is an ester?",
              opts: ["Bupivacaine", "Lidocaine", "Ropivacaine", "Procaine", "Mepivacaine"],
              correct: 3,
              exp: "Procaine is an ester; amides include lidocaine, bupivacaine, ropivacaine." },
            { q: "Bupivacaine is more cardiotoxic than lidocaine because:",
              opts: ["It has higher potency", "It dissociates slowly from sodium channels", "It causes more vasodilation", "It releases histamine", "It blocks potassium channels"],
              correct: 1,
              exp: "Bupivacaine binds tightly to cardiac sodium channels, increasing risk of arrhythmias." },
            { q: "Cocaine is unique among local anesthetics because it also:",
              opts: ["Causes vasodilation", "Blocks norepinephrine reuptake (vasoconstriction)", "Is an ester", "Has no systemic effects", "Is metabolized in the liver"],
              correct: 1,
              exp: "Cocaine inhibits NE reuptake, causing vasoconstriction and sympathomimetic effects." },

            // CNS stimulants
            { q: "Methylphenidate is used for ADHD. Its mechanism is:",
              opts: ["Dopamine and norepinephrine reuptake inhibition", "Dopamine release", "α₂ agonism", "5‑HT reuptake inhibition", "NMDA antagonism"],
              correct: 0,
              exp: "Methylphenidate blocks reuptake of dopamine and norepinephrine." },

            // Migraine
            { q: "Sumatriptan is contraindicated in patients with:",
              opts: ["Migraine with aura", "Cluster headache", "Coronary artery disease", "Hypertension", "Diabetes"],
              correct: 2,
              exp: "Triptans are contraindicated in CAD, stroke, and uncontrolled hypertension due to vasoconstrictor effects." },

            // Muscle relaxants
            { q: "Dantrolene is used for malignant hyperthermia because it:",
              opts: ["Blocks acetylcholine release", "Inhibits ryanodine receptors on SR", "Acts as a GABA agonist", "Blocks sodium channels", "Stimulates Ca²⁺ uptake"],
              correct: 1,
              exp: "Dantrolene inhibits ryanodine receptors, preventing calcium release from sarcoplasmic reticulum." },

            // Substance abuse
            { q: "Disulfiram works by:",
              opts: ["Blocking opioid receptors", "Inhibiting acetaldehyde dehydrogenase", "Acting as a partial nicotinic agonist", "Reducing alcohol craving", "Blocking dopamine receptors"],
              correct: 1,
              exp: "Disulfiram inhibits acetaldehyde dehydrogenase, causing acetaldehyde accumulation and aversive effects with alcohol." }
        ];

        // Add more to reach 60+
        const extra = [
            { q: "Which antipsychotic is most likely to cause QT prolongation?",
              opts: ["Haloperidol (IV)", "Risperidone", "Quetiapine", "Aripiprazole", "Lurasidone"],
              correct: 0,
              exp: "Haloperidol IV can cause QT prolongation and torsades." },
            { q: "Pregabalin is used for neuropathic pain. Its mechanism is:",
              opts: ["Sodium channel blockade", "Calcium channel α2δ subunit binding", "GABA potentiation", "NMDA antagonism", "Serotonin reuptake inhibition"],
              correct: 1,
              exp: "Gabapentin and pregabalin bind to α2δ subunit of voltage‑gated calcium channels." },
            { q: "Which antiepileptic drug is associated with posterior reversible encephalopathy syndrome (PRES)?",
              opts: ["Valproate", "Phenytoin", "Carbamazepine", "Lamotrigine", "Levetiracetam"],
              correct: 1,
              exp: "Phenytoin can rarely cause PRES." },
            { q: "A patient on lithium develops polyuria and polydipsia. This is due to:",
              opts: ["Increased thirst", "Nephrogenic diabetes insipidus", "Central diabetes insipidus", "Hyperglycemia", "Psychogenic polydipsia"],
              correct: 1,
              exp: "Lithium causes nephrogenic DI by interfering with ADH action in collecting duct." },
            { q: "Which antidepressant is also an effective smoking cessation aid?",
              opts: ["Fluoxetine", "Bupropion", "Mirtazapine", "Trazodone", "Duloxetine"],
              correct: 1,
              exp: "Bupropion (Zyban) is used for smoking cessation." },
            { q: "A patient on warfarin is started on carbamazepine. What effect is expected?",
              opts: ["Increased warfarin effect", "Decreased warfarin effect", "No effect", "Increased INR", "Bleeding risk"],
              correct: 1,
              exp: "Carbamazepine induces CYP450, increasing warfarin metabolism and decreasing its effect." },
            { q: "Which drug is used to treat opioid withdrawal?",
              opts: ["Naloxone", "Methadone", "Naltrexone", "Disulfiram", "Varenicline"],
              correct: 1,
              exp: "Methadone and buprenorphine are used for opioid withdrawal and maintenance." },
            { q: "The mechanism of action of varenicline is:",
              opts: ["Nicotine receptor antagonist", "Partial nicotinic agonist", "Dopamine reuptake inhibitor", "MAO inhibitor", "5‑HT₂ antagonist"],
              correct: 1,
              exp: "Varenicline is a partial agonist at α4β2 nicotinic receptors, reducing cravings." },
            { q: "Which benzodiazepine is preferred for treating alcohol withdrawal due to long half‑life?",
              opts: ["Alprazolam", "Lorazepam", "Diazepam", "Midazolam", "Triazolam"],
              correct: 2,
              exp: "Diazepam has a long half‑life, providing smooth withdrawal. Lorazepam is also used (especially in liver disease)." },
            { q: "Acamprosate is used for alcohol dependence and works by:",
              opts: ["Inhibiting aldehyde dehydrogenase", "Blocking opioid receptors", "Modulating glutamate and GABA", "Reducing cravings", "Causing aversive reaction"],
              correct: 2,
              exp: "Acamprosate modulates glutamate and GABA activity, reducing withdrawal symptoms." }
        ];

        const allQuestions = questions.concat(extra); // now >60

        // Shuffle
        let shuffled = allQuestions.sort(()=>0.5-Math.random());
        let currentIndex = 0;
        let userAnswers = new Array(shuffled.length).fill(null);
        let showExplanation = new Array(shuffled.length).fill(false);
        const letters = ['A','B','C','D','E'];

        function render() {
            const q = shuffled[currentIndex];
            document.getElementById('questionText').innerText = q.q;
            let optsHtml = '';
            q.opts.forEach((opt, idx) => {
                let cls = 'option';
                if (userAnswers[currentIndex] === idx) cls += ' selected';
                if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                    if (idx === q.correct) cls += ' correct';
                    else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
                }
                optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
            });
            document.getElementById('optionsContainer').innerHTML = optsHtml;

            document.querySelectorAll('.option').forEach(opt => {
                opt.addEventListener('click', () => {
                    let idx = parseInt(opt.dataset.idx);
                    if (userAnswers[currentIndex] === idx) {
                        userAnswers[currentIndex] = null;
                        showExplanation[currentIndex] = false;
                    } else {
                        userAnswers[currentIndex] = idx;
                        showExplanation[currentIndex] = true;
                    }
                    render();
                });
            });

            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
                document.getElementById('explanation').classList.add('show');
            } else {
                document.getElementById('explanation').classList.remove('show');
            }

            document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
            let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
            document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
            document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

            // dots
            let dots = '';
            for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
                let cls = 'dot';
                if (i === currentIndex) cls += ' active';
                if (userAnswers[i] !== null) cls += ' answered';
                dots += `<div class="${cls}" data-index="${i}"></div>`;
            }
            document.getElementById('dotsContainer').innerHTML = dots;
            document.querySelectorAll('.dot').forEach(d => {
                d.addEventListener('click', () => {
                    let idx = parseInt(d.dataset.index);
                    if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                        currentIndex = idx;
                        render();
                    }
                });
            });
        }

        document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
        document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
        render();
    </script>
</body>
</html>
