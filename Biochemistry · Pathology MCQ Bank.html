          opts: ["Uroporphyrinogen III synthase", "Uroporphyrinogen decarboxylase", "Coproporphyrinogen oxidase", "PBG deaminase", "ALA dehydratase"],
          correct: 0,
          exp: "Uroporphyrinogen III synthase deficiency → severe photosensitivity, red urine, hemolytic anemia." },
        { q: "Zellweger syndrome (cerebrohepatorenal syndrome) is a peroxisomal disorder characterized by:",
          opts: ["Severe hypotonia, seizures, hepatic dysfunction, stippled epiphyses", "Adrenal insufficiency, neurodegeneration", "Megaloblastic anemia", "Coarse facies, hepatosplenomegaly", "Progressive spasticity"],
          correct: 0,
          exp: "Zellweger: peroxisome biogenesis defect → accumulation of VLCFA, bile acid intermediates." },
        { q: "X‑linked adrenoleukodystrophy is caused by mutations in ABCD1, leading to accumulation of:",
          opts: ["Very long chain fatty acids (VLCFA)", "Phytanic acid", "Pipecolic acid", "Bile acids", "Cholesterol"],
          correct: 0,
          exp: "X‑ALD: impaired peroxisomal β‑oxidation of VLCFA → progressive neurodegeneration, adrenal insufficiency." },
        { q: "Refsum disease (adult) is caused by deficiency of:",
          opts: ["Phytanoyl‑CoA hydroxylase (phytanic acid accumulation)", "Peroxisomal biogenesis", "VLCFA oxidation", "Bile acid synthesis", "Ether phospholipid synthesis"],
          correct: 0,
          exp: "Refsum disease: phytanic acid accumulation → retinitis pigmentosa, peripheral neuropathy, ataxia." },
        { q: "Mitochondrial disorders (e.g., MELAS, MERRF) are characterized by:",
          opts: ["Maternal inheritance, heteroplasmy, ragged red fibers on muscle biopsy", "Autosomal dominant inheritance", "X‑linked inheritance", "No genetic basis", "Early onset only"],
          correct: 0,
          exp: "Mitochondrial DNA mutations affect tissues with high energy demand (CNS, muscle, heart)." },
        { q: "Leber hereditary optic neuropathy (LHON) is a mitochondrial disorder that causes:",
          opts: ["Acute or subacute vision loss (optic atrophy)", "Progressive external ophthalmoplegia", "Stroke‑like episodes", "Myoclonic epilepsy", "Cardiomyopathy"],
          correct: 0,
          exp: "LHON: mutations in mitochondrial genes (complex I) → bilateral vision loss, young adults." },
        { q: "Ragged red fibers on muscle biopsy are characteristic of:",
          opts: ["Mitochondrial myopathies", "Duchenne muscular dystrophy", "Polymyositis", "Glycogen storage diseases", "Lipid storage myopathies"],
          correct: 0,
          exp: "Ragged red fibers result from mitochondrial proliferation in subsarcolemmal region." }
    ];
    // Add extra to reach 65
    const extra = [
        { q: "Carnitine palmitoyltransferase II (CPT II) deficiency presents with:",
          opts: ["Exercise‑induced myoglobinuria, muscle pain", "Hypoglycemia, hepatomegaly", "Cardiomyopathy", "Sudden infant death", "Peripheral neuropathy"],
          correct: 0,
          exp: "CPT II deficiency (adult form) causes recurrent rhabdomyolysis with exercise." },
        { q: "Medium‑chain acyl‑CoA dehydrogenase (MCAD) deficiency presents with:",
          opts: ["Hypoketotic hypoglycemia, vomiting, lethargy, sudden death", "Cardiomyopathy", "Myopathy", "Hyperammonemia", "Lactic acidosis"],
          correct: 0,
          exp: "MCAD deficiency is the most common fatty acid oxidation defect; avoid fasting." },
        { q: "Very long‑chain acyl‑CoA dehydrogenase (VLCAD) deficiency can present with:",
          opts: ["Cardiomyopathy, rhabdomyolysis, hypoglycemia", "Only hypoglycemia", "Only myopathy", "Sudden infant death", "Hepatomegaly"],
          correct: 0,
          exp: "VLCAD deficiency has severe early‑onset cardiac form and later‑onset myopathic form." },
        { q: "Glutaric acidemia type I is due to deficiency of:",
          opts: ["Glutaryl‑CoA dehydrogenase", "Isovaleryl‑CoA dehydrogenase", "Methylmalonyl‑CoA mutase", "Propionyl‑CoA carboxylase", "Medium‑chain acyl‑CoA dehydrogenase"],
          correct: 0,
          exp: "Glutaric acidemia I → macrocephaly, dystonia, acute encephalopathic crises." },
        { q: "Canavan disease (spongy degeneration of brain) is due to deficiency of:",
          opts: ["Aspartoacylase", "Arylsulfatase A", "Galactocerebrosidase", "Hexosaminidase A", "β‑galactosidase"],
          correct: 0,
          exp: "Aspartoacylase deficiency → N‑acetylaspartic acid accumulation → leukodystrophy." },
        { q: "Menkes disease (kinky hair syndrome) is an X‑linked disorder of copper metabolism caused by mutations in:",
          opts: ["ATP7A (copper‑transporting ATPase)", "ATP7B", "SOD1", "Ceruloplasmin", "COMMD1"],
          correct: 0,
          exp: "Menkes: defective copper transport → low copper in brain/liver, brittle hair, neurodegeneration." },
        { q: "Wilson disease is caused by mutations in:",
          opts: ["ATP7B (copper‑transporting ATPase in liver)", "ATP7A", "Ceruloplasmin", "Apo‑E", "MT‑1"],
          correct: 0,
          exp: "Wilson: copper accumulation in liver, brain, cornea (Kayser‑Fleischer rings); treat with penicillamine, zinc." },
        { q: "Hemochromatosis (hereditary) is most commonly due to mutations in:",
          opts: ["HFE gene (C282Y)", "Ferroportin", "Hepcidin", "Transferrin receptor", "Ferritin"],
          correct: 0,
          exp: "HFE mutations cause increased iron absorption → cirrhosis, diabetes, bronze skin, cardiomyopathy." },
        { q: "Alpha‑1 antitrypsin deficiency (PiZZ) is associated with:",
          opts: ["Panacinar emphysema (lower lobes) and cirrhosis", "Centriacinar emphysema", "Asthma", "Bronchiectasis", "Interstitial lung disease"],
          correct: 0,
          exp: "α1‑AT deficiency (PiZZ) → loss of neutrophil elastase inhibition → early‑onset panacinar emphysema." },
        { q: "Cystic fibrosis (CFTR mutations) leads to:",
          opts: ["Thick mucus, lung infections, pancreatic insufficiency, male infertility", "Liver cirrhosis", "Neurological deterioration", "Cardiomyopathy", "Coagulation defects"],
          correct: 0,
          exp: "CF: defective chloride channel → multisystem exocrine gland dysfunction." },
        { q: "Hereditary angioedema is caused by deficiency of:",
          opts: ["C1 inhibitor (SERPING1)", "C3", "C4", "Factor B", "Properdin"],
          correct: 0,
          exp: "C1‑INH deficiency → uncontrolled bradykinin production → recurrent angioedema without urticaria." }
    ];
    const allQuestions = questions.concat(extra); // now 65+

    // Shuffle
    let shuffled = allQuestions.sort(()=>0.5-Math.random());
    let currentIndex = 0;
    let userAnswers = new Array(shuffled.length).fill(null);
    let showExplanation = new Array(shuffled.length).fill(false);
    const letters = ['A','B','C','D','E'];

    function render() {
        const q = shuffled[currentIndex];
        document.getElementById('questionText').innerText = q.q;
        let optsHtml = '';
        q.opts.forEach((opt, idx) => {
            let cls = 'option';
            if (userAnswers[currentIndex] === idx) cls += ' selected';
            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                if (idx === q.correct) cls += ' correct';
                else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
            }
            optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
        });
        document.getElementById('optionsContainer').innerHTML = optsHtml;

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                let idx = parseInt(opt.dataset.idx);
                if (userAnswers[currentIndex] === idx) {
                    userAnswers[currentIndex] = null;
                    showExplanation[currentIndex] = false;
                } else {
                    userAnswers[currentIndex] = idx;
                    showExplanation[currentIndex] = true;
                }
                render();
            });
        });

        if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
            document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
            document.getElementById('explanation').classList.add('show');
        } else {
            document.getElementById('explanation').classList.remove('show');
        }

        document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
        let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
        document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
        document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

        // dots
        let dots = '';
        for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
            let cls = 'dot';
            if (i === currentIndex) cls += ' active';
            if (userAnswers[i] !== null) cls += ' answered';
            dots += `<div class="${cls}" data-index="${i}"></div>`;
        }
        document.getElementById('dotsContainer').innerHTML = dots;
        document.querySelectorAll('.dot').forEach(d => {
            d.addEventListener('click', () => {
                let idx = parseInt(d.dataset.index);
                if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                    currentIndex = idx;
                    render();
                }
            });
        });
    }

    document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
    render();
</script>
</body>
</html>
