    <script>
        // ---------- 50 UNIQUE HIGH-YIELD RESPIRATORY MCQs ----------
        const questions = [
            {
                question: "What is the primary stimulus for normal breathing?",
                options: ["Arterial PO₂", "Arterial PCO₂", "Arterial pH", "Cerebrospinal fluid H⁺", "Lung stretch"],
                correct: 1,
                explanation: "**Arterial PCO₂** is the main driver of ventilation under normal conditions. It acts mainly via central chemoreceptors that sense changes in CSF H⁺ (derived from CO₂)."
            },
            {
                question: "Which cells produce surfactant?",
                options: ["Type I pneumocytes", "Type II pneumocytes", "Clara cells", "Goblet cells", "Alveolar macrophages"],
                correct: 1,
                explanation: "**Type II pneumocytes** synthesize, store, and secrete surfactant. They also serve as progenitor cells for type I pneumocytes."
            },
            {
                question: "At what gestational age does surfactant production become sufficient to prevent RDS?",
                options: ["20-24 weeks", "24-28 weeks", "28-32 weeks", "34-36 weeks", "40 weeks"],
                correct: 3,
                explanation: "Surfactant production begins at 20-24 weeks but becomes **sufficient at 34-36 weeks**. Infants born before 34 weeks are at high risk for respiratory distress syndrome."
            },
            {
                question: "What is the normal value for residual volume (RV)?",
                options: ["500 mL", "1200 mL", "2300 mL", "3500 mL", "4600 mL"],
                correct: 1,
                explanation: "**Residual volume (RV)** is approximately 1200 mL. It cannot be measured by spirometry; requires helium dilution or body plethysmography."
            },
            {
                question: "Which lung volume cannot be measured by simple spirometry?",
                options: ["Tidal volume", "Inspiratory reserve volume", "Expiratory reserve volume", "Residual volume", "Vital capacity"],
                correct: 3,
                explanation: "**Residual volume** is the air remaining after maximal exhalation and cannot be exhaled, so spirometry cannot measure it."
            },
            {
                question: "What is the formula for vital capacity (VC)?",
                options: ["TV + IRV", "IRV + TV + ERV", "ERV + RV", "VC + RV", "TV + ERV"],
                correct: 1,
                explanation: "**Vital capacity = IRV + TV + ERV**. It is the maximum air exhaled after maximal inspiration."
            },
            {
                question: "In obstructive lung disease, which of the following is typically increased?",
                options: ["FEV₁", "FEV₁/FVC ratio", "Residual volume", "TLC", "Both C and D"],
                correct: 4,
                explanation: "In obstruction, **RV and TLC are often increased** due to air trapping. FEV₁/FVC ratio is decreased."
            },
            {
                question: "What is the most common cause of lobar pneumonia?",
                options: ["Klebsiella pneumoniae", "Streptococcus pneumoniae", "Staphylococcus aureus", "Mycoplasma pneumoniae", "Haemophilus influenzae"],
                correct: 1,
                explanation: "**Streptococcus pneumoniae** is the most common cause of community-acquired pneumonia, often presenting as lobar consolidation."
            },
            {
                question: "Which of the following causes a right shift of the oxyhemoglobin dissociation curve?",
                options: ["Decreased CO₂", "Increased pH", "Decreased temperature", "Increased 2,3-BPG", "Carbon monoxide"],
                correct: 3,
                explanation: "**Increased 2,3-BPG** (along with ↑CO₂, ↓pH, ↑temperature) shifts the curve to the right, decreasing affinity and enhancing O₂ unloading."
            },
            {
                question: "What is the normal A-a gradient?",
                options: ["0-5 mmHg", "5-15 mmHg", "15-25 mmHg", "25-35 mmHg", "35-45 mmHg"],
                correct: 1,
                explanation: "The normal **alveolar-arterial (A-a) gradient** is 5-15 mmHg. It increases in V/Q mismatch, shunt, and diffusion impairment."
            },
            {
                question: "Which of the following conditions causes a shunt (V/Q = 0)?",
                options: ["Pulmonary embolism", "Asthma", "Pneumonia", "COPD", "High altitude"],
                correct: 2,
                explanation: "**Pneumonia** (consolidation) causes shunt: perfusion without ventilation. 100% O₂ does not correct hypoxemia from shunt."
            },
            {
                question: "What is the primary mechanism of hypoxemia in pulmonary embolism?",
                options: ["Hypoventilation", "Shunt", "V/Q mismatch", "Diffusion limitation", "Low FiO₂"],
                correct: 2,
                explanation: "PE causes **V/Q mismatch** (increased dead space). Hypoxemia also results from low mixed venous O₂ and reflex bronchoconstriction."
            },
            {
                question: "Which of the following is a characteristic finding in asthma?",
                options: ["Decreased RV", "Increased DLCO", "Reversible obstruction", "Panacinar emphysema", "Chronic cough with sputum >3 months"],
                correct: 2,
                explanation: "Asthma is characterized by **reversible** airflow obstruction. Emphysema causes irreversible destruction."
            },
            {
                question: "What is the Reid index in chronic bronchitis?",
                options: ["<0.2", "0.2-0.3", "0.3-0.4", ">0.4", ">0.6"],
                correct: 3,
                explanation: "**Reid index** (ratio of mucous gland thickness to bronchial wall) is **>0.4** in chronic bronchitis."
            },
            {
                question: "Which type of emphysema is associated with α1-antitrypsin deficiency?",
                options: ["Centriacinar", "Panacinar", "Paraseptal", "Irregular", "Bullous"],
                correct: 1,
                explanation: "**Panacinar emphysema** (entire acinus) is linked to α1-antitrypsin deficiency, typically affecting lower lobes."
            },
            {
                question: "What is the pathology of idiopathic pulmonary fibrosis (IPF)?",
                options: ["Non-caseating granulomas", "Usual interstitial pneumonia (UIP)", "Desquamative interstitial pneumonia", "Respiratory bronchiolitis", "Cryptogenic organizing pneumonia"],
                correct: 1,
                explanation: "IPF shows **UIP** pattern: patchy fibrosis, honeycombing, and fibroblastic foci."
            },
            {
                question: "Which pneumoconiosis is associated with eggshell calcification of hilar lymph nodes?",
                options: ["Asbestosis", "Silicosis", "Coal worker's pneumoconiosis", "Berylliosis", "Siderosis"],
                correct: 1,
                explanation: "**Silicosis** causes eggshell calcification of hilar nodes and increases risk of TB."
            },
            {
                question: "What are asbestos bodies?",
                options: ["Golden-brown beaded rods", "Silica particles", "Coal dust macules", "Iron-encrusted fibers", "Both A and D"],
                correct: 4,
                explanation: "**Asbestos bodies** are asbestos fibers coated with ferritin, appearing as golden-brown, beaded rods."
            },
            {
                question: "Which of the following is a feature of sarcoidosis?",
                options: ["Caseating granulomas", "Elevated ACE", "Hypocalcemia", "Positive ANCA", "Reduced DLCO"],
                correct: 1,
                explanation: "Sarcoidosis shows **non-caseating granulomas** and often **elevated ACE**. Hypercalcemia may occur."
            },
            {
                question: "What is the most common source of pulmonary emboli?",
                options: ["Pelvic veins", "Deep leg veins (DVT)", "Right atrium", "Superior vena cava", "Renal veins"],
                correct: 1,
                explanation: "Most emboli originate from **deep leg veins** (iliac, femoral, popliteal)."
            },
            {
                question: "Which drug is a long-acting muscarinic antagonist (LAMA) used in COPD?",
                options: ["Albuterol", "Ipratropium", "Tiotropium", "Salmeterol", "Fluticasone"],
                correct: 2,
                explanation: "**Tiotropium** is a long-acting anticholinergic (LAMA) for COPD maintenance. Ipratropium is short-acting."
            },
            {
                question: "What is the mechanism of action of montelukast?",
                options: ["β2-agonist", "Muscarinic antagonist", "Leukotriene receptor antagonist", "Phosphodiesterase inhibitor", "Mast cell stabilizer"],
                correct: 2,
                explanation: "**Montelukast** is a leukotriene receptor antagonist (LTRA) used in asthma."
            },
            {
                question: "In which condition is 100% oxygen therapy least effective?",
                options: ["V/Q mismatch", "Hypoventilation", "Shunt", "Diffusion limitation", "Low FiO₂"],
                correct: 2,
                explanation: "**Shunt** (e.g., pneumonia) does not improve with 100% O₂ because blood bypasses ventilated alveoli."
            },
            {
                question: "What is the definition of pulmonary hypertension?",
                options: ["Mean PA pressure >15 mmHg", "Mean PA pressure >20 mmHg", "Mean PA pressure >25 mmHg", "Mean PA pressure >30 mmHg", "Mean PA pressure >35 mmHg"],
                correct: 1,
                explanation: "Pulmonary hypertension is now defined as **mean pulmonary artery pressure >20 mmHg** at rest."
            },
            {
                question: "Which of the following is a cause of hypoxemia with normal A-a gradient?",
                options: ["Pneumonia", "Pulmonary embolism", "Hypoventilation", "ARDS", "Interstitial fibrosis"],
                correct: 2,
                explanation: "**Hypoventilation** (e.g., opiate overdose) causes hypoxemia with a normal A-a gradient because PaCO₂ rises and PAO₂ falls proportionally."
            },
            {
                question: "What is the most common cause of respiratory alkalosis?",
                options: ["Anxiety (hyperventilation)", "Pneumonia", "PE", "Liver disease", "All of the above"],
                correct: 0,
                explanation: "**Hyperventilation** due to anxiety, pain, or hypoxia is the most common cause of respiratory alkalosis."
            },
            {
                question: "Which of the following is a characteristic of emphysema?",
                options: ["Increased elastic recoil", "Decreased compliance", "Increased DLCO", "Decreased RV", "Loss of alveolar septa"],
                correct: 4,
                explanation: "Emphysema involves **destruction of alveolar walls**, leading to loss of elastic recoil, increased compliance, and decreased DLCO."
            },
            {
                question: "What is the primary function of surfactant?",
                options: ["Kill bacteria", "Increase surface tension", "Reduce surface tension", "Promote alveolar collapse", "Increase work of breathing"],
                correct: 2,
                explanation: "Surfactant **reduces surface tension**, preventing alveolar collapse and decreasing work of breathing."
            },
            {
                question: "Which of the following is a sign of tension pneumothorax?",
                options: ["Tracheal deviation toward affected side", "Hyperresonance on percussion", "Increased breath sounds", "JVD", "Both B and D"],
                correct: 4,
                explanation: "Tension pneumothorax causes **tracheal deviation away**, hyperresonance, absent breath sounds, and **JVD** from increased intrathoracic pressure."
            },
            {
                question: "What is the most common cause of bronchiectasis?",
                options: ["Cystic fibrosis", "Kartagener syndrome", "Post-infectious", "ABPA", "Immunodeficiency"],
                correct: 0,
                explanation: "**Cystic fibrosis** is the most common cause of bronchiectasis in developed countries. Globally, post-infectious is common."
            },
            {
                question: "Which organism causes atypical pneumonia and is associated with cold agglutinins?",
                options: ["Mycoplasma pneumoniae", "Legionella pneumophila", "Chlamydia psittaci", "Coxiella burnetii", "Adenovirus"],
                correct: 0,
                explanation: "**Mycoplasma pneumoniae** causes atypical pneumonia and may produce cold agglutinins (IgM antibodies that agglutinate RBCs at 4°C)."
            },
            {
                question: "What is the treatment of choice for acute asthma exacerbation?",
                options: ["Inhaled corticosteroids", "Long-acting β2-agonists", "Short-acting β2-agonists", "Anticholinergics", "Leukotriene antagonists"],
                correct: 2,
                explanation: "**Short-acting β2-agonists (SABA)** like albuterol are first-line for acute bronchospasm."
            },
            {
                question: "Which of the following is a contraindication to thrombolytics in PE?",
                options: ["Recent surgery", "Active bleeding", "Stroke within 2 months", "All of the above", "None of the above"],
                correct: 3,
                explanation: "**All are contraindications** to thrombolysis: active bleeding, recent surgery/trauma, history of intracranial hemorrhage, recent stroke."
            },
            {
                question: "What is the most common cause of cor pulmonale?",
                options: ["Left heart failure", "COPD", "Pulmonary embolism", "Idiopathic PAH", "Obstructive sleep apnea"],
                correct: 1,
                explanation: "**COPD** is the most common cause of cor pulmonale (right heart failure secondary to lung disease)."
            },
            {
                question: "Which of the following is a feature of Pickwickian syndrome (obesity-hypoventilation)?",
                options: ["Hypoxemia", "Hypercapnia", "Polycythemia", "Daytime sleepiness", "All of the above"],
                correct: 4,
                explanation: "**All are features**: obesity, hypoventilation, hypercapnia, hypoxemia, polycythemia, and sleep apnea."
            },
            {
                question: "What is the primary mechanism of CO₂ transport in blood?",
                options: ["Dissolved", "Bicarbonate", "Carbamino compounds", "Bound to hemoglobin", "As carbonic acid"],
                correct: 1,
                explanation: "Approximately **70% of CO₂ is transported as bicarbonate** (HCO₃⁻)."
            },
            {
                question: "Which of the following increases oxygen delivery to tissues?",
                options: ["Left shift of O₂-Hb curve", "Decreased 2,3-BPG", "Alkalosis", "Right shift of O₂-Hb curve", "Hypothermia"],
                correct: 3,
                explanation: "**Right shift** (increased P50) decreases affinity, facilitating O₂ unloading to tissues."
            },
            {
                question: "What is the most common cause of community-acquired pneumonia in young adults?",
                options: ["Strep. pneumoniae", "Mycoplasma pneumoniae", "Chlamydophila pneumoniae", "Legionella", "Viral"],
                correct: 1,
                explanation: "**Mycoplasma pneumoniae** is a common cause in young adults, but overall **Strep. pneumoniae** is still most common across all ages."
            },
            {
                question: "Which of the following is a characteristic of a tension pneumothorax on CXR?",
                options: ["Deep sulcus sign", "Mediastinal shift away", "Hyperlucent lung field", "Pneumothorax line", "All of the above"],
                correct: 4,
                explanation: "Tension pneumothorax shows **mediastinal shift away** from the affected side, hyperlucent lung, deep sulcus, and possibly a visible pneumothorax line."
            },
            {
                question: "What is the most common cause of chronic cough in nonsmokers?",
                options: ["Asthma", "GERD", "Postnasal drip", "ACE inhibitors", "Bronchiectasis"],
                correct: 2,
                explanation: "**Upper airway cough syndrome (postnasal drip)** is the most common cause of chronic cough in nonsmokers."
            },
            {
                question: "Which of the following is a contraindication to lung transplantation?",
                options: ["Age >65", "Active smoking", "HIV infection", "Malignancy within 2 years", "All of the above"],
                correct: 4,
                explanation: "**All are contraindications**: active smoking, active malignancy, advanced age, HIV, and other significant comorbidities."
            },
            {
                question: "What is the most common type of lung cancer?",
                options: ["Adenocarcinoma", "Squamous cell", "Small cell", "Large cell", "Carcinoid"],
                correct: 0,
                explanation: "**Adenocarcinoma** is now the most common type, surpassing squamous cell, especially in nonsmokers."
            },
            {
                question: "Which of the following is a paraneoplastic syndrome associated with small cell lung cancer?",
                options: ["SIADH", "Cushing's syndrome", "Lambert-Eaton syndrome", "Hypercalcemia", "All except D"],
                correct: 4,
                explanation: "Small cell lung cancer can cause **SIADH, ACTH (Cushing's), and Lambert-Eaton syndrome**. Hypercalcemia is more typical of squamous cell."
            },
            {
                question: "What is the gold standard for diagnosing pulmonary embolism?",
                options: ["D-dimer", "V/Q scan", "CT pulmonary angiography", "Pulmonary angiography", "MRI"],
                correct: 2,
                explanation: "**CT pulmonary angiography** is now the gold standard, replacing invasive pulmonary angiography."
            },
            {
                question: "Which of the following is a characteristic of a large pleural effusion?",
                options: ["Tracheal deviation toward effusion", "Stony dullness to percussion", "Decreased tactile fremitus", "Eggphony", "Both B and C"],
                correct: 4,
                explanation: "Large effusions cause **tracheal deviation away**, stony dullness, decreased fremitus, and possibly egophony at the top of the fluid."
            },
            {
                question: "What is the most common cause of exudative pleural effusion?",
                options: ["Heart failure", "Pneumonia (parapneumonic)", "Malignancy", "PE", "Tuberculosis"],
                correct: 1,
                explanation: "**Parapneumonic effusion** (due to pneumonia) is the most common cause of exudative effusion."
            },
            {
                question: "Which of the following is a feature of flail chest?",
                options: ["Paradoxical chest wall movement", "Multiple rib fractures", "Underlying pulmonary contusion", "Hypoxia", "All of the above"],
                correct: 4,
                explanation: "Flail chest involves **multiple rib fractures** causing **paradoxical movement**, often with pulmonary contusion and hypoxia."
            },
            {
                question: "What is the treatment of choice for acute respiratory distress syndrome (ARDS)?",
                options: ["High tidal volume ventilation", "Low tidal volume ventilation", "Prone positioning", "Steroids", "Both B and C"],
                correct: 4,
                explanation: "ARDS management includes **low tidal volume ventilation** (6 mL/kg) and **prone positioning** in moderate-severe cases."
            },
            {
                question: "Which of the following is a cause of type II respiratory failure (hypercapnic)?",
                options: ["COPD exacerbation", "Opiate overdose", "Guillain-Barré syndrome", "Myasthenia gravis", "All of the above"],
                correct: 4,
                explanation: "**All** can cause hypoventilation → hypercapnia. Type II failure = PaCO₂ >50 mmHg."
            },
            {
                question: "What is the most common cause of bronchiectasis?",
                options: ["Cystic fibrosis", "Post-infectious", "ABPA", "Ciliary dyskinesia", "Immunodeficiency"],
                correct: 0,
                explanation: "**Cystic fibrosis** is most common in developed countries; globally, post-infectious (e.g., TB, pertussis) is common."
            }
        ];

        // Shuffle to ensure variety, but keep unique
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Use first 50 unique (we have exactly 50)
        let shuffledQuestions = shuffleArray([...questions]);
        let currentIndex = 0;
        let userAnswers = new Array(shuffledQuestions.length).fill(null);
        let showExplanation = new Array(shuffledQuestions.length).fill(false);

        const letters = ['A', 'B', 'C', 'D', 'E'];

        function renderQuestion() {
            const q = shuffledQuestions[currentIndex];
            document.getElementById('questionText').innerText = q.question;

            let optionsHtml = '';
            q.options.forEach((opt, idx) => {
                let classes = 'option';
                if (userAnswers[currentIndex] === idx) classes += ' selected';
                if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                    if (idx === q.correct) classes += ' correct';
                    else if (idx === userAnswers[currentIndex] && idx !== q.correct) classes += ' wrong';
                }
                optionsHtml += `
                    <div class="${classes}" data-index="${idx}">
                        <span class="option-letter">${letters[idx]}</span>
                        <span>${opt}</span>
                    </div>
                `;
            });
            document.getElementById('optionsContainer').innerHTML = optionsHtml;

            // Add click listeners
            document.querySelectorAll('.option').forEach(opt => {
                opt.addEventListener('click', () => {
                    const idx = parseInt(opt.dataset.index);
                    if (userAnswers[currentIndex] === idx) {
                        userAnswers[currentIndex] = null;
                        showExplanation[currentIndex] = false;
                    } else {
                        userAnswers[currentIndex] = idx;
                        showExplanation[currentIndex] = true;
                    }
                    renderQuestion();
                });
            });

            // Explanation
            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                document.getElementById('explanation').innerHTML = `<p>${q.explanation}</p>`;
                document.getElementById('explanation').classList.add('show');
            } else {
                document.getElementById('explanation').classList.remove('show');
            }

            // Update counters
            document.getElementById('questionCounter').innerText = `${currentIndex+1}/${shuffledQuestions.length}`;
            const correctCount = userAnswers.reduce((acc, ans, idx) => {
                return acc + (ans === shuffledQuestions[idx].correct ? 1 : 0);
            }, 0);
            const percent = Math.round((correctCount / shuffledQuestions.length) * 100) || 0;
            document.getElementById('scoreDisplay').innerText = `${percent}%`;
            document.getElementById('progressBar').style.width = `${(currentIndex+1)/shuffledQuestions.length * 100}%`;

            // Navigation buttons
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === shuffledQuestions.length - 1;
        }

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            if (currentIndex < shuffledQuestions.length - 1) {
                currentIndex++;
                renderQuestion();
            }
        });

        // Donation buttons (just demo)
        document.getElementById('donateBtn').addEventListener('click', () => alert('Thank you for your support! ❤️'));
        document.getElementById('donateFooter').addEventListener('click', (e) => {
            e.preventDefault();
            alert('Support MedLib – every coffee helps! ☕');
        });

        // Initialize
        renderQuestion();
    </script>
</body>
</html>
