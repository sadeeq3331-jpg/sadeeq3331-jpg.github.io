          exp: "Memory cells provide rapid response upon re‑exposure." },
        { q: "Which complement regulatory protein deficiency leads to paroxysmal nocturnal hemoglobinuria (PNH)?",
          opts: ["CD55 and CD59 (decay‑accelerating factor)", "C1 inhibitor", "Factor H", "Factor I", "Properdin"],
          correct: 0,
          exp: "PNH: loss of GPI‑anchored proteins (CD55, CD59) → complement‑mediated RBC lysis." },
        { q: "Which immunoglobulin can cross the placenta?",
          opts: ["IgG (only)", "IgM", "IgA", "IgE", "IgD"],
          correct: 0,
          exp: "IgG (especially IgG1, IgG3) is actively transported across placenta." },
        { q: "Opsonization is the process of:",
          opts: ["Coating pathogens to enhance phagocytosis", "Killing bacteria by complement", "Neutralizing viruses", "Stimulating inflammation", "Activating T cells"],
          correct: 0,
          exp: "Opsonins (antibodies, C3b, collectins) promote phagocyte recognition." },
        { q: "Which cell type is the main source of histamine in allergic reactions?",
          opts: ["Mast cells", "Basophils", "Eosinophils", "Neutrophils", "Macrophages"],
          correct: 0,
          exp: "Mast cells in tissues; basophils in blood also release histamine." },
        { q: "Interleukin‑5 (IL‑5) is a growth factor for:",
          opts: ["Eosinophils", "Neutrophils", "B cells", "T cells", "Macrophages"],
          correct: 0,
          exp: "IL‑5 promotes eosinophil production, activation, and survival." },
        { q: "Which of the following is a feature of the innate immune system?",
          opts: ["Rapid response, no memory", "Slow response, antigen‑specific", "Clonal selection", "MHC restriction", "Affinity maturation"],
          correct: 0,
          exp: "Innate immunity is immediate, non‑specific, and lacks memory." },
        { q: "The mannose‑binding lectin (MBL) pathway of complement activation is triggered by:",
          opts: ["Mannose on microbial surfaces", "Antigen‑antibody complexes", "C3 hydrolysis", "Properdin", "Factor B"],
          correct: 0,
          exp: "MBL binds mannose residues on pathogens, activating MASP‑1 and MASP‑2." },
        { q: "Affinity maturation of antibodies occurs in:",
          opts: ["Germinal centers of lymphoid follicles", "Bone marrow", "Thymus", "Periphery", "Blood"],
          correct: 0,
          exp: "Somatic hypermutation and selection in germinal centers increase antibody affinity." },
        { q: "The CD40‑CD40L interaction is critical for:",
          opts: ["T‑cell help to B cells (class switching, germinal center formation)", "Cytotoxic T‑cell activation", "NK cell activation", "Macrophage activation", "Dendritic cell maturation"],
          correct: 0,
          exp: "CD40L on activated T cells binds CD40 on B cells; defect causes hyper‑IgM syndrome." },
        { q: "What is the mechanism of action of intravenous immunoglobulin (IVIG) in immune thrombocytopenia (ITP)?",
          opts: ["Fc receptor blockade, anti‑idiotype antibodies, immunomodulation", "B‑cell depletion", "T‑cell suppression", "Complement inhibition", "Cytokine neutralization"],
          correct: 0,
          exp: "IVIG works through multiple mechanisms including Fc blockade, modulating antibody production." }
    ];
    const allQuestions = questions.concat(extra); // now 65

    // Shuffle
    let shuffled = allQuestions.sort(()=>0.5-Math.random());
    let currentIndex = 0;
    let userAnswers = new Array(shuffled.length).fill(null);
    let showExplanation = new Array(shuffled.length).fill(false);
    const letters = ['A','B','C','D','E'];

    function render() {
        const q = shuffled[currentIndex];
        document.getElementById('questionText').innerText = q.q;
        let optsHtml = '';
        q.opts.forEach((opt, idx) => {
            let cls = 'option';
            if (userAnswers[currentIndex] === idx) cls += ' selected';
            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                if (idx === q.correct) cls += ' correct';
                else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
            }
            optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
        });
        document.getElementById('optionsContainer').innerHTML = optsHtml;

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                let idx = parseInt(opt.dataset.idx);
                if (userAnswers[currentIndex] === idx) {
                    userAnswers[currentIndex] = null;
                    showExplanation[currentIndex] = false;
                } else {
                    userAnswers[currentIndex] = idx;
                    showExplanation[currentIndex] = true;
                }
                render();
            });
        });

        if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
            document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
            document.getElementById('explanation').classList.add('show');
        } else {
            document.getElementById('explanation').classList.remove('show');
        }

        document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
        let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
        document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
        document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

        // dots
        let dots = '';
        for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
            let cls = 'dot';
            if (i === currentIndex) cls += ' active';
            if (userAnswers[i] !== null) cls += ' answered';
            dots += `<div class="${cls}" data-index="${i}"></div>`;
        }
        document.getElementById('dotsContainer').innerHTML = dots;
        document.querySelectorAll('.dot').forEach(d => {
            d.addEventListener('click', () => {
                let idx = parseInt(d.dataset.index);
                if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                    currentIndex = idx;
                    render();
                }
            });
        });
    }

    document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
    render();
</script>
</body>
</html>
