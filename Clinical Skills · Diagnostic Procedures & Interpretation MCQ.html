          exp: "A‑a gradient increases with V/Q mismatch, shunt, diffusion impairment; normal in hypoventilation and low FiO₂." },
        { q: "In pure hypoventilation, PaCO₂ is _____ and A‑a gradient is _____.",
          opts: ["Increased, normal", "Increased, increased", "Normal, normal", "Decreased, normal", "Decreased, increased"],
          correct: 0,
          exp: "Hypoventilation causes ↑ PaCO₂ and normal A‑a gradient (e.g., opioid overdose, neuromuscular disease)." },
        { q: "The normal PaO₂ on room air at sea level is approximately:",
          opts: ["80‑100 mmHg", "60‑70 mmHg", "50‑60 mmHg", "100‑120 mmHg", "70‑80 mmHg"],
          correct: 0,
          exp: "PaO₂ 80‑100 mmHg (SpO₂ 95‑100%)." },
        { q: "Type I respiratory failure is defined as:",
          opts: ["PaO₂ <60 mmHg, PaCO₂ normal/low", "PaO₂ <60 mmHg, PaCO₂ >50 mmHg", "PaCO₂ >50 mmHg, PaO₂ normal", "PaO₂ <80 mmHg", "PaO₂ <60 mmHg, PaCO₂ <50 mmHg"],
          correct: 0,
          exp: "Type I (hypoxemic): PaO₂ <60, PaCO₂ normal/low; Type II (hypercapnic): PaCO₂ >50." },
        { q: "On ultrasound, the finding of a 'sliding lung' sign (lung sliding) rules out:",
          opts: ["Pneumothorax", "Pleural effusion", "Hemothorax", "Pneumonia", "Atelectasis"],
          correct: 0,
          exp: "Lung sliding (visceral against parietal pleura) is absent in pneumothorax." },
        { q: "The FAST (Focused Assessment with Sonography in Trauma) exam assesses for:",
          opts: ["Free fluid in abdomen (hemoperitoneum), pericardial effusion", "Pneumothorax", "Fractures", "Aortic dissection", "DVT"],
          correct: 0,
          exp: "FAST looks for fluid in Morison pouch, splenorenal recess, pelvis, and pericardium." },
        { q: "In echocardiography, the 'bowing' of interatrial septum toward the right during inspiration suggests:",
          opts: ["Cardiac tamponade", "Constrictive pericarditis", "Pulmonary hypertension", "Right ventricular infarction", "Atrial septal defect"],
          correct: 0,
          exp: "Tamponade: exaggerated respiratory variation, septal bowing." },
        { q: "On ECG, left ventricular hypertrophy (LVH) is suggested by:",
          opts: ["S in V1 + R in V5/V6 >35 mm (Sokolow‑Lyon)", "R in V1 + S in V5 >35 mm", "Deep Q waves", "ST depression in V5‑V6", "Tall R in V1"],
          correct: 0,
          exp: "Sokolow‑Lyon criteria: S in V1 + R in V5 or V6 >35 mm indicates LVH." },
        { q: "Right ventricular hypertrophy (RVH) on ECG is suggested by:",
          opts: ["R > S in V1, right axis deviation", "Deep S in V1", "Tall R in V5‑V6", "Q waves in inferior leads", "Left axis deviation"],
          correct: 0,
          exp: "RVH: R wave > S wave in V1, right axis deviation (>90°)." },
        { q: "In ECG, left bundle branch block (LBBB) is characterized by:",
          opts: ["Wide QRS, M‑shaped in V6, QS in V1", "Wide QRS, RSR' in V1, deep S in V6", "Delta wave", "PR prolongation", "ST elevation"],
          correct: 0,
          exp: "LBBB: QRS >120 ms, broad R wave in I, aVL, V5‑V6; QS or rS in V1." },
        { q: "Right bundle branch block (RBBB) is characterized by:",
          opts: ["RSR' (M‑shaped) in V1, wide S in V6", "Wide R in V6", "Delta wave", "Left axis deviation", "Q waves"],
          correct: 0,
          exp: "RBBB: RSR' in V1 (rabbit ears), wide S in V6." }
    ];
    // Add extra to reach 65
    const extra = [
        { q: "The most common cause of a transudative pleural effusion is:",
          opts: ["Heart failure", "Pneumonia", "Malignancy", "Pulmonary embolism", "Pancreatitis"],
          correct: 0,
          exp: "Heart failure is the most common cause of transudative effusion (increased hydrostatic pressure)." },
        { q: "The most common cause of an exudative pleural effusion is:",
          opts: ["Pneumonia (parapneumonic effusion)", "Heart failure", "Cirrhosis", "Nephrotic syndrome", "Atelectasis"],
          correct: 0,
          exp: "Parapneumonic effusions are the most common exudates." },
        { q: "In a patient with ascites, SAAG >1.1 g/dL and total protein >2.5 g/dL suggests:",
          opts: ["Cardiac ascites (heart failure)", "Cirrhosis", "Nephrotic syndrome", "Pancreatic ascites", "TB peritonitis"],
          correct: 0,
          exp: "Cardiac ascites: high SAAG and high protein (>2.5 g/dL); cirrhosis: high SAAG, low protein." },
        { q: "In a patient with ascites, SAAG <1.1 g/dL suggests:",
          opts: ["Peritoneal disease (carcinomatosis, TB)", "Portal hypertension", "Heart failure", "Budd‑Chiari syndrome", "Cirrhosis"],
          correct: 0,
          exp: "Low SAAG (<1.1) indicates non‑portal hypertension causes (exudative)." },
        { q: "The presence of which cells in CSF suggests tuberculous meningitis?",
          opts: ["Lymphocytes, low glucose, very high protein", "Neutrophils, low glucose", "Lymphocytes, normal glucose", "Eosinophils", "Malignant cells"],
          correct: 0,
          exp: "TB meningitis: lymphocytic pleocytosis, low glucose, very high protein (often >100 mg/dL)." },
        { q: "CSF oligoclonal bands are characteristic of:",
          opts: ["Multiple sclerosis", "Bacterial meningitis", "Viral meningitis", "Guillain‑Barré syndrome", "Neurosyphilis"],
          correct: 0,
          exp: "Oligoclonal bands (IgG) in CSF suggest intrathecal synthesis, seen in MS." },
        { q: "Which imaging finding is characteristic of a subdural hematoma on CT?",
          opts: ["Crescent‑shaped, crosses suture lines", "Lens‑shaped, does not cross sutures", "Hyperdense in posterior fossa", "Isodense with brain", "Mixed density"],
          correct: 0,
          exp: "Subdural: crescent‑shaped, crosses sutures; epidural: lens‑shaped, limited by sutures." },
        { q: "On non‑contrast CT, an acute epidural hematoma appears as:",
          opts: ["Lens‑shaped, hyperdense", "Crescent‑shaped, hyperdense", "Crescent‑shaped, hypodense", "Lens‑shaped, hypodense", "Isodense"],
          correct: 0,
          exp: "Epidural: lens‑shaped, hyperdense (acute blood), often associated with skull fracture." },
        { q: "In MRI, T1‑weighted imaging shows fat as:",
          opts: ["Bright (high signal)", "Dark (low signal)", "Isointense", "Variable", "Invisible"],
          correct: 0,
          exp: "Fat is bright on T1, dark on T2 (with fat suppression)." },
        { q: "In MRI, water/CSF appears bright on:",
          opts: ["T2‑weighted imaging", "T1‑weighted imaging", "Proton density", "FLAIR", "STIR"],
          correct: 0,
          exp: "Water/CSF is dark on T1, bright on T2." },
        { q: "PET scan using FDG is most useful for:",
          opts: ["Detecting metabolically active tumors, infection, inflammation", "Bone metastases", "Brain perfusion", "Myocardial viability", "Pulmonary embolism"],
          correct: 0,
          exp: "FDG‑PET highlights hypermetabolic cells (cancer, infection)." },
        { q: "The most common cause of an elevated troponin not due to acute coronary syndrome is:",
          opts: ["Myocarditis, tachycardia, pulmonary embolism, renal failure", "Gastroenteritis", "Pneumonia", "Anxiety", "Dehydration"],
          correct: 0,
          exp: "Many conditions cause troponin elevation (type 2 MI, myocarditis, PE, sepsis, renal failure)." },
        { q: "BNP (B‑type natriuretic peptide) is most useful for:",
          opts: ["Diagnosing heart failure (elevated in HF)", "Diagnosing ACS", "Monitoring anticoagulation", "Detecting DVT", "Assessing liver function"],
          correct: 0,
          exp: "BNP >100 pg/mL suggests heart failure." },
        { q: "In a patient with suspected acute coronary syndrome, which test is most specific for myocardial necrosis?",
          opts: ["Troponin I/T", "CK‑MB", "Myoglobin", "LDH", "AST"],
          correct: 0,
          exp: "Troponin is the most specific and sensitive biomarker for myocardial injury." },
        { q: "The 'delta' troponin (change over time) helps distinguish:",
          opts: ["Acute MI from chronic troponin elevation", "STEMI from NSTEMI", "Type 1 from type 2 MI", "Myocarditis from MI", "PE from MI"],
          correct: 0,
          exp: "A rising or falling pattern indicates acute MI; stable elevation suggests chronic damage (e.g., renal failure)." }
    ];
    const allQuestions = questions.concat(extra); // now 65+

    // Shuffle
    let shuffled = allQuestions.sort(()=>0.5-Math.random());
    let currentIndex = 0;
    let userAnswers = new Array(shuffled.length).fill(null);
    let showExplanation = new Array(shuffled.length).fill(false);
    const letters = ['A','B','C','D','E'];

    function render() {
        const q = shuffled[currentIndex];
        document.getElementById('questionText').innerText = q.q;
        let optsHtml = '';
        q.opts.forEach((opt, idx) => {
            let cls = 'option';
            if (userAnswers[currentIndex] === idx) cls += ' selected';
            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                if (idx === q.correct) cls += ' correct';
                else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
            }
            optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
        });
        document.getElementById('optionsContainer').innerHTML = optsHtml;

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                let idx = parseInt(opt.dataset.idx);
                if (userAnswers[currentIndex] === idx) {
                    userAnswers[currentIndex] = null;
                    showExplanation[currentIndex] = false;
                } else {
                    userAnswers[currentIndex] = idx;
                    showExplanation[currentIndex] = true;
                }
                render();
            });
        });

        if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
            document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
            document.getElementById('explanation').classList.add('show');
        } else {
            document.getElementById('explanation').classList.remove('show');
        }

        document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
        let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
        document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
        document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

        // dots
        let dots = '';
        for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
            let cls = 'dot';
            if (i === currentIndex) cls += ' active';
            if (userAnswers[i] !== null) cls += ' answered';
            dots += `<div class="${cls}" data-index="${i}"></div>`;
        }
        document.getElementById('dotsContainer').innerHTML = dots;
        document.querySelectorAll('.dot').forEach(d => {
            d.addEventListener('click', () => {
                let idx = parseInt(d.dataset.index);
                if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                    currentIndex = idx;
                    render();
                }
            });
        });
    }

    document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
    render();
</script>
</body>
</html>
