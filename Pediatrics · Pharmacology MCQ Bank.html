          exp: "Ondansetron blocks serotonin receptors in chemoreceptor trigger zone and gut." },
        { q: "In a child with severe hyperkalemia, which agent rapidly lowers serum potassium by shifting it intracellularly?",
          opts: ["IV calcium gluconate", "Sodium bicarbonate", "Insulin + glucose", "Albuterol", "Both C and D"],
          correct: 4,
          exp: "Insulin/glucose and beta‑agonists shift K⁺ intracellularly; calcium stabilizes myocardium." },
        { q: "For treatment of iron overdose, the specific antidote is:",
          opts: ["Deferoxamine", "Deferasirox", "Succimer", "EDTA", "Penicillamine"],
          correct: 0,
          exp: "Deferoxamine chelates iron; urine turns 'vin rosé' color." },
        { q: "What is the treatment for organophosphate poisoning in a child?",
          opts: ["Atropine + pralidoxime (2‑PAM)", "Naloxone", "Flumazenil", "N‑acetylcysteine", "Sodium bicarbonate"],
          correct: 0,
          exp: "Atropine blocks muscarinic effects; pralidoxime reactivates acetylcholinesterase." }
    ];
    // Add extra to reach 65+
    const extra = [
        { q: "In a child with febrile seizures, which antipyretic is preferred?",
          opts: ["Acetaminophen or ibuprofen", "Aspirin", "Naproxen", "Ketorolac", "None (antipyretics don't prevent febrile seizures)"],
          correct: 4,
          exp: "Antipyretics may reduce fever but do not prevent febrile seizures; still used for comfort." },
        { q: "For neonatal herpes simplex encephalitis, the drug of choice is:",
          opts: ["Acyclovir IV", "Ganciclovir", "Valacyclovir", "Foscarnet", "Cidofovir"],
          correct: 0,
          exp: "High‑dose IV acyclovir for 21 days." },
        { q: "Congenital toxoplasmosis is treated with:",
          opts: ["Pyrimethamine + sulfadiazine + folinic acid", "Azithromycin", "Clindamycin", "Metronidazole", "Albendazole"],
          correct: 0,
          exp: "This combination treats toxoplasmosis; folinic acid prevents pyrimethamine toxicity." },
        { q: "Which antifungal is safe for systemic use in neonates?",
          opts: ["Amphotericin B (deoxycholate or liposomal)", "Ketoconazole", "Itraconazole", "Griseofulvin", "Terbinafine"],
          correct: 0,
          exp: "Amphotericin B is used for serious fungal infections; lipid formulations reduce nephrotoxicity." },
        { q: "For treatment of intestinal helminths in children, which drug is commonly used?",
          opts: ["Albendazole or mebendazole", "Praziquantel", "Ivermectin", "Diethylcarbamazine", "Metronidazole"],
          correct: 0,
          exp: "Albendazole and mebendazole are broad‑spectrum antihelminthics." },
        { q: "In an infant with bronchiolitis, routine use of which medication is NOT recommended?",
          opts: ["Albuterol", "Nebulized hypertonic saline", "Corticosteroids", "Ribavirin", "All of the above (none routinely recommended except supportive care)"],
          correct: 4,
          exp: "Bronchiolitis management is supportive; evidence for albuterol, steroids, etc., is lacking." },
        { q: "What is the treatment for scabies in an infant?",
          opts: ["Permethrin 5% cream", "Lindane", "Ivermectin oral", "Crotamiton", "Benzyl benzoate"],
          correct: 0,
          exp: "Permethrin is first‑line and safe in infants." },
        { q: "For pediculosis capitis (head lice), first‑line treatment is:",
          opts: ["Permethrin 1% lotion", "Malathion", "Ivermectin", "Lindane", "Spinosad"],
          correct: 0,
          exp: "Permethrin (pyrethroid) is first‑line; resistance may require alternatives." },
        { q: "Which medication is used to treat neonatal tetanus?",
          opts: ["Human tetanus immune globulin (HTIG) + metronidazole", "Penicillin G", "Doxycycline", "Ceftriaxone", "Clindamycin"],
          correct: 0,
          exp: "HTIG neutralizes toxin; metronidazole or penicillin eliminates bacteria." },
        { q: "In a child with hypertrophic cardiomyopathy, which medication is contraindicated?",
          opts: ["Digoxin (positive inotrope)", "Beta‑blockers", "Verapamil", "Disopyramide", "ACE inhibitors"],
          correct: 0,
          exp: "Digoxin increases contractility, worsening outflow obstruction." },
        { q: "For treatment of juvenile idiopathic arthritis, which disease‑modifying antirheumatic drug (DMARD) is first‑line?",
          opts: ["Methotrexate", "Sulfasalazine", "Hydroxychloroquine", "Leflunomide", "Etanercept"],
          correct: 0,
          exp: "Methotrexate (oral or SC) is the anchor DMARD in JIA." },
        { q: "Which biologic is used for refractory JIA?",
          opts: ["Etanercept (TNF inhibitor)", "Rituximab", "Abatacept", "Tocilizumab (IL‑6)", "All of the above"],
          correct: 4,
          exp: "Biologics include TNF inhibitors (etanercept, adalimumab), IL‑1/IL‑6 blockers, and abatacept." }
    ];
    const allQuestions = questions.concat(extra); // now 65+

    // Shuffle
    let shuffled = allQuestions.sort(()=>0.5-Math.random());
    let currentIndex = 0;
    let userAnswers = new Array(shuffled.length).fill(null);
    let showExplanation = new Array(shuffled.length).fill(false);
    const letters = ['A','B','C','D','E'];

    function render() {
        const q = shuffled[currentIndex];
        document.getElementById('questionText').innerText = q.q;
        let optsHtml = '';
        q.opts.forEach((opt, idx) => {
            let cls = 'option';
            if (userAnswers[currentIndex] === idx) cls += ' selected';
            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                if (idx === q.correct) cls += ' correct';
                else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
            }
            optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
        });
        document.getElementById('optionsContainer').innerHTML = optsHtml;

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                let idx = parseInt(opt.dataset.idx);
                if (userAnswers[currentIndex] === idx) {
                    userAnswers[currentIndex] = null;
                    showExplanation[currentIndex] = false;
                } else {
                    userAnswers[currentIndex] = idx;
                    showExplanation[currentIndex] = true;
                }
                render();
            });
        });

        if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
            document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
            document.getElementById('explanation').classList.add('show');
        } else {
            document.getElementById('explanation').classList.remove('show');
        }

        document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
        let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
        document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
        document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

        // dots
        let dots = '';
        for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
            let cls = 'dot';
            if (i === currentIndex) cls += ' active';
            if (userAnswers[i] !== null) cls += ' answered';
            dots += `<div class="${cls}" data-index="${i}"></div>`;
        }
        document.getElementById('dotsContainer').innerHTML = dots;
        document.querySelectorAll('.dot').forEach(d => {
            d.addEventListener('click', () => {
                let idx = parseInt(d.dataset.index);
                if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                    currentIndex = idx;
                    render();
                }
            });
        });
    }

    document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
    render();
</script>
</body>
</html>
