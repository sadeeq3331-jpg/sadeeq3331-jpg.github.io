<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductive Pharmacology · MCQ Bank</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(145deg, #eef2f7, #d9e2ec);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,20,40,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 95vh;
            max-height: 900px;
        }
        .header {
            background: linear-gradient(135deg, #0b2f4e, #1a4d7a);
            color: white;
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-bottom: 4px solid #ffc107;
        }
        .header i { font-size: 2.2rem; color: #ffc107; }
        .header h1 {
            font-weight: 600;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }
        .header .credit {
            margin-left: auto;
            background: rgba(255,255,255,0.15);
            padding: 0.4rem 1.5rem;
            border-radius: 40px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header .credit i { font-size: 1.2rem; color: #ffc107; }
        .progress-area {
            padding: 1rem 2rem;
            background: #f8fafd;
            border-bottom: 1px solid #dde5ed;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .progress-bar {
            flex: 2;
            height: 10px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0b2f4e, #2c7cb0);
            width: 0%;
            transition: width 0.3s;
        }
        .stats {
            display: flex;
            gap: 1.5rem;
            font-weight: 600;
            color: #1e4b6e;
        }
        .stats span {
            background: white;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .question-container {
            flex: 1;
            padding: 2rem 2rem 1rem;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #b0c4de #f1f5f9;
        }
        .question-container::-webkit-scrollbar { width: 8px; }
        .question-container::-webkit-scrollbar-track { background: #f1f5f9; }
        .question-container::-webkit-scrollbar-thumb { background: #b0c4de; border-radius: 10px; }
        .question-text {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0a2942;
            line-height: 1.5;
            margin-bottom: 1.8rem;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .option {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            padding: 1rem 1.8rem;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px -8px rgba(0,0,0,0.1);
        }
        .option:hover {
            border-color: #2c7cb0;
            background: #f0f7ff;
            transform: translateX(6px);
        }
        .option.selected {
            border-color: #0b2f4e;
            background: #e5eff9;
        }
        .option.correct {
            border-color: #28a745;
            background: #e1f7e7;
        }
        .option.wrong {
            border-color: #dc3545;
            background: #ffe6e8;
        }
        .option-letter {
            width: 40px;
            height: 40px;
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #0a2942;
            font-size: 1.2rem;
        }
        .option.selected .option-letter { background: #0b2f4e; color: white; }
        .explanation {
            background: #f0f9ff;
            border-left: 6px solid #2c7cb0;
            border-radius: 20px;
            padding: 1.5rem;
            margin-top: 2rem;
            display: none;
        }
        .explanation.show { display: block; }
        .nav-buttons {
            padding: 1.5rem 2rem;
            background: #f8fafd;
            border-top: 1px solid #dde5ed;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        .btn {
            background: white;
            border: 2px solid #1a4d7a;
            color: #1a4d7a;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
        }
        .btn:hover:not(:disabled) { background: #1a4d7a; color: white; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; border-color: #b0c4de; }
        .btn-primary { background: #1a4d7a; color: white; }
        .dots {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .dot {
            width: 30px;
            height: 6px;
            border-radius: 6px;
            background: #d0e0f0;
            transition: 0.2s;
            cursor: pointer;
        }
        .dot.active { background: #1a4d7a; width: 45px; }
        .dot.answered { background: #28a745; }
        @media (max-width: 700px) {
            .header { flex-wrap: wrap; }
            .progress-area { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <i class="fas fa-venus-mars"></i>
            <h1>Reproductive Pharmacology · MCQ Bank</h1>
            <div class="credit"><i class="fas fa-user-md"></i> Abubakar Sadeeq</div>
        </div>
        <div class="progress-area">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="stats">
                <span id="qCounter">0/60</span>
                <span id="scoreDisplay">Score: 0</span>
            </div>
        </div>
        <div class="question-container" id="questionContainer">
            <div class="question-text" id="questionText">Loading...</div>
            <div class="options" id="optionsContainer"></div>
            <div class="explanation" id="explanation"></div>
        </div>
        <div class="nav-buttons">
            <button class="btn" id="prevBtn" disabled><i class="fas fa-arrow-left"></i> Previous</button>
            <div class="dots" id="dotsContainer"></div>
            <button class="btn btn-primary" id="nextBtn">Next <i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <script>
        // 60+ UNIQUE REPRODUCTIVE PHARMACOLOGY QUESTIONS
        const questions = [
            { q: "Combined oral contraceptives (COCs) work primarily by:",
              opts: ["Inhibiting ovulation via negative feedback", "Thickening cervical mucus", "Altering endometrium", "All of the above", "None"],
              correct: 3,
              exp: "COCs suppress LH/FSH, thicken mucus, and alter endometrium." },
            { q: "The estrogen component of most COCs is:",
              opts: ["Estradiol", "Estrone", "Ethinyl estradiol", "Estriol", "Conjugated estrogens"],
              correct: 2,
              exp: "Ethinyl estradiol is the synthetic estrogen in COCs." },
            { q: "A major adverse effect of COCs is:",
              opts: ["Thromboembolism", "Ovarian cancer", "Endometrial cancer", "Osteoporosis", "Hypokalemia"],
              correct: 0,
              exp: "COCs increase risk of DVT/PE, especially in smokers over 35." },
            { q: "Progestin‑only pills (POPs) are less effective than COCs because they:",
              opts: ["Do not consistently inhibit ovulation", "Have lower hormone levels", "Are taken monthly", "Increase FSH", "Are poorly absorbed"],
              correct: 0,
              exp: "POPs may not suppress ovulation reliably; they rely on cervical mucus thickening." },
            { q: "Levonorgestrel IUD (Mirena) works primarily by:",
              opts: ["Local progestin effect on endometrium", "Systemic ovulation suppression", "Copper toxicity", "Barrier method", "Inhibiting implantation"],
              correct: 0,
              exp: "LNG‑IUD thickens cervical mucus, thins endometrium, and may inhibit sperm." },
            { q: "Copper IUD (Paragard) acts as a:",
              opts: ["Spermicide", "Ovulation inhibitor", "Progesterone agonist", "Estrogen antagonist", "Implantation promoter"],
              correct: 0,
              exp: "Copper is spermicidal and inhibits sperm motility." },
            { q: "Emergency contraception with levonorgestrel (Plan B) is most effective if taken within:",
              opts: ["24 hours", "72 hours", "5 days", "7 days", "12 hours"],
              correct: 1,
              exp: "Levonorgestrel is approved for up to 72 hours." },
            { q: "Ulipristal acetate (Ella) is a:",
              opts: ["Progesterone receptor modulator", "Estrogen receptor antagonist", "GnRH agonist", "Androgen receptor blocker", "Aromatase inhibitor"],
              correct: 0,
              exp: "Ulipristal is a selective progesterone receptor modulator." },
            { q: "Clomiphene citrate is used for ovulation induction. Its mechanism is:",
              opts: ["Estrogen receptor antagonist in hypothalamus → increased GnRH", "Direct ovarian stimulation", "Inhibiting prolactin", "Increasing FSH synthesis", "Blocking progesterone"],
              correct: 0,
              exp: "Clomiphene blocks estrogen negative feedback, increasing FSH and LH." },
            { q: "A serious adverse effect of clomiphene is:",
              opts: ["Ovarian hyperstimulation syndrome (OHSS)", "Multiple pregnancy", "Visual disturbances", "All of the above", "None"],
              correct: 3,
              exp: "OHSS, multiple pregnancy, and visual symptoms can occur." },
            { q: "Letrozole is an aromatase inhibitor used off‑label for ovulation induction. It works by:",
              opts: ["Decreasing estrogen, increasing FSH", "Blocking estrogen receptors", "Inhibiting prolactin", "Stimulating GnRH", "Directly stimulating ovaries"],
              correct: 0,
              exp: "Aromatase inhibition reduces estrogen, releasing negative feedback." },
            { q: "Gonadotropins (FSH, hMG) used in IVF can cause:",
              opts: ["OHSS", "Thrombosis", "Multiple gestation", "All of the above", "None"],
              correct: 3,
              exp: "OHSS is a major risk of gonadotropin stimulation." },
            { q: "GnRH agonists (e.g., leuprolide) are used in IVF to:",
              opts: ["Prevent premature LH surge", "Stimulate ovulation", "Suppress ovarian function", "Enhance implantation", "Luteal support"],
              correct: 0,
              exp: "GnRH agonists prevent spontaneous ovulation by desensitizing pituitary." },
            { q: "GnRH antagonists (cetrorelix, ganirelix) are preferred in some IVF protocols because they:",
              opts: ["Cause immediate suppression without flare", "Are oral", "Are cheaper", "Have fewer side effects", "Stimulate ovulation"],
              correct: 0,
              exp: "Antagonists block GnRH receptors immediately, no initial flare." },
            { q: "Bromocriptine and cabergoline are dopamine agonists used for:",
              opts: ["Hyperprolactinemia‑induced infertility", "PCOS", "Endometriosis", "Uterine fibroids", "Breast cancer"],
              correct: 0,
              exp: "They lower prolactin, restoring ovulation." },
            { q: "Testosterone replacement therapy can cause:",
              opts: ["Erythrocytosis", "Gynecomastia (via aromatization)", "Acne", "Sleep apnea", "All of the above"],
              correct: 4,
              exp: "Testosterone increases RBC, may cause gynecomastia, acne, and worsen sleep apnea." },
            { q: "Finasteride inhibits which enzyme?",
              opts: ["5α‑reductase", "Aromatase", "17α‑hydroxylase", "3β‑HSD", "11β‑hydroxylase"],
              correct: 0,
              exp: "Finasteride inhibits type 2 5α‑reductase, reducing DHT." },
            { q: "Spironolactone is used in hirsutism because it:",
              opts: ["Blocks androgen receptors", "Inhibits 5α‑reductase", "Suppresses gonadotropins", "Increases SHBG", "Reduces cortisol"],
              correct: 0,
              exp: "Spironolactone is an androgen receptor antagonist." },
            { q: "Flutamide is a non‑steroidal anti‑androgen used for prostate cancer. A major side effect is:",
              opts: ["Hepatotoxicity", "Gynecomastia", "Hot flashes", "Diarrhea", "All of the above"],
              correct: 4,
              exp: "Flutamide can cause hepatotoxicity, gynecomastia, hot flashes, and GI upset." },
            { q: "Tamoxifen is used in ER+ breast cancer. Its mechanism is:",
              opts: ["Estrogen receptor antagonist in breast", "Aromatase inhibitor", "HER2 antagonist", "Progesterone agonist", "GnRH agonist"],
              correct: 0,
              exp: "Tamoxifen blocks estrogen receptors in breast tissue." },
            { q: "Aromatase inhibitors (anastrozole, letrozole) are used in:",
              opts: ["Postmenopausal breast cancer", "Pre‑menopausal breast cancer", "Infertility", "Both A and C", "All"],
              correct: 3,
              exp: "Aromatase inhibitors are used in postmenopausal breast cancer and off‑label for ovulation induction." },
            { q: "A serious adverse effect of aromatase inhibitors is:",
              opts: ["Osteoporosis", "Thromboembolism", "Endometrial cancer", "Hot flashes", "Weight gain"],
              correct: 0,
              exp: "Estrogen deprivation leads to bone loss." },
            { q: "Trastuzumab (Herceptin) is used for HER2+ breast cancer. It can cause:",
              opts: ["Cardiotoxicity", "Hepatotoxicity", "Nephrotoxicity", "Pulmonary fibrosis", "Neutropenia"],
              correct: 0,
              exp: "Trastuzumab can cause left ventricular dysfunction." },
            { q: "GnRH agonists (leuprolide) used in prostate cancer cause an initial:",
              opts: ["Flare of testosterone", "Immediate castration", "Decreased PSA", "Gynecomastia", "Hot flashes"],
              correct: 0,
              exp: "Initial stimulation causes testosterone surge (flare); give anti‑androgen to block." },
            { q: "GnRH antagonists (degarelix) for prostate cancer have the advantage of:",
              opts: ["No flare", "Oral administration", "Lower cost", "Fewer hot flashes", "Better survival"],
              correct: 0,
              exp: "Degarelix causes immediate suppression without flare." },
            { q: "Abiraterone inhibits CYP17, which is involved in:",
              opts: ["Androgen synthesis", "Estrogen synthesis", "Cortisol synthesis", "All of the above", "None"],
              correct: 3,
              exp: "CYP17 is key in androgen and cortisol synthesis." },
            { q: "Sildenafil (Viagra) is used for erectile dysfunction. Its mechanism is:",
              opts: ["PDE‑5 inhibition → ↑cGMP", "PDE‑3 inhibition → ↑cAMP", "α‑blockade", "NO donor", "Guanylyl cyclase activator"],
              correct: 0,
              exp: "Sildenafil inhibits PDE‑5, increasing cGMP, enhancing NO‑mediated vasodilation." },
            { q: "Sildenafil is contraindicated with:",
              opts: ["Nitrates", "Antihypertensives", "Beta‑blockers", "Aspirin", "Statins"],
              correct: 0,
              exp: "Nitrates with PDE‑5 inhibitors cause severe hypotension." },
            { q: "Tadalafil has a longer duration of action (up to 36 hours). It is also used for:",
              opts: ["Benign prostatic hyperplasia", "Pulmonary arterial hypertension", "Both", "None", "Only ED"],
              correct: 2,
              exp: "Tadalafil is approved for ED and BPH (and PAH as Adcirca)." },
            { q: "Oxytocin is used for labor induction. Its main adverse effect is:",
              opts: ["Water intoxication (hyponatremia)", "Uterine rupture", "Hypotension", "Hyperkalemia", "Cardiac arrhythmias"],
              correct: 0,
              exp: "Oxytocin has ADH‑like effect, causing water retention." },
            { q: "Methylergonovine is used for postpartum hemorrhage. It is contraindicated in:",
              opts: ["Hypertension", "Hypotension", "Diabetes", "Asthma", "Liver disease"],
              correct: 0,
              exp: "Methylergonovine causes vasoconstriction; avoid in hypertension." },
            { q: "Misoprostol (PGE₁) is used for:",
              opts: ["Cervical ripening", "Medical abortion", "Postpartum hemorrhage", "All of the above", "None"],
              correct: 3,
              exp: "Misoprostol has multiple obstetric uses." },
            { q: "Terbutaline is a tocolytic used for preterm labor. It is a:",
              opts: ["β2‑agonist", "Calcium channel blocker", "NSAID", "Magnesium salt", "Oxytocin antagonist"],
              correct: 0,
              exp: "Terbutaline relaxes uterus via β2 receptors." },
            { q: "Magnesium sulfate is used for preterm labor and eclampsia prophylaxis. Toxicity causes:",
              opts: ["Loss of deep tendon reflexes, respiratory depression", "Hypotension", "Tachycardia", "Seizures", "Hyperreflexia"],
              correct: 0,
              exp: "Magnesium toxicity causes areflexia, respiratory depression." },
            { q: "Indomethacin is used as a tocolytic but is avoided after 32 weeks because it:",
              opts: ["Constricts ductus arteriosus", "Causes oligohydramnios", "Increases bleeding", "Causes maternal hypertension", "All"],
              correct: 0,
              exp: "Indomethacin can constrict fetal ductus arteriosus." },
            { q: "Cabergoline is used to suppress lactation. Its mechanism is:",
              opts: ["Dopamine agonist", "Prolactin antagonist", "Estrogen agonist", "Progesterone antagonist", "Oxytocin antagonist"],
              correct: 0,
              exp: "Cabergoline activates dopamine receptors, inhibiting prolactin." },
            { q: "Danazol is used for endometriosis but has:",
              opts: ["Androgenic side effects", "Estrogenic effects", "Progestogenic effects", "Minimal side effects", "None"],
              correct: 0,
              exp: "Danazol is a weak androgen, causing weight gain, acne, hirsutism." },
            { q: "GnRH agonists used for endometriosis are often given with:",
              opts: ["Add‑back therapy (estrogen/progestin) to prevent bone loss", "NSAIDs", "Progestins alone", "Aromatase inhibitors", "Androgens"],
              correct: 0,
              exp: "Add‑back therapy mitigates hypoestrogenic side effects." },
            { q: "Tranexamic acid is used for heavy menstrual bleeding. Its mechanism is:",
              opts: ["Antifibrinolytic (blocks plasminogen activation)", "Procoagulant", "Vasoconstrictor", "Estrogen agonist", "NSAID"],
              correct: 0,
              exp: "Tranexamic acid inhibits fibrinolysis, reducing bleeding." },
            { q: "NSAIDs are effective for dysmenorrhea because they:",
              opts: ["Inhibit prostaglandin synthesis", "Relax uterus", "Block pain receptors", "Reduce endometrial shedding", "Increase uterine blood flow"],
              correct: 0,
              exp: "NSAIDs reduce prostaglandins, which cause cramping." },
            { q: "Raloxifene is a SERM used for osteoporosis. It does not stimulate endometrium because:",
              opts: ["It is an antagonist in uterus", "It is an agonist in uterus", "It has no effect on uterus", "It is degraded in uterus", "It binds only to bone"],
              correct: 0,
              exp: "Raloxifene has estrogen antagonist effects in uterus." },
            { q: "Estrogen‑only hormone replacement therapy (HRT) increases risk of:",
              opts: ["Endometrial cancer", "Breast cancer", "Thromboembolism", "All of the above", "None"],
              correct: 3,
              exp: "Unopposed estrogen increases endometrial cancer risk; combined HRT increases breast cancer and VTE." }
        ];

        // Add more to reach 60+
        const extra = [
            { q: "Drospirenone, a progestin in some COCs, has anti‑mineralocorticoid activity and may cause:",
              opts: ["Hyperkalemia", "Hypokalemia", "Hypertension", "Edema", "Weight gain"],
              correct: 0,
              exp: "Drospirenone is a spironolactone analog; caution with potassium." },
            { q: "Ethinyl estradiol is associated with increased risk of:",
              opts: ["Venous thromboembolism", "Myocardial infarction", "Stroke", "All of the above", "None"],
              correct: 3,
              exp: "Estrogen increases risk of thrombotic events." },
            { q: "Progestin‑only emergency contraception (levonorgestrel) is ineffective if taken after:",
              opts: ["Ovulation", "Fertilization", "Implantation", "All", "None"],
              correct: 0,
              exp: "Levonorgestrel prevents ovulation; it does not work after ovulation." },
            { q: "Ulipristal acetate can be taken up to 5 days after unprotected intercourse because it:",
              opts: ["Delays ovulation", "Inhibits implantation", "Causes endometrial atrophy", "Blocks fertilization", "All"],
              correct: 0,
              exp: "Ulipristal can delay ovulation even after LH surge starts." },
            { q: "Testosterone undecanoate (oral) is used in male hypogonadism but has:",
              opts: ["Hepatotoxicity risk", "Poor absorption", "Gynecomastia", "Erythrocytosis", "All"],
              correct: 4,
              exp: "Oral testosterone can cause liver issues; all androgens can cause erythrocytosis, gynecomastia." },
            { q: "Bicalutamide is an anti‑androgen used in prostate cancer. Unlike flutamide, it:",
              opts: ["Has less hepatotoxicity", "Is longer acting", "Is a pure antagonist", "All of the above", "None"],
              correct: 0,
              exp: "Bicalutamide is better tolerated, less hepatotoxic." },
            { q: "Anastrozole is contraindicated in premenopausal women because:",
              opts: ["It increases estrogen via feedback", "It causes ovarian cysts", "It reduces bone density", "It causes thromboembolism", "It is teratogenic"],
              correct: 0,
              exp: "Aromatase inhibitors increase FSH, stimulating ovaries in premenopausal women." },
            { q: "Leuprolide depot is used for central precocious puberty. It works by:",
              opts: ["Initially stimulating then suppressing gonadotropins", "Blocking GnRH receptors", "Inhibiting gonadotropin synthesis", "Antagonizing sex steroids", "None"],
              correct: 0,
              exp: "Continuous GnRH agonist desensitizes pituitary." }
        ];

        const allQuestions = questions.concat(extra); // now >60

        // Shuffle
        let shuffled = allQuestions.sort(()=>0.5-Math.random());
        let currentIndex = 0;
        let userAnswers = new Array(shuffled.length).fill(null);
        let showExplanation = new Array(shuffled.length).fill(false);
        const letters = ['A','B','C','D','E'];

        function render() {
            const q = shuffled[currentIndex];
            document.getElementById('questionText').innerText = q.q;
            let optsHtml = '';
            q.opts.forEach((opt, idx) => {
                let cls = 'option';
                if (userAnswers[currentIndex] === idx) cls += ' selected';
                if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                    if (idx === q.correct) cls += ' correct';
                    else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
                }
                optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
            });
            document.getElementById('optionsContainer').innerHTML = optsHtml;

            document.querySelectorAll('.option').forEach(opt => {
                opt.addEventListener('click', () => {
                    let idx = parseInt(opt.dataset.idx);
                    if (userAnswers[currentIndex] === idx) {
                        userAnswers[currentIndex] = null;
                        showExplanation[currentIndex] = false;
                    } else {
                        userAnswers[currentIndex] = idx;
                        showExplanation[currentIndex] = true;
                    }
                    render();
                });
            });

            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
                document.getElementById('explanation').classList.add('show');
            } else {
                document.getElementById('explanation').classList.remove('show');
            }

            document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
            let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
            document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
            document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

            // dots
            let dots = '';
            for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
                let cls = 'dot';
                if (i === currentIndex) cls += ' active';
                if (userAnswers[i] !== null) cls += ' answered';
                dots += `<div class="${cls}" data-index="${i}"></div>`;
            }
            document.getElementById('dotsContainer').innerHTML = dots;
            document.querySelectorAll('.dot').forEach(d => {
                d.addEventListener('click', () => {
                    let idx = parseInt(d.dataset.index);
                    if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                        currentIndex = idx;
                        render();
                    }
                });
            });
        }

        document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
        document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
        render();
    </script>
</body>
</html>
