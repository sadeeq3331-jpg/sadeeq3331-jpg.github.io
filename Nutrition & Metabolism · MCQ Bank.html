          exp: "Protein has the highest thermic effect (20‑30%), followed by carbs (5‑10%), fat (0‑3%)." },
        { q: "Basal metabolic rate (BMR) is primarily determined by:",
          opts: ["Lean body mass", "Fat mass", "Age", "Gender", "Physical activity"],
          correct: 0,
          exp: "BMR correlates most strongly with lean body mass (muscle, organs)." },
        { q: "Which hormone increases basal metabolic rate?",
          opts: ["Thyroid hormone (T3/T4)", "Insulin", "Cortisol", "Estrogen", "Testosterone"],
          correct: 0,
          exp: "Thyroid hormones increase cellular metabolism and BMR." },
        { q: "The major storage form of carbohydrates in the human body is:",
          opts: ["Glycogen", "Glucose", "Starch", "Cellulose", "Fructose"],
          correct: 0,
          exp: "Glycogen is stored in liver and muscle; liver glycogen maintains blood glucose." },
        { q: "Which lipoprotein transports dietary triglycerides from the intestine?",
          opts: ["Chylomicrons", "VLDL", "LDL", "HDL", "IDL"],
          correct: 0,
          exp: "Chylomicrons carry exogenous (dietary) lipids; VLDL carries endogenous triglycerides." },
        { q: "Familial hypercholesterolemia is caused by defects in the gene for:",
          opts: ["LDL receptor", "ApoB‑100", "PCSK9", "All of the above", "None"],
          correct: 3,
          exp: "LDL receptor mutations are most common; also ApoB‑100 and PCSK9 mutations." },
        { q: "Phenylketonuria (PKU) is caused by deficiency of:",
          opts: ["Phenylalanine hydroxylase", "Tyrosine hydroxylase", "Branched‑chain α‑ketoacid dehydrogenase", "Homogentisate oxidase", "Cystathionine β‑synthase"],
          correct: 0,
          exp: "PAH deficiency → phenylalanine accumulation; treatment is low‑phenylalanine diet." },
        { q: "Maple syrup urine disease (MSUD) affects metabolism of:",
          opts: ["Leucine, isoleucine, valine", "Phenylalanine, tyrosine", "Methionine, cysteine", "Lysine, arginine", "Tryptophan, histidine"],
          correct: 0,
          exp: "MSUD is due to deficiency of branched‑chain α‑ketoacid dehydrogenase." },
        { q: "Galactosemia (classic) is due to deficiency of:",
          opts: ["Galactose‑1‑phosphate uridylyltransferase (GALT)", "Galactokinase", "UDP‑galactose‑4‑epimerase", "Aldolase B", "Fructokinase"],
          correct: 0,
          exp: "GALT deficiency causes galactosemia; presents with jaundice, cataracts, E. coli sepsis." },
        { q: "Hereditary fructose intolerance is caused by deficiency of:",
          opts: ["Aldolase B", "Fructokinase", "Phosphofructokinase", "Pyruvate kinase", "Glucokinase"],
          correct: 0,
          exp: "Aldolase B deficiency → fructose‑1‑phosphate accumulation → hypoglycemia, liver failure." }
    ];
    // Add extra to reach 65
    const extra = [
        { q: "Which vitamin deficiency causes cheilosis and angular stomatitis?",
          opts: ["Riboflavin (B2)", "Niacin", "Pyridoxine", "Folate", "Vitamin A"],
          correct: 0,
          exp: "Riboflavin deficiency causes cheilosis, glossitis, seborrheic dermatitis." },
        { q: "Vitamin C is essential for:",
          opts: ["Hydroxylation of proline and lysine in collagen synthesis", "Carboxylation of glutamate", "Transamination", "Decarboxylation", "Methylation"],
          correct: 0,
          exp: "Vitamin C is a cofactor for prolyl and lysyl hydroxylases in collagen synthesis." },
        { q: "Which mineral is a cofactor for superoxide dismutase (SOD)?",
          opts: ["Zinc and copper", "Selenium", "Manganese", "Iron", "Magnesium"],
          correct: 0,
          exp: "Cytosolic SOD contains copper and zinc; mitochondrial SOD contains manganese." },
        { q: "Acrodermatitis enteropathica is treated with:",
          opts: ["Zinc supplementation", "Copper supplementation", "Iron supplementation", "Vitamin C", "Essential fatty acids"],
          correct: 0,
          exp: "Zinc supplementation (pharmacologic doses) treats acrodermatitis enteropathica." },
        { q: "Which drug used for gout can cause aplastic anemia and should be used with caution in renal impairment?",
          opts: ["Colchicine", "Allopurinol", "Probenecid", "Febuxostat", "Pegloticase"],
          correct: 0,
          exp: "Colchicine toxicity causes bone marrow suppression; dose adjustment in renal/hepatic disease." },
        { q: "The flushing caused by niacin is mediated by:",
          opts: ["Prostaglandin D2 (via EP2/EP4 receptors)", "Histamine", "Serotonin", "Nitric oxide", "Bradykinin"],
          correct: 0,
          exp: "Niacin flush is mediated by prostaglandin D2; can be reduced by aspirin." },
        { q: "Which vitamin is used to treat hyperhomocysteinemia?",
          opts: ["Folate, B12, B6", "Vitamin C", "Vitamin E", "Vitamin A", "Niacin"],
          correct: 0,
          exp: "Folate, B12, and B6 are cofactors in homocysteine metabolism." },
        { q: "Orlistat can cause deficiency of which vitamins?",
          opts: ["A, D, E, K", "B‑complex", "Vitamin C", "Folate", "B12"],
          correct: 0,
          exp: "Orlistat reduces fat absorption, potentially depleting fat‑soluble vitamins." },
        { q: "The active form of vitamin D is:",
          opts: ["1,25‑dihydroxycholecalciferol (calcitriol)", "25‑hydroxycholecalciferol", "Cholecalciferol", "Ergocalciferol", "7‑dehydrocholesterol"],
          correct: 0,
          exp: "Calcitriol (1,25‑(OH)₂D₃) is the active form produced in kidney." },
        { q: "In chronic kidney disease, which vitamin D analog is often used to treat secondary hyperparathyroidism?",
          opts: ["Calcitriol", "Cholecalciferol", "Ergocalciferol", "Calcipotriene", "Doxercalciferol"],
          correct: 0,
          exp: "Calcitriol (or its analogs) is used because renal 1α‑hydroxylase is impaired." }
    ];
    const allQuestions = questions.concat(extra); // now 65+

    // Shuffle
    let shuffled = allQuestions.sort(()=>0.5-Math.random());
    let currentIndex = 0;
    let userAnswers = new Array(shuffled.length).fill(null);
    let showExplanation = new Array(shuffled.length).fill(false);
    const letters = ['A','B','C','D','E'];

    function render() {
        const q = shuffled[currentIndex];
        document.getElementById('questionText').innerText = q.q;
        let optsHtml = '';
        q.opts.forEach((opt, idx) => {
            let cls = 'option';
            if (userAnswers[currentIndex] === idx) cls += ' selected';
            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                if (idx === q.correct) cls += ' correct';
                else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
            }
            optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
        });
        document.getElementById('optionsContainer').innerHTML = optsHtml;

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                let idx = parseInt(opt.dataset.idx);
                if (userAnswers[currentIndex] === idx) {
                    userAnswers[currentIndex] = null;
                    showExplanation[currentIndex] = false;
                } else {
                    userAnswers[currentIndex] = idx;
                    showExplanation[currentIndex] = true;
                }
                render();
            });
        });

        if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
            document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
            document.getElementById('explanation').classList.add('show');
        } else {
            document.getElementById('explanation').classList.remove('show');
        }

        document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
        let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
        document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
        document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

        // dots
        let dots = '';
        for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
            let cls = 'dot';
            if (i === currentIndex) cls += ' active';
            if (userAnswers[i] !== null) cls += ' answered';
            dots += `<div class="${cls}" data-index="${i}"></div>`;
        }
        document.getElementById('dotsContainer').innerHTML = dots;
        document.querySelectorAll('.dot').forEach(d => {
            d.addEventListener('click', () => {
                let idx = parseInt(d.dataset.index);
                if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                    currentIndex = idx;
                    render();
                }
            });
        });
    }

    document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
    render();
</script>
</body>
</html>
