          correct: 0,
          exp: "Internal validity: study is correct for its participants; external: applicability to others." },
        { q: "The CONSORT statement provides guidelines for reporting:",
          opts: ["Randomized controlled trials", "Observational studies", "Systematic reviews", "Diagnostic accuracy studies", "Animal studies"],
          correct: 0,
          exp: "CONSORT for RCTs; STROBE for observational; PRISMA for reviews; STARD for diagnostic." },
        { q: "In a systematic review, the PRISMA flowchart shows:",
          opts: ["Study selection process (identification, screening, eligibility, included)", "Risk of bias", "Forest plot", "Funnel plot", "Heterogeneity"],
          correct: 0,
          exp: "PRISMA flowchart documents the number of studies at each stage." },
        { q: "The Declaration of Helsinki outlines ethical principles for:",
          opts: ["Medical research involving human subjects", "Animal research", "Data sharing", "Publication ethics", "Informed consent only"],
          correct: 0,
          exp: "Declaration of Helsinki is a key ethics document for human research." },
        { q: "Institutional Review Board (IRB) approval is required for:",
          opts: ["Research involving human subjects", "All research", "Only federally funded research", "Only clinical trials", "Only interventional studies"],
          correct: 0,
          exp: "IRB reviews research protocols to protect human subjects." },
        { q: "Informed consent must include:",
          opts: ["Purpose, procedures, risks, benefits, alternatives, confidentiality, voluntary participation", "Only risks and benefits", "Only the procedure", "Only signature", "Only study duration"],
          correct: 0,
          exp: "Informed consent requires full disclosure and comprehension." }
    ];
    // Add extra to reach 65
    const extra = [
        { q: "A study that follows a group of exposed and non‑exposed individuals forward in time to see who develops disease is a:",
          opts: ["Cohort study", "Case‑control study", "Cross‑sectional study", "Ecological study", "RCT"],
          correct: 0,
          exp: "Cohort studies are longitudinal, starting with exposure and following for outcome." },
        { q: "A study that compares individuals with and without disease, looking back at past exposures, is a:",
          opts: ["Case‑control study", "Cohort study", "Cross‑sectional study", "Ecological study", "RCT"],
          correct: 0,
          exp: "Case‑control studies are retrospective, starting with outcome and looking back." },
        { q: "A study that collects data at a single point in time to examine association between exposure and outcome is a:",
          opts: ["Cross‑sectional study", "Cohort study", "Case‑control study", "Ecological study", "RCT"],
          correct: 0,
          exp: "Cross‑sectional studies assess prevalence and associations at one time." },
        { q: "In which study design is ecological fallacy a potential problem?",
          opts: ["Ecological study (group‑level data)", "Cross‑sectional study", "Cohort study", "Case‑control study", "RCT"],
          correct: 0,
          exp: "Ecological fallacy: assuming group‑level associations apply to individuals." },
        { q: "Which design is most susceptible to recall bias?",
          opts: ["Case‑control study", "Cohort study", "RCT", "Cross‑sectional study", "Ecological study"],
          correct: 0,
          exp: "Cases may recall exposures differently than controls." },
        { q: "Which design is most susceptible to loss to follow‑up?",
          opts: ["Cohort study (prospective)", "Case‑control study", "RCT", "Cross‑sectional study", "Ecological study"],
          correct: 0,
          exp: "Prospective cohort studies require long follow‑up, risking attrition bias." },
        { q: "A study where neither participants nor investigators know treatment assignment is:",
          opts: ["Double‑blind", "Single‑blind", "Open‑label", "Triple‑blind", "Quadruple‑blind"],
          correct: 0,
          exp: "Double‑blind reduces bias from both sides." },
        { q: "In a placebo‑controlled trial, the placebo effect is controlled by:",
          opts: ["Using an inert substance that looks like the active treatment", "Randomization", "Blinding", "Intention‑to‑treat analysis", "All of the above"],
          correct: 3,
          exp: "Placebo controls for psychological effects and natural history." },
        { q: "The 'healthy worker effect' is a type of:",
          opts: ["Selection bias", "Information bias", "Confounding", "Effect modification", "Recall bias"],
          correct: 0,
          exp: "Workers are healthier than general population, biasing occupational studies." },
        { q: "Berkson bias (admission rate bias) occurs in:",
          opts: ["Hospital‑based case‑control studies", "Population‑based cohort studies", "RCTs", "Cross‑sectional surveys", "Ecological studies"],
          correct: 0,
          exp: "Hospitalized cases and controls may have different exposure rates." },
        { q: "Misclassification that is equal between groups is called:",
          opts: ["Non‑differential misclassification", "Differential misclassification", "Recall bias", "Observer bias", "Confounding"],
          correct: 0,
          exp: "Non‑differential misclassification biases toward the null." }
    ];
    const allQuestions = questions.concat(extra); // now 65+

    // Shuffle
    let shuffled = allQuestions.sort(()=>0.5-Math.random());
    let currentIndex = 0;
    let userAnswers = new Array(shuffled.length).fill(null);
    let showExplanation = new Array(shuffled.length).fill(false);
    const letters = ['A','B','C','D','E'];

    function render() {
        const q = shuffled[currentIndex];
        document.getElementById('questionText').innerText = q.q;
        let optsHtml = '';
        q.opts.forEach((opt, idx) => {
            let cls = 'option';
            if (userAnswers[currentIndex] === idx) cls += ' selected';
            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                if (idx === q.correct) cls += ' correct';
                else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
            }
            optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
        });
        document.getElementById('optionsContainer').innerHTML = optsHtml;

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                let idx = parseInt(opt.dataset.idx);
                if (userAnswers[currentIndex] === idx) {
                    userAnswers[currentIndex] = null;
                    showExplanation[currentIndex] = false;
                } else {
                    userAnswers[currentIndex] = idx;
                    showExplanation[currentIndex] = true;
                }
                render();
            });
        });

        if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
            document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
            document.getElementById('explanation').classList.add('show');
        } else {
            document.getElementById('explanation').classList.remove('show');
        }

        document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
        let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
        document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
        document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

        // dots
        let dots = '';
        for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
            let cls = 'dot';
            if (i === currentIndex) cls += ' active';
            if (userAnswers[i] !== null) cls += ' answered';
            dots += `<div class="${cls}" data-index="${i}"></div>`;
        }
        document.getElementById('dotsContainer').innerHTML = dots;
        document.querySelectorAll('.dot').forEach(d => {
            d.addEventListener('click', () => {
                let idx = parseInt(d.dataset.index);
                if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                    currentIndex = idx;
                    render();
                }
            });
        });
    }

    document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
    render();
</script>
</body>
</html>
