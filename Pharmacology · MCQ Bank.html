          exp: "Fluoroquinolones can damage growing cartilage in animal studies." },
        { q: "Gentamicin is an aminoglycoside antibiotic that can cause:",
          opts: ["Nephrotoxicity and ototoxicity", "Hepatotoxicity", "Cardiotoxicity", "Peripheral neuropathy", "Bone marrow suppression"],
          correct: 0,
          exp: "Aminoglycosides are nephrotoxic and ototoxic; monitor levels." },
        { q: "Clindamycin is associated with a risk of:",
          opts: ["Clostridioides difficile colitis", "Pseudomembranous colitis", "Antibiotic‑associated diarrhea", "All of the above", "None"],
          correct: 3,
          exp: "Clindamycin strongly predisposes to C. diff colitis." },
        { q: "Vancomycin is often monitored to prevent:",
          opts: ["Nephrotoxicity and ototoxicity", "Red man syndrome", "Thrombophlebitis", "Neutropenia", "All of the above"],
          correct: 0,
          exp: "Vancomycin levels are monitored to avoid renal toxicity and ototoxicity." },
        { q: "Which antifungal drug is fungicidal and works by inhibiting squalene epoxidase?",
          opts: ["Terbinafine", "Fluconazole", "Amphotericin B", "Caspofungin", "Griseofulvin"],
          correct: 0,
          exp: "Terbinafine inhibits squalene epoxidase, leading to ergosterol deficiency." },
        { q: "Amphotericin B is associated with which infusion‑related reaction?",
          opts: ["Fever, chills, rigors", "Anaphylaxis", "Hypotension", "Bradycardia", "All of the above"],
          correct: 0,
          exp: "Amphotericin often causes infusion‑related fever and chills; premedication with antipyretics is common." },
        { q: "Acyclovir is most effective against:",
          opts: ["HSV and VZV", "CMV", "EBV", "Influenza", "Hepatitis B"],
          correct: 0,
          exp: "Acyclovir is a nucleoside analog with activity against HSV and VZV." },
        { q: "Which antiretroviral drug class inhibits viral entry by blocking CCR5?",
          opts: ["Maraviroc", "Enfuvirtide", "Raltegravir", "Zidovudine", "Efavirenz"],
          correct: 0,
          exp: "Maraviroc is a CCR5 antagonist; enfuvirtide is a fusion inhibitor." },
        { q: "Isoniazid can cause peripheral neuropathy, which is prevented by:",
          opts: ["Pyridoxine (vitamin B6)", "Folic acid", "Thiamine", "Riboflavin", "Cobalamin"],
          correct: 0,
          exp: "Isoniazid depletes pyridoxine; supplementation prevents neuropathy." },
        { q: "Rifampin is a potent inducer of CYP450 enzymes. This can cause:",
          opts: ["Decreased efficacy of oral contraceptives", "Increased warfarin effect", "Increased cyclosporine levels", "Decreased isoniazid levels", "All of the above"],
          correct: 0,
          exp: "Rifampin induces CYP enzymes, reducing levels of many drugs, including oral contraceptives." }
    ];
    // Add extra to reach 65
    const extra = [
        { q: "The most common cause of antibiotic‑associated diarrhea is:",
          opts: ["Clostridioides difficile", "Staphylococcus aureus", "Candida albicans", "Klebsiella", "E. coli"],
          correct: 0,
          exp: "C. difficile is the leading cause of antibiotic‑associated colitis." },
        { q: "Which of the following is a P2Y12 inhibitor used in acute coronary syndrome?",
          opts: ["Clopidogrel", "Prasugrel", "Ticagrelor", "All of the above", "None"],
          correct: 3,
          exp: "Clopidogrel, prasugrel, and ticagrelor are all P2Y12 inhibitors." },
        { q: "A patient taking simvastatin is started on diltiazem. What is the major concern?",
          opts: ["Increased risk of myopathy (CYP3A4 inhibition)", "Decreased statin efficacy", "Hypotension", "Bradycardia", "Hyperkalemia"],
          correct: 0,
          exp: "Diltiazem inhibits CYP3A4, increasing simvastatin levels and myopathy risk." },
        { q: "Which of the following is a direct thrombin inhibitor?",
          opts: ["Dabigatran", "Rivaroxaban", "Apixaban", "Edoxaban", "Enoxaparin"],
          correct: 0,
          exp: "Dabigatran directly inhibits thrombin; rivaroxaban, apixaban, edoxaban inhibit factor Xa." },
        { q: "The mechanism of action of metoclopramide includes:",
          opts: ["Dopamine D2 antagonism and 5‑HT3 antagonism", "5‑HT3 agonism", "Muscarinic agonism", "Histamine H1 antagonism", "NK1 antagonism"],
          correct: 0,
          exp: "Metoclopramide blocks D2 receptors (prokinetic) and at high doses also 5‑HT3." },
        { q: "Which drug is used to prevent NSAID‑induced ulcers and is a prostaglandin analog?",
          opts: ["Misoprostol", "Sucralfate", "Omeprazole", "Ranitidine", "Bismuth subsalicylate"],
          correct: 0,
          exp: "Misoprostol (PGE1 analog) replaces prostaglandins depleted by NSAIDs." },
        { q: "The drug of choice for acute gout attack is:",
          opts: ["NSAIDs or colchicine", "Allopurinol", "Febuxostat", "Probenecid", "Pegloticase"],
          correct: 0,
          exp: "Acute gout: NSAIDs, colchicine, or corticosteroids; urate‑lowering therapy is for chronic management." },
        { q: "Allopurinol inhibits:",
          opts: ["Xanthine oxidase", "HGPRT", "PRPP synthetase", "Uricase", "Adenosine deaminase"],
          correct: 0,
          exp: "Allopurinol inhibits xanthine oxidase, reducing uric acid production." },
        { q: "The major toxicity of methotrexate at high doses (e.g., in cancer) is:",
          opts: ["Myelosuppression and mucositis", "Hepatotoxicity", "Pulmonary fibrosis", "Nephrotoxicity", "Neurotoxicity"],
          correct: 0,
          exp: "High‑dose methotrexate causes myelosuppression, stomatitis; leucovorin rescue is used." },
        { q: "Which of the following is a monoclonal antibody used for rheumatoid arthritis that inhibits IL‑6?",
          opts: ["Tocilizumab", "Adalimumab", "Etanercept", "Rituximab", "Abatacept"],
          correct: 0,
          exp: "Tocilizumab (anti‑IL‑6 receptor); adalimumab (anti‑TNF); rituximab (anti‑CD20)." },
        { q: "The drug of choice for malignant hyperthermia is:",
          opts: ["Dantrolene", "Succinylcholine", "Propofol", "Midazolam", "Mannitol"],
          correct: 0,
          exp: "Dantrolene inhibits calcium release from sarcoplasmic reticulum." }
    ];
    const allQuestions = questions.concat(extra); // now 65+

    // Shuffle
    let shuffled = allQuestions.sort(()=>0.5-Math.random());
    let currentIndex = 0;
    let userAnswers = new Array(shuffled.length).fill(null);
    let showExplanation = new Array(shuffled.length).fill(false);
    const letters = ['A','B','C','D','E'];

    function render() {
        const q = shuffled[currentIndex];
        document.getElementById('questionText').innerText = q.q;
        let optsHtml = '';
        q.opts.forEach((opt, idx) => {
            let cls = 'option';
            if (userAnswers[currentIndex] === idx) cls += ' selected';
            if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
                if (idx === q.correct) cls += ' correct';
                else if (idx === userAnswers[currentIndex] && idx !== q.correct) cls += ' wrong';
            }
            optsHtml += `<div class="${cls}" data-idx="${idx}"><span class="option-letter">${letters[idx]}</span><span>${opt}</span></div>`;
        });
        document.getElementById('optionsContainer').innerHTML = optsHtml;

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                let idx = parseInt(opt.dataset.idx);
                if (userAnswers[currentIndex] === idx) {
                    userAnswers[currentIndex] = null;
                    showExplanation[currentIndex] = false;
                } else {
                    userAnswers[currentIndex] = idx;
                    showExplanation[currentIndex] = true;
                }
                render();
            });
        });

        if (showExplanation[currentIndex] && userAnswers[currentIndex] !== null) {
            document.getElementById('explanation').innerHTML = `<p>${q.exp}</p>`;
            document.getElementById('explanation').classList.add('show');
        } else {
            document.getElementById('explanation').classList.remove('show');
        }

        document.getElementById('qCounter').innerText = `${currentIndex+1}/${shuffled.length}`;
        let correctCount = userAnswers.reduce((acc, ans, i) => acc + (ans === shuffled[i].correct ? 1 : 0), 0);
        document.getElementById('scoreDisplay').innerText = `Score: ${correctCount}`;
        document.getElementById('progressFill').style.width = `${(currentIndex+1)/shuffled.length*100}%`;

        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === shuffled.length-1;

        // dots
        let dots = '';
        for (let i = 0; i < shuffled.length; i+= Math.ceil(shuffled.length/20)) {
            let cls = 'dot';
            if (i === currentIndex) cls += ' active';
            if (userAnswers[i] !== null) cls += ' answered';
            dots += `<div class="${cls}" data-index="${i}"></div>`;
        }
        document.getElementById('dotsContainer').innerHTML = dots;
        document.querySelectorAll('.dot').forEach(d => {
            d.addEventListener('click', () => {
                let idx = parseInt(d.dataset.index);
                if (!isNaN(idx) && idx >=0 && idx < shuffled.length) {
                    currentIndex = idx;
                    render();
                }
            });
        });
    }

    document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < shuffled.length-1) { currentIndex++; render(); } });
    render();
</script>
</body>
</html>
